<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #08090C;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  #app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #0D0F14;
    display: flex;
    flex-direction: column;
    position: relative;
    border-left: 1px solid rgba(255,255,255,0.06);
    border-right: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 120px rgba(0,0,0,0.5);
  }

  /* Progress bar */
  .prog-bar {
    height: 2px;
    background: rgba(255,255,255,0.06);
    position: sticky;
    top: 0;
    z-index: 20;
    flex-shrink: 0;
  }
  .prog-fill {
    height: 100%;
    background: #1D9E75;
    box-shadow: 0 0 8px rgba(29,158,117,0.6);
    transition: width 0.6s ease;
  }

  /* Bottom tab bar */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    display: flex;
    background: rgba(13,15,20,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.07);
    z-index: 30;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 11px 0 9px;
    background: none;
    border: none;
    cursor: pointer;
    color: #555B70;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    transition: color 0.15s;
  }
  .tab-item.active { color: #1D9E75; }
  .tab-item:hover { color: #8A90A8; }
  .tab-item.active:hover { color: #1D9E75; }
  #app.has-tabbar .screen { padding-bottom: 92px; }

  /* Screen container */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 24px 48px;
    min-height: calc(100vh - 3px);
  }

  /* Typography */
  h1 { font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 30px; font-weight: 700; line-height: 1.15; color: #F0F2F8; letter-spacing: -0.02em; }
  h2 { font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 22px; font-weight: 700; line-height: 1.25; color: #F0F2F8; letter-spacing: -0.01em; }
  p  { color: #6B7185; line-height: 1.65; }
  .disp { font-family: 'Space Grotesk', -apple-system, sans-serif; letter-spacing: -0.01em; }

  .label {
    font-size: 11px;
    font-weight: 700;
    color: #1D9E75;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .section-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 22px 0;
  }
  .section-caption {
    font-size: 12px;
    color: #555B70;
    line-height: 1.5;
    margin: -2px 0 12px;
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 15px 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .btn-primary {
    background: #1D9E75;
    color: #fff;
    font-weight: 600;
    letter-spacing: -0.01em;
    box-shadow: 0 0 28px rgba(29,158,117,0.35), 0 2px 8px rgba(0,0,0,0.5);
  }
  .btn-primary:hover  { background: #22B585; box-shadow: 0 0 40px rgba(29,158,117,0.5), 0 4px 14px rgba(0,0,0,0.4); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); box-shadow: 0 0 18px rgba(29,158,117,0.3); }
  .btn-primary:disabled { background: rgba(29,158,117,0.25); color: rgba(255,255,255,0.4); cursor: default; box-shadow: none; }
  .btn-ghost {
    background: transparent;
    color: #555B70;
    border: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18); color: #8A90A8; }

  /* Prominent share CTA вЂ” teal accent, lighter-weight than primary */
  .btn-share {
    background: rgba(29,158,117,0.1);
    color: #1D9E75;
    border: 1px solid rgba(29,158,117,0.3);
    font-weight: 600;
    margin-top: 10px;
  }
  .btn-share:hover { background: rgba(29,158,117,0.16); border-color: rgba(29,158,117,0.45); }
  .btn-share:disabled { opacity: 0.55; cursor: default; }

  /* Toast (brief confirmation messages) */
  .wp-toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(16px);
    background: #1A1E2E;
    border: 1px solid rgba(255,255,255,0.1);
    color: #F0F2F8;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 1000;
    max-width: 86%;
    text-align: center;
    pointer-events: none;
  }
  .wp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Year selection */
  .year-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #131520;
    border: 1.5px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 15px;
    font-weight: 500;
    color: #D0D3E0;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: inherit;
    transition: all 0.15s;
    text-align: left;
  }
  .year-btn:hover { background: #191D2A; border-color: rgba(255,255,255,0.16); }
  .year-btn.selected { border: 1.5px solid #1D9E75; background: rgba(29,158,117,0.1); color: #4DE3AB; box-shadow: 0 0 16px rgba(29,158,117,0.1); }
  .year-hint { font-size: 12px; color: #444B62; }
  .year-btn.selected .year-hint { color: #22B585; }

  /* Course checkboxes */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #333A52;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 16px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }

  .course-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 13px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    margin-bottom: 7px;
    cursor: default;
    font-size: 14px;
    color: #B0B5C8;
    user-select: none;
    background: #131520;
  }
  /* Course state toggle buttons */
  .csb {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #444B62;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .csb:active { opacity: 0.7; }
  .csb-ip {
    border-color: rgba(29,158,117,0.5);
    color: #4DE3AB;
    background: rgba(29,158,117,0.1);
  }
  .csb-done {
    border-color: rgba(29,158,117,0.5);
    color: #F0F2F8;
    background: rgba(29,158,117,0.2);
  }
  /* Pulsing activity dot */
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .pulse-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4DE3AB;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .courses-scroll { overflow-y: auto; flex: 1; margin: 0 -2px; padding: 0 2px; }

  /* Quick-log topic picker */
  .topic-pick-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: #131520;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    color: #E0E3EE;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .topic-pick-btn:hover { background: #191D2A; border-color: rgba(255,255,255,0.13); }
  .topic-pick-btn .tp-name { flex: 1; min-width: 0; }
  .topic-pick-btn .tp-arrow { color: #444B62; font-size: 14px; flex-shrink: 0; }

  /* Retention nudge card */
  .nudge-card {
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(129,140,248,0.25);
    border-radius: 10px;
    padding: 13px 16px;
    margin-bottom: 16px;
  }
  .nudge-card .nudge-label {
    font-size: 10px;
    font-weight: 700;
    color: #8B93F8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  .nudge-card p {
    font-size: 14px;
    color: #B0B5C8;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .nudge-actions { display: flex; gap: 8px; }
  .nudge-actions button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    border: none;
  }
  .nudge-btn-primary { background: #6366F1; color: #fff; }
  .nudge-btn-primary:hover { background: #7577F5; }
  .nudge-btn-ghost { background: transparent; color: #6B7185; border: 1px solid rgba(255,255,255,0.1) !important; }
  .nudge-btn-ghost:hover { color: #8A90A8; }

  /* Coverage reveal */
  .coverage-num {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 80px;
    font-weight: 700;
    color: #1D9E75;
    line-height: 1;
    text-align: center;
    letter-spacing: -0.03em;
    text-shadow: 0 0 40px rgba(29,158,117,0.4);
  }
  .coverage-sub {
    font-size: 13px;
    color: #444B62;
    text-align: center;
    margin-top: 4px;
  }
  .coverage-track {
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    margin: 12px 0 18px;
    overflow: hidden;
  }
  .coverage-fill {
    height: 100%;
    background: #1D9E75;
    border-radius: 3px;
    width: 0%;
    box-shadow: 0 0 8px rgba(29,158,117,0.5);
    transition: width 1.5s cubic-bezier(0.2, 0.8, 0.4, 1);
  }

  /* Map */
  .map-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #777;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .map-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  /* On-track card */
  .info-card {
    background: rgba(29,158,117,0.08);
    border: 1px solid rgba(29,158,117,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .info-card p { color: #4DE3AB; font-size: 13px; line-height: 1.55; }

  /* Logo mark */
  .logo-box {
    width: 48px;
    height: 48px;
    background: rgba(29,158,117,0.12);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  /* Question screen */
  .exit-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    color: #444B62;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 0;
    margin-bottom: 16px;
    transition: color 0.15s;
  }
  .exit-btn:hover { color: #8A90A8; }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .q-count { font-size: 13px; color: #444B62; }
  .q-tag {
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,0.07);
    color: #6B7185;
    padding: 3px 10px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .q-tag svg { flex-shrink: 0; }
  .q-stem {
    font-size: 16px;
    color: #E0E3EE;
    line-height: 1.7;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .cars-passage {
    background: #131520;
    border-left: 3px solid #1D9E75;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #7A8098;
    line-height: 1.75;
    font-style: italic;
  }
  .ans-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #131520;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 14px;
    font-weight: 500;
    color: #C0C4D8;
    cursor: pointer;
    margin-bottom: 9px;
    font-family: inherit;
    line-height: 1.45;
    transition: background 0.12s, border-color 0.12s, box-shadow 0.12s, transform 0.1s;
  }
  .ans-btn:hover:not(:disabled) { background: #191D2A; border-color: rgba(255,255,255,0.16); transform: translateY(-1px); }
  .ans-btn:active:not(:disabled) { transform: translateY(0); }
  .ans-btn.correct  { background: rgba(29,158,117,0.12); border-color: #1D9E75; color: #4DE3AB; font-weight: 600; box-shadow: 0 0 16px rgba(29,158,117,0.15); }
  .ans-btn.wrong    { background: rgba(216,90,48,0.1); border-color: #D85A30; color: #F08060; box-shadow: 0 0 16px rgba(216,90,48,0.1); }
  .ans-btn.dim      { opacity: 0.2; transform: none; box-shadow: none; }

  .explanation {
    border-left: 3px solid #1D9E75;
    background: #131520;
    padding: 13px 15px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    line-height: 1.7;
    color: #7A8098;
    margin: 10px 0 16px;
  }
  .explanation.wrong { border-left-color: #D85A30; }

  /* Complete screen */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 0 0 20px;
  }
  .stat-box {
    background: #131520;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
  }
  .stat-num { font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 28px; font-weight: 700; color: #E0E3EE; letter-spacing: -0.02em; }
  .stat-num.teal { color: #1D9E75; text-shadow: 0 0 20px rgba(29,158,117,0.3); }
  .stat-lbl { font-size: 11px; color: #3A4060; margin-top: 3px; font-weight: 500; }

  .today-note {
    font-size: 10px;
    color: #3A4060;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .today-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #1D9E75;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(29,158,117,0.6);
  }

  /* в”Ђв”Ђ Keyframe animations в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes correct-pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.025); box-shadow: 0 0 0 4px rgba(29,158,117,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  @keyframes wrong-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-7px); }
    40%     { transform: translateX(7px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop-in {
    0%   { transform: scale(0.9); opacity: 0; }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }

  .screen { animation: fade-up 0.22s ease both; }
  .ans-btn.correct  { animation: correct-pulse 0.45s ease both; }
  .ans-btn.wrong    { animation: wrong-shake 0.4s ease both; }
  .explanation      { animation: slide-in 0.3s ease both; }

  /* в”Ђв”Ђ Section color tokens в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .tag-bb   { background: rgba(29,158,117,0.15);  color: #4DE3AB; }
  .tag-cp   { background: rgba(245,158,11,0.15);  color: #FCD34D; }
  .tag-ps   { background: rgba(139,92,246,0.15);  color: #C4B5FD; }
  .tag-cars { background: rgba(59,130,246,0.15);  color: #93C5FD; }

  /* в”Ђв”Ђ Landing screen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .app-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .app-brand-icon {
    width: 36px;
    height: 36px;
    background: rgba(29,158,117,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .app-brand-name {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #E0E3EE;
    letter-spacing: -0.01em;
  }
  .landing-example {
    background: #131520;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .landing-example-label {
    font-size: 11px;
    font-weight: 700;
    color: #1D9E75;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .topic-pill {
    display: inline-block;
    background: rgba(29,158,117,0.15);

  'c34': 'Your professor tests lattice energy trends. The MCAT gives two ionic compounds and asks which has the higher melting point, requiring you to compare charge magnitude and ionic radii вЂ” applying Coulomb\'s law qualitatively to predict physical properties.',

  'c36': 'Your professor tests intermolecular force ranking. The MCAT gives a graph of viscosity vs. temperature for different liquids and asks you to explain the trend using intermolecular forces вЂ” connecting molecular structure to a macroscopic physical property.',
  // в”Ђ Atomic Structure в”Ђ
  'c06': 'Your professor tests electron configuration by applying Aufbau. The MCAT gives an element\'s properties and asks you to identify it from its electron configuration вЂ” working from configuration to properties, or explaining why an element has a particular reactivity.',
  'c07': 'Your professor tests which quantum number sets are valid by checking rules. The MCAT gives a spectral line data and asks what electronic transition corresponds to a given energy вЂ” applying quantum number logic to atomic emission spectra rather than just validating a set.',
  'c13': 'Your professor tests that atomic radius decreases across a period. The MCAT gives ionization energy data for a series of elements and asks you to identify a trend or anomaly вЂ” integrating atomic radius, Zeff, and ionization energy into one coherent analysis.',
  'c17': 'Your professor tests that ionization energy decreases down a group. The MCAT gives reactivity data for alkali metals and asks you to explain why Cs is more reactive than Li вЂ” connecting ionization energy to chemical reactivity in a novel context.',
  'c22': 'Your professor tests periodic trends for electron affinity. The MCAT gives anomalous data about fluorine and asks you to explain the deviation from the expected trend вЂ” reasoning about why a smaller atom might have lower electron affinity despite higher Zeff (due to electron-electron repulsion in a small space).',
  'c37': 'Your professor tests Bohr model transitions by asking whether absorption or emission occurs. The MCAT gives emission spectrum data and asks which electronic transition produced a specific spectral line вЂ” working backward from observed wavelength to quantum levels without a lookup table.',
  'c38': 'Your professor tests effective nuclear charge as a definition. The MCAT gives atomic radius data across a period and asks you to explain why radius decreases despite more electrons being added вЂ” connecting Zeff, shielding, and electron-nucleus attraction into one coherent trend.',
  'c39': 'Your professor tests periodic trends for electron affinity as a standalone topic. The MCAT integrates it with atomic radius and ionization energy data, asking you to explain an anomaly (e.g., why O has lower electron affinity than N) вЂ” reasoning from electron configuration to the exception.',
  'c40': 'Your professor tests the definition of an isotope. The MCAT gives a passage about radioactive tracers used in medical imaging and asks which property (mass number, atomic number) distinguishes the tracer from the stable element.',
  'c41': 'Your professor tests exceptions to electron configuration rules. The MCAT gives chromium\'s reactivity data and asks why it behaves differently from a neighboring transition metal вЂ” applying the half-filled d-subshell stability exception to explain real chemical behavior.',
  'c42': 'Your professor tests that ions have different radii than neutral atoms. The MCAT gives a table of ionic radii and asks you to rank a series of isoelectronic ions by size вЂ” applying the relationship between nuclear charge, electron count, and effective nuclear charge.',
  'c43': 'Your professor tests Hund\'s rule by writing orbital box diagrams. The MCAT gives a molecule\'s magnetic properties and asks you to determine whether it is paramagnetic or diamagnetic вЂ” applying orbital occupancy to a measurable physical property.',
  'c44': 'Your professor tests the relationship between wavelength and photon energy. The MCAT gives spectroscopic data from an absorption experiment and asks which wavelength corresponds to a transition between specific energy levels вЂ” connecting E = hf to an experimental observation.',
  // в”Ђ Stoichiometry в”Ђ
  'c08': 'Your professor tests limiting reagent identification by mole ratio. The MCAT gives a cellular respiration scenario and asks how much ATP can be produced from limited Oв‚‚ вЂ” applying stoichiometric reasoning to a biological constraint.',
  'c09': 'Your professor gives you concentration and volume and asks for grams. The MCAT gives a drug formulation problem and asks whether a solution has the correct concentration for a clinical dose вЂ” applying molarity calculations to a pharmacological scenario.',
  'c10': 'Your professor tests colligative properties by formula. The MCAT gives a clinical context (IV fluid selection) and asks which solution would cause the most osmotic effect on red blood cells вЂ” applying colligative property reasoning to tonicity.',
  'c14': 'Your professor tests ideal gas law by plugging into PV = nRT. The MCAT gives a physiological scenario (lung volume during a dive) and asks how pressure change affects gas volume in the lungs вЂ” applying the gas law to a medical context.',
  'c19': 'Your professor tests percent yield by formula. The MCAT gives a pharmaceutical synthesis problem and asks what mass of limiting reagent is needed to produce a target dose given a known percent yield вЂ” applying yield reasoning in reverse.',
  'c45': 'Your professor tests the dilution formula Cв‚ЃVв‚Ѓ = Cв‚‚Vв‚‚. The MCAT gives a drug preparation scenario and asks how to correctly dilute a stock solution to reach a therapeutic concentration.',
  'c46': 'Your professor tests empirical formula determination from percent composition. The MCAT gives combustion analysis data and asks you to determine the molecular formula given the molar mass вЂ” combining empirical formula with molecular weight to solve for the molecular formula.',
  'c47': 'Your professor tests the ideal gas law at STP. The MCAT gives a respiratory scenario and asks how many moles of Oв‚‚ are consumed per breath at a given lung volume and pressure вЂ” applying the gas law to a physiological measurement.',
  'c48': 'Your professor tests Avogadro\'s number as a conversion factor. The MCAT gives a passage about enzyme turnover numbers and asks how many molecules of substrate are converted per second вЂ” applying mole-to-molecule conversion to an enzymatic rate problem.',
  'c49': 'Your professor tests colligative properties and molality. The MCAT gives a patient receiving an IV infusion with added solutes and asks why molality is used instead of molarity for colligative property calculations вЂ” connecting the rationale behind the unit to the physical property.',
  'c50': 'Your professor tests molar mass from density at STP. The MCAT gives an unknown gas in a clinical context (e.g., an anesthetic) and asks you to identify it from its density вЂ” applying molar mass as an identification tool.',
  'c51': 'Your professor tests percent composition by mass. The MCAT gives a hydrate and asks what fraction of its mass is water вЂ” applying percent composition to a compound type you haven\'t seen before.',
  'c52': 'Your professor tests mole ratios in balanced equations. The MCAT gives a multi-step synthesis and asks how many moles of product are formed from a starting amount of one reagent across two sequential reactions.',
  'c53': 'Your professor tests limiting reagent and theoretical yield. The MCAT gives a clinical trial where a drug is synthesized and asks what the maximum yield is given a specific amount of each reactant вЂ” applying stoichiometry to a real synthesis context.',
  // в”Ђ Thermodynamics в”Ђ
  'th01': 'Your professor tests О”G = О”H в€’ TО”S by calculation. The MCAT gives a metabolic reaction and asks at what physiological temperature it becomes non-spontaneous вЂ” connecting the crossover temperature to why certain metabolic states are unsustainable.',
  'th02': 'Your professor tests which physical state has higher entropy. The MCAT gives a passage about protein folding and asks whether О”S is positive or negative вЂ” applying entropy reasoning to a biological process where the direction isn\'t obvious.',
  'th03': 'Your professor tests LEO GER and electrode definitions. The MCAT gives a diagram of an unknown electrochemical cell and asks which electrode undergoes oxidation and which direction electrons flow вЂ” you identify the cell type and trace the circuit, not just recite the rule.',
  'th04': 'Your professor tests that catalysts don\'t shift equilibrium. The MCAT gives an enzyme-catalyzed reaction and asks whether adding the enzyme changes О”GВ° вЂ” distinguishing between kinetic effects (rate) and thermodynamic effects (equilibrium position).',
  'th05': 'Your professor tests О”U = Q в€’ W by calculation. The MCAT gives a gas expanding against a piston in a physiological context and asks what happens to the internal energy вЂ” connecting first-law reasoning to a process in the body (e.g., muscle contraction).',
  'th06': 'Your professor tests EВ°cell = EВ°cathode в€’ EВ°anode. The MCAT gives a table of standard reduction potentials and asks which metal would spontaneously reduce a given ion вЂ” applying cell potential reasoning to select the correct reducing agent.',
  'th07': 'Your professor tests that NaCl lowers freezing point more than glucose (van\'t Hoff factor). The MCAT gives a clinical IV fluid scenario and asks which solution is hypotonic to plasma вЂ” applying colligative property logic to osmolarity and tonicity in a medical context.',
  'th08': 'Your professor tests rate laws by plugging in doubling data. The MCAT gives a graph of concentration vs. time and asks you to determine the reaction order from the shape of the curve вЂ” reading graphical data to identify kinetics, not just applying the doubling method.',
  'th09': 'Your professor tests beta decay rules: Z increases by 1, A unchanged. The MCAT gives a nuclear medicine context (PET scan uses positron emitters) and asks which nuclide is the daughter of a specific beta-plus emitter вЂ” applying nuclear decay to a clinical imaging context.',
  'th10': 'Your professor tests the triple point definition. The MCAT gives a phase diagram with an unfamiliar substance and asks at what conditions all three phases coexist вЂ” reading a phase diagram to identify the triple point without a labeled diagram.',
  'th11': 'Your professor tests that Hess\'s Law allows О”H values to be added. The MCAT gives two known reactions and asks you to calculate О”H for a third by algebraically combining them вЂ” applying Hess\'s Law to derive an unknown value in a multi-step problem.',
  'th12': 'Your professor tests Le Chatelier\'s principle for temperature. The MCAT gives an industrial synthesis (like ammonia production) and asks how raising temperature affects equilibrium yield and rate вЂ” balancing kinetic benefit vs. thermodynamic cost of temperature change.',
  'th13': 'Your professor tests О”GВ° = в€’RT ln K. The MCAT gives a biological reaction with K >> 1 and asks what this implies about О”GВ° and whether the reaction is product- or reactant-favored under standard conditions.',
  'th14': 'Your professor tests energy diagram reading: Ea = energy of transition state в€’ reactants. The MCAT gives two reactions with different activation energies and О”G values and asks which is kinetically favored but thermodynamically disfavored вЂ” distinguishing rate from spontaneity.',
  'th15': 'Your professor tests the definition of electrolytic vs. galvanic cell. The MCAT gives an industrial electroplating process and asks which electrode has oxidation occurring and why an external power source is required вЂ” connecting the need for external voltage to non-spontaneity.',
  'th16': 'Your professor tests rate law determination from doubling experiments. The MCAT gives a table of initial rate data and asks for the overall reaction order and rate constant вЂ” synthesizing the rate law from experimental data, not from memory.',
  'th17': 'Your professor tests the half-life formula. The MCAT gives a nuclear medicine context (e.g., a вЃ№вЃ№бµђTc scan) and asks how much radioactivity remains after 3 half-lives вЂ” applying half-life decay to a clinical dosing or imaging decision.',
  // в”Ђ Organic Chemistry в”Ђ
  'og01': 'Your professor tests functional group identification and pKa ranges. The MCAT gives a drug molecule\'s structure and asks whether it\'s more or less acidic than acetic acid based on resonance stabilization of the conjugate base вЂ” reasoning from structure to acidity without a table.',
  'og02': 'Your professor tests that SN2 is fastest with primary substrates. The MCAT gives a synthesis problem with a strong nucleophile and a tertiary substrate and asks why SN2 fails вЂ” reasoning from steric hindrance to predict the actual product and propose an alternative route.',
  'og03': 'Your professor tests Markovnikov\'s rule for addition to alkenes. The MCAT gives a biological context (enzyme-catalyzed addition to an unsaturated fatty acid) and asks which carbon the electrophile adds to, using the rule mechanistically rather than as a pattern.',
  'og04': 'Your professor tests which reagent reduces which functional group. The MCAT gives a synthesis target with multiple reducible functional groups and asks which reducing agent selectively reduces one without affecting the other вЂ” applying reducing agent specificity to a multi-step synthesis.',
  'og05': 'Your professor tests EAS mechanism steps. The MCAT gives a substituted benzene ring and asks where a second electrophile would add based on the substituent\'s directing effect вЂ” applying activating/deactivating and ortho/para vs. meta directing rules to predict regioselectivity.',
  'og06': 'Your professor tests NMR chemical shift values by functional group. The MCAT gives an В№H NMR spectrum of an unknown compound and asks you to identify the functional group present based on the chemical shifts and integration вЂ” structure determination from spectral data.',
  'og07': 'Your professor tests isoelectric point and zwitterion structure. The MCAT gives an electrophoresis experiment at a specific pH and asks which direction an amino acid migrates вЂ” connecting pI and pH to net charge to direction of movement in an electric field.',
  'og08': 'Your professor tests the definition of enantiomers. The MCAT gives two enantiomeric drugs and asks why only one form is pharmacologically active вЂ” connecting stereochemistry to receptor-ligand complementarity in a biological context.',
  'og09': 'Your professor tests elimination vs. substitution reaction conditions. The MCAT gives a secondary substrate and asks which product predominates with a bulky base at high temperature вЂ” applying the rules for E2 vs. SN2 competition to predict the major product.',
  'og10': 'Your professor tests the acyl substitution reactivity order. The MCAT gives a synthesis target (an amide) and asks which starting material and conditions should be used вЂ” selecting the most reactive acyl derivative for efficient synthesis without over-reacting.',
  'og11': 'Your professor tests why amines are basic. The MCAT gives a drug that is a tertiary amine and asks whether it would be in ionized or unionized form at stomach pH вЂ” connecting amine basicity and pKa to ionization state in a pharmacological absorption context.',
  'og12': 'Your professor tests that a racemic mixture is optically inactive. The MCAT gives a reaction that proceeds through a planar carbocation intermediate and asks whether the product would be optically active вЂ” connecting the intermediate\'s geometry to the stereochemistry of the product.',
  'og13': 'Your professor tests the structural difference between aldehydes and ketones. The MCAT gives oxidation state data and asks you to determine which functional group is present in a biological molecule вЂ” applying oxidation level as a diagnostic tool.',
  'og14': 'Your professor tests that SN1 favors tertiary substrates. The MCAT gives a tertiary substrate in a polar protic solvent and asks whether the product would be racemized вЂ” connecting carbocation intermediate planarity to loss of stereochemical information.',
  'og15': 'Your professor tests how to identify a chiral molecule. The MCAT gives IR and NMR spectral data for an unknown compound and asks whether the molecule is chiral based on the degree of unsaturation and the number of stereocenters inferred from the spectrum.',
  'og16': 'Your professor tests EAS product prediction. The MCAT gives a substituted benzene with a directing group and asks where a second electrophile adds and whether it\'s activated or deactivated вЂ” applying both position and rate effects in one question.',
  'og17': 'Your professor tests that aldehydes are more reactive than ketones toward nucleophilic addition. The MCAT gives a biological scenario about enzyme-catalyzed hemiacetal formation and asks which carbonyl compound in a cell would react most readily.',
  'og18': 'Your professor tests that amides are least reactive in nucleophilic acyl substitution. The MCAT gives a passage about why peptide bonds are kinetically stable and asks what structural feature provides that stability вЂ” connecting reactivity order to biological function.',
  'og19': 'Your professor tests the anti-periplanar requirement for E2. The MCAT gives two diastereomers and asks which one undergoes faster E2 elimination вЂ” requiring you to draw or visualize the conformation and determine which has the correct anti-periplanar arrangement.',
  'og20': 'Your professor tests that the diene must be s-cis for Diels-Alder. The MCAT gives a locked ring diene and asks whether it can undergo the reaction вЂ” applying the conformation requirement to predict whether a Diels-Alder reaction is geometrically feasible.',
  // в”Ђ Physics в”Ђ
  'phy01': 'Your professor tests F = ma with clean numbers. The MCAT gives a physiological scenario вЂ” a muscle exerting force on a bone segment вЂ” and asks you to calculate acceleration given force and mass, where you must first identify the net force from a free body situation.',
  'phy02': 'Your professor tests W = Fd cos Оё. The MCAT gives a cardiac output scenario and asks how much work the heart does per beat given pressure (force/area) and stroke volume (distance Г— area) вЂ” applying the work formula in a physiological unit-conversion context.',
  'phy03': 'Your professor tests the continuity equation with radius values. The MCAT gives an atherosclerotic coronary artery and asks how velocity and pressure change at the stenosis вЂ” connecting fluid dynamics to cardiovascular disease using both continuity and Bernoulli\'s principle.',
  'phy04': 'Your professor tests horizontal projectile motion with two equations. The MCAT gives a projectile scenario embedded in a research context (e.g., the path of a drug particle in an inhaler) and asks which two variables independently determine horizontal range.',
  'phy05': 'Your professor tests 1/Req = 1/Rв‚Ѓ + 1/Rв‚‚ + ... for parallel circuits. The MCAT gives a branching capillary bed and asks why total peripheral resistance drops when more capillaries are recruited вЂ” connecting circuit physics to cardiovascular physiology.',
  'phy06': 'Your professor tests which wave properties change at a boundary. The MCAT gives light entering glass from air and asks what happens to wavelength and frequency вЂ” applying the invariant frequency rule to calculate the change in wavelength from the speed change.',
  'phy07': 'Your professor tests the mirror equation 1/f = 1/do + 1/di. The MCAT gives a clinical optics problem (e.g., a laryngoscope) and asks what type of mirror produces a virtual, upright, magnified image вЂ” connecting image characteristics to mirror type to application.',
  'phy08': 'Your professor tests О”P = ПЃgh to find gauge pressure. The MCAT gives a SCUBA diver descending to 30 m and asks how lung volume changes вЂ” applying Boyle\'s Law and pressure-depth to predict a physiological consequence of pressure change underwater.',
  'phy09': 'Your professor tests the thin lens equation. The MCAT gives a patient with hyperopia (farsightedness) and asks what type of corrective lens is needed and at what focal length вЂ” connecting vision defect to lens type to the image correction required.',
  'phy10': 'Your professor tests Coulomb\'s Law: F = kqв‚Ѓqв‚‚/rВІ. The MCAT gives a passage about the charge distribution on an ion channel and asks how the force between two charged residues changes when the protein undergoes a conformational change that alters their separation.',
  'phy11': 'Your professor tests the three modes of heat transfer by definition. The MCAT gives a fever management scenario and asks which heat transfer method is most effective at a given cooling strategy вЂ” connecting mechanism to a practical medical intervention.',
  'phy12': 'Your professor tests П„ = rF sin Оё. The MCAT gives a surgical scenario using a lever-arm bone-and-muscle system and asks which muscle attachment point maximizes torque вЂ” applying torque to musculoskeletal mechanics.',
  'phy13': 'Your professor tests MRI as a clinical tool. The MCAT gives a passage describing NMR principles вЂ” nuclear spin states, Larmor frequency, radiofrequency pulses вЂ” and asks you to identify which physical phenomenon MRI exploits and why hydrogen is used.',
  // в”Ђ Psychology в”Ђ
  'py01': 'Your professor tests the definition of extinction. The MCAT gives a clinical scenario about exposure therapy for a phobia and asks which learning principle it uses and why the fear doesn\'t simply return after therapy вЂ” connecting extinction to the suppression (not erasure) of a conditioned response.',
  'py02': 'Your professor tests operant conditioning terminology. The MCAT gives a behavioral health intervention (e.g., token economy) and asks which reinforcement schedule produces behavior most resistant to extinction вЂ” applying schedule type to a clinical outcome.',
  'py03': 'Your professor tests Piaget\'s stage names and associated skills. The MCAT gives a passage describing a child\'s behavior and asks at which stage this child is, requiring you to identify the cognitive ability demonstrated вЂ” stage identification from behavioral description, not name recall.',
  'py04': 'Your professor tests the memory taxonomy. The MCAT gives an Alzheimer\'s patient who can still drive but cannot form new episodic memories and asks which memory system is spared вЂ” distinguishing systems by what is intact rather than what is lost.',
  'py05': 'Your professor tests the definition of diffusion of responsibility. The MCAT gives a novel field study on bystander behavior and asks which intervention would most increase helping вЂ” applying the underlying mechanism to design a behavioral intervention.',
  'py06': 'Your professor tests the distinction between delusions and hallucinations. The MCAT gives a patient case and asks whether the symptom described is a positive or negative symptom of schizophrenia, and which neurotransmitter pathway is implicated вЂ” layering the symptom taxonomy with neurobiological explanation.',
  'py07': 'Your professor tests Weber\'s Law: О”I/I = k. The MCAT gives a hearing test scenario and asks what increment of sound intensity is needed to detect a difference at a given baseline вЂ” applying the constant-fraction rule to a sensory measurement problem.',
  'py08': 'Your professor tests Bandura\'s theory by name. The MCAT gives a health behavior intervention using video modeling of exercise and asks which psychological theory predicts this approach will be effective вЂ” selecting and justifying a theory from a behavioral description.',
  'py09': 'Your professor tests Selye\'s three GAS stages. The MCAT gives a patient with chronic stress presenting with fatigue, weight loss, and susceptibility to infection and asks which GAS stage this represents вЂ” identifying the stage from physiological signs rather than from a definition.',
  'py10': 'Your professor tests that Harlow\'s experiment showed contact comfort matters. The MCAT gives a study design testing attachment in human infants and asks what the dependent variable would be to test contact comfort vs. feeding as the basis for attachment.',
  'py11': 'Your professor tests Big Five trait definitions. The MCAT gives a study showing that conscientiousness predicts medication adherence and asks which personality trait would be most relevant to predict a patient\'s follow-through on a treatment plan вЂ” applying trait psychology to a clinical outcome.',
  'py12': 'Your professor tests the attribution dimensions (internal/external, stable/unstable, global/specific). The MCAT gives a patient\'s self-explanation after a health setback and asks whether this is an internal, stable, global attribution вЂ” applying the framework to identify a maladaptive attributional style.',
  'py13': 'Your professor tests which sleep stage produces dreaming. The MCAT gives an EEG tracing from a sleep study and asks which stage shows paradoxical (desynchronized) brain activity вЂ” reading graphical physiological data to identify the sleep stage rather than recalling the definition.',
  'py14': 'Your professor tests the definition of the fundamental attribution error. The MCAT gives a clinical vignette where a provider judges a patient\'s missed appointments as "irresponsible" and asks which attributional bias is at work and how it could distort care вЂ” applying the bias to a real interaction, not naming it.',
  'py15': 'Your professor tests the names of the three classic emotion theories. The MCAT describes an experiment that manipulates physiological arousal and social context separately and asks which theory the pattern of results supports вЂ” reasoning from data to theory instead of matching a label.',
  'py16': 'Your professor tests the definition of the availability heuristic. The MCAT gives data showing people overestimate rare, dramatic causes of death relative to common ones and asks which cognitive shortcut explains the distortion вЂ” identifying the heuristic from behavioral evidence.',
  'py17': 'Your professor tests who conducted the obedience studies and the headline shock percentage. The MCAT varies the conditions вЂ” authority proximity, peer models, setting вЂ” and asks which manipulation would most change obedience and why вЂ” reasoning about situational forces rather than recalling the study.',
  'py18': 'Your professor tests the definition of cognitive dissonance. The MCAT gives a health-behavior scenario and asks which route to dissonance reduction the person is using and what attitude change it predicts вЂ” applying the theory to forecast behavior.',
  'py19': 'Your professor tests lists of sympathetic vs. parasympathetic functions. The MCAT gives a patient\'s vitals and symptoms during a stress response and asks which autonomic division and neurotransmitters are responsible вЂ” inferring the pathway from clinical signs.',
  'py20': 'Your professor tests the definition of the absolute threshold. The MCAT gives an experiment where an observer\'s hit and false-alarm rates shift with incentives and asks whether sensitivity or the response criterion changed вЂ” separating d-prime from bias in real data.',
  'py21': 'Your professor tests the four reinforcement schedules by definition. The MCAT gives a real behavioral pattern (a slot machine, or a parent who sometimes gives in to tantrums) and asks which schedule is operating and why the behavior resists extinction вЂ” mapping the scenario to the schedule.',
  // в”Ђ Sociology в”Ђ
  'sc01': 'Your professor tests the definitions of caste vs. class systems. The MCAT gives a global health passage describing a stratification system and asks which sociological concept best characterizes the observed inequality вЂ” applying classification to a novel social context.',
  'sc02': 'Your professor tests Durkheim, functionalism, and conflict theory by name. The MCAT gives a health behavior passage and asks which sociological perspective would frame addiction as a structural problem rather than individual moral failure вЂ” applying theory to a clinical scenario.',
  'sc03': 'Your professor tests cultural relativism vs. ethnocentrism. The MCAT gives a cross-cultural medical scenario and asks which approach to patient care best demonstrates cultural competence вЂ” applying the concept to a practical clinical interaction.',
  'sc04': 'Your professor tests agents of socialization. The MCAT gives a child development passage and asks which agent of socialization would have the greatest impact on health-related attitudes formed in infancy вЂ” ranking agents by developmental timing.',
  'sc05': 'Your professor tests the social determinants of health framework. The MCAT gives health outcome data across income quintiles and asks what combination of factors best explains the gradient вЂ” applying the SDH model to identify the causal chain behind a disparity.',
  'sc06': 'Your professor tests the definition of social capital. The MCAT gives a community health intervention and asks which type of capital (social, cultural, economic) the intervention is building вЂ” distinguishing Bourdieu\'s capital types from a program description.',
  'sc07': 'Your professor tests the sex/gender distinction. The MCAT gives a clinical study using both biological and social variables and asks which variable represents "gender" вЂ” applying the sociological distinction to research methodology.',
  'sc08': 'Your professor tests the definition of institutional racism. The MCAT gives hospital admission data broken down by race and asks whether the pattern reflects individual prejudice, implicit bias, or institutional racism вЂ” distinguishing types of discrimination from epidemiological data.',
  'sc09': 'Your professor tests relative deprivation theory. The MCAT gives data showing that social movements emerge after economic conditions improve slightly for a marginalized group and asks which theory explains this counterintuitive pattern.',
  'sc10': 'Your professor tests the definition of medicalization. The MCAT gives a passage about the expansion of ADHD diagnosis over decades and asks whether this represents medicalization and what sociological force drives it вЂ” applying the concept to a contemporary health trend.',
  'sc11': 'Your professor tests Goffman\'s dramaturgical theory. The MCAT gives a clinical vignette about how a physician presents information differently to colleagues vs. patients and asks which sociological concept this illustrates вЂ” applying impression management to a medical interaction.',
  'sc12': 'Your professor tests the definition of stereotype threat. The MCAT gives an experimental study where a stigmatized group performs worse when group membership is made salient and asks which concept explains the finding вЂ” identifying stereotype threat from experimental evidence.',
  'sc13': 'Your professor tests definitions of intergenerational vs. intragenerational mobility. The MCAT gives a sociological passage and asks which type of mobility is demonstrated when a person\'s occupation changes across their own career vs. compared to their parents.',
  'sc14': 'Your professor tests G.H. Mead\'s "generalized other." The MCAT gives a child development scenario and asks at which stage of Mead\'s role-taking sequence the child develops awareness of societal expectations вЂ” applying Mead\'s developmental stages to a behavioral description.',
  'c_bond01': 'Your professor tests the definition of a polar bond. The MCAT gives two molecules with identical bond types but different shapes (COв‚‚ vs. SOв‚‚) and asks which is polar and why вЂ” reasoning from molecular geometry to the net dipole, not from bond polarity alone.',
  'sc15': 'Your professor tests implicit vs. explicit bias. The MCAT gives clinical decision-making data showing systematic disparities that the physicians deny holding consciously and asks whether this is better explained by implicit or explicit bias.',
  'sc16': 'Your professor tests functionalist vs. conflict theory of stratification. The MCAT gives a passage on income inequality and asks which sociological theory would argue that inequality is functional and which would frame it as exploitation вЂ” applying competing frameworks to the same data.',
  'sc17': 'Your professor tests Merton\'s strain theory. The MCAT gives crime rate data from an economically depressed neighborhood and asks which theory predicts elevated deviance when cultural goals (wealth) are blocked by lack of legitimate means вЂ” applying strain theory to a policy-relevant scenario.',
  // в”Ђ Research Methods в”Ђ
  's01': 'Your professor tests Type I and Type II error definitions. The MCAT gives a clinical trial result and asks whether the researchers\' decision to reject Hв‚Ђ at p = 0.04 was a correct decision or a Type I error вЂ” distinguishing the decision from the truth in a scenario.',
  's02': 'Your professor tests that correlation в‰  causation. The MCAT gives an observational study and asks what additional study design would be needed to establish a causal relationship вЂ” selecting the design that controls confounding, not just identifying the flaw.',
  's03': 'Your professor tests how to state Hв‚Ђ. The MCAT gives a study description and asks whether the researchers correctly formulated the null hypothesis вЂ” evaluating framing of Hв‚Ђ in a novel research context, not just writing it from a template.',
  's04': 'Your professor tests the 68-95-99.7 rule by memorization. The MCAT gives a normal distribution of test scores and asks what fraction of the population falls between two specific values вЂ” applying the rule to calculate a probability without a table.',
  's05': 'Your professor tests that SD measures spread. The MCAT gives two drug trial results with the same mean effect but different standard deviations and asks which drug has more consistent effects across patients вЂ” using SD to evaluate clinical reliability, not just define it.',
  's06': 'Your professor tests that p < О± в†’ reject Hв‚Ђ. The MCAT gives a clinical trial p-value and asks whether the result is statistically significant AND clinically significant вЂ” distinguishing statistical significance from clinical meaningfulness.',
  's07': 'Your professor tests cohort vs. case-control study definitions. The MCAT gives a research question and asks which study design is most appropriate вЂ” selecting the design that best matches the research goal, exposure type, and available data.',
  's08': 'Your professor tests that power = 1 в€’ ОІ. The MCAT gives a study that failed to detect an effect and asks what change in design would increase statistical power вЂ” applying the concept of power to a practical study design decision.',
  's09': 'Your professor tests sensitivity and specificity formulas. The MCAT gives a 2Г—2 contingency table and asks whether a test with high sensitivity or high specificity is more appropriate as an initial screening tool вЂ” connecting the metric to the clinical goal.',
  's10': 'Your professor tests the definition of case-control study design. The MCAT gives exposure data from a case-control study and asks what measure of association is calculated (odds ratio, not relative risk) and why.',
  's11': 'Your professor tests the definition of a confounding variable. The MCAT gives a study result and asks which variable should be controlled as a potential confounder and how failure to control it would bias the result вЂ” reasoning from mechanism to direction of bias.',
  's12': 'Your professor tests the purpose of randomization and blinding. The MCAT gives a double-blind RCT description and asks what type of bias is controlled by randomization vs. what type is controlled by blinding вЂ” distinguishing two forms of bias control in a study design.',

  {
    id:'py14', topic:'psych',
    stem:'An observer watches a stranger trip on the sidewalk and concludes the person is clumsy, giving no weight to the uneven pavement. This tendency to overattribute others\' behavior to disposition rather than situation is:',

    exp:'The fundamental attribution error is the tendency to overattribute others\' behavior to internal, dispositional causes while underweighting situational factors. Self-serving bias is attributing one\'s OWN successes to internal causes and failures to external ones. The just-world hypothesis is the belief that people get what they deserve. In-group favoritism is preferential treatment of one\'s own group. Note the actor-observer asymmetry: we tend to excuse our own behavior situationally but judge others dispositionally.'

  {
    id:'py15', topic:'psych',
    stem:'According to the Schachter-Singer two-factor theory, emotional experience requires:',

    ans:1,
    exp:'The Schachter-Singer two-factor theory holds that emotion = physiological arousal + a cognitive interpretation (label) of that arousal using situational cues. The James-Lange theory says emotion arises directly from bodily arousal (we feel afraid because we tremble) вЂ” arousal without interpretation. The Cannon-Bard theory says arousal and emotion occur simultaneously and independently. The idea that appraisal fully precedes physiology reflects Lazarus\'s appraisal theory. The classic demonstration: identical adrenaline-induced arousal is labeled as different emotions depending on the social context.'
  },
  {
    id:'py16', topic:'psych',
    stem:'After repeated news coverage of shark attacks, beachgoers dramatically overestimate the likelihood of being attacked. This judgment error is best explained by:',

  {
    id:'py17', topic:'psych',

  {
    id:'py18', topic:'psych',

  {

  {

  {

  {

  {

  {

  {
    id:'b20', topic:'genetics',

  {

  {

  {

  {

  {

  {

  {

  {

  {

  {

  {
    id:'cars05', topic:'cars',
    passage:'Hard determinists maintain that every human action is the inevitable result of prior causes вЂ” genetics, upbringing, neurological states вЂ” and that the experience of choosing freely is an illusion. Compatibilists do not dispute the causal story; they argue instead that free will does not require the absence of causes, only the absence of external compulsion. An action is free, on this view, when it flows from the agent\'s own desires and reasoning, even if those desires were themselves caused. The debate, then, is not really about whether actions have causes but about what freedom means.',

  {
    id:'cars07', topic:'cars',

  {

  {
    id:'cars09', topic:'cars',

  {

  {

  {

  {

  {
    id:'c53', topic:'stoich',
    stem:'28 g of Nв‚‚ (MM = 28 g/mol) and 9 g of Hв‚‚ (MM = 2 g/mol) react via Nв‚‚ + 3Hв‚‚ в†’ 2NHв‚ѓ. What is the maximum mass of NHв‚ѓ (MM = 17 g/mol) that can be produced?',

  {

  {

  {

  {

  {

  {

  {

  {

  {

  {
    id:'s15', topic:'research',
    stem:'A drug company tests a new cholesterol medication in a 6-month randomized controlled trial. At baseline, the drug group has a mean LDL of 160 mg/dL; after 6 months the mean is 130 mg/dL (p < 0.001). The company concludes the drug is effective. A critic points out that participants also enrolled in a supervised diet program during the study. This critique identifies which flaw?',

  {

  {

    ans:1,

  {

  {

    opts:['Further stimulate CRH and ACTH release in a positive feedback loop',

          'Have no effect on the hypothalamus or pituitary',
          'Directly stimulate the adrenal medulla to release epinephrine'],
    ans:1,
    exp:'The HPA axis is a classic negative feedback loop: hypothalamus в†’ CRH в†’ anterior pituitary в†’ ACTH в†’ adrenal cortex в†’ cortisol. Rising cortisol feeds back to inhibit both CRH (hypothalamus) and ACTH (anterior pituitary), limiting further cortisol production and keeping levels within a normal range. Chronic stress can dysregulate this feedback, contributing to sustained high cortisol (linked to immune suppression, hyperglycemia, hypertension). Negative feedback is the dominant pattern for nearly all hormone axes вЂ” positive feedback (e.g., oxytocin during labor, the LH surge in ovulation) is the exception, not the rule.'
  },
  {
    id:'p16', topic:'physio',
    stem:'A pathogen breaches the skin for the first time. Within minutes to hours, macrophages and neutrophils respond at the site without requiring any prior exposure to this specific pathogen. This rapid, non-specific response is part of:',
    opts:['Adaptive (acquired) immunity, mediated by B and T lymphocytes',
          'Innate immunity, which is fast-acting and lacks immunological memory',
          'Passive immunity, acquired from maternal antibodies',
          'Humoral immunity specific to this pathogen'],
    ans:1,
    exp:'Innate immunity is the body\'s first line of defense вЂ” physical barriers (skin, mucus) plus rapid cellular responses (neutrophils, macrophages, natural killer cells, complement, inflammation) that act within minutes to hours and do NOT require prior exposure or improve with repeated exposure (no memory). Adaptive immunity (B cells в†’ antibodies/humoral immunity; T cells в†’ cell-mediated immunity) develops more slowly on first exposure (days) but is highly specific and generates immunological memory, producing a faster, stronger response on re-exposure вЂ” the basis of vaccination. Passive immunity is the transfer of pre-formed antibodies (e.g., placental/breast-milk transfer or antitoxin injection), not a response generated by the recipient\'s own immune system.'
  },
  {
    id:'p17', topic:'physio',
    stem:'A patient with severe liver cirrhosis has markedly reduced plasma albumin (hypoalbuminemia). The most direct consequence for capillary fluid dynamics is:',
    opts:['Increased capillary hydrostatic pressure pushes excess fluid into the interstitium',
          'Decreased plasma oncotic pressure reduces the force drawing fluid back into capillaries, promoting edema',
          'Decreased interstitial oncotic pressure pulls fluid out of the capillaries',
          'Low albumin increases capillary permeability, forcing sodium into the interstitium'],
    ans:1,
    exp:'Starling forces govern fluid movement across capillary walls: net filtration = Kf[(Pc в€’ Pi) в€’ Пѓ(ПЂc в€’ ПЂi)], where hydrostatic pressures (P) push fluid out of capillaries and oncotic (colloid osmotic) pressures (ПЂ) draw fluid in. Plasma oncotic pressure is generated primarily by albumin. When albumin falls (liver disease, nephrotic syndrome, malnutrition), ПЂc drops, the inward oncotic force is lost, and net filtration exceeds reabsorption в†’ fluid accumulates in the interstitial space (edema) or abdominal cavity (ascites). Capillary hydrostatic pressure is unchanged initially вЂ” it\'s the oncotic side of the equation that fails. This is why low-protein states cause "pitting edema" without elevated venous pressure. Skill trained: Content knowledge вЂ” Starling forces, capillary fluid exchange, and causes of edema.'
  },
  // в”Ђв”Ђ Neuroscience вЂ” additional batch 2 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  {
    id:'n11', topic:'neuro',
    stem:'During the rising (depolarization) phase of a neuronal action potential, the membrane potential rapidly becomes more positive primarily because:',
    opts:['Voltage-gated KвЃє channels open, allowing KвЃє to rush into the cell',
          'Voltage-gated NaвЃє channels open, allowing NaвЃє to rush into the cell down its electrochemical gradient',
          'The NaвЃє/KвЃє ATPase pumps NaвЃє into the cell',
          'Ligand-gated ClвЃ» channels open, allowing ClвЃ» to leave the cell'],
    ans:1,
    exp:'When depolarization reaches threshold (~в€’55 mV), voltage-gated NaвЃє channels open rapidly. NaвЃє is more concentrated outside the cell, and the inside is negative relative to outside, so NaвЃє rushes in down its electrochemical gradient вЂ” driving the membrane potential toward NaвЃє\'s equilibrium potential (~+60 mV per the Nernst equation). This is the rising phase of the spike. Repolarization follows as NaвЃє channels inactivate and voltage-gated KвЃє channels open, allowing KвЃє efflux (often overshooting into hyperpolarization). The NaвЃє/KвЃє ATPase maintains resting ion gradients but is far too slow to drive the millisecond-scale action potential itself.'
  },
  {
    id:'n12', topic:'neuro',
    stem:'The resting membrane potential of a typical neuron (~в€’70 mV) sits closer to the equilibrium potential for KвЃє than for NaвЃє primarily because:',
    opts:['The resting membrane is far more permeable to KвЃє than to NaвЃє',
          'KвЃє is more concentrated outside the cell than inside',
          'The NaвЃє/KвЃє ATPase pumps equal numbers of NaвЃє and KвЃє across the membrane',
          'NaвЃє channels are wide open at rest, dominating the resting potential'],
    ans:0,
    exp:'At rest, the neuronal membrane has many open "leak" KвЃє channels but relatively few open NaвЃє channels вЂ” permeability to KвЃє is much higher than to NaвЃє. By the Goldman-Hodgkin-Katz equation, resting potential is a weighted average of each ion\'s equilibrium potential, weighted by relative permeability. Because KвЃє permeability dominates, resting potential (~в€’70 mV) sits close to KвЃє\'s equilibrium potential (~в€’90 mV via Nernst) rather than NaвЃє\'s (~+60 mV). KвЃє is actually more concentrated INSIDE the cell, not outside вЂ” it\'s the permeability difference, not the direction of the concentration gradient, that determines which ion dominates. The NaвЃє/KвЃє ATPase maintains these gradients (3 NaвЃє out for every 2 KвЃє in) but doesn\'t directly set the resting potential\'s value.'
  },
  {
    id:'n13', topic:'neuro',
    stem:'Tapping the patellar tendon stretches the quadriceps muscle, triggering the knee-jerk reflex (the leg kicks forward). This is a monosynaptic reflex because:',

          'The sensory (afferent) neuron synapses directly onto the motor (efferent) neuron in the spinal cord, with no interneuron',

          'It requires conscious processing in the cerebral cortex'],
    ans:1,
    exp:'In the patellar reflex, a muscle spindle stretch receptor in the quadriceps sends a signal via a sensory (afferent) neuron directly into the spinal cord, where it synapses directly onto a motor (efferent) neuron innervating the same quadriceps muscle вЂ” just ONE synapse between sensory input and motor output, hence "monosynaptic." Most reflexes (e.g., the withdrawal reflex from a painful stimulus) are polysynaptic, involving one or more interneurons and often coordinating reciprocal inhibition of antagonist muscles. Spinal reflexes occur without requiring the brain (though the brain can modulate them) вЂ” this is why reflexes persist even after spinal cord injury above the level of the reflex arc.'
  },
  {
    id:'n14', topic:'neuro',
    stem:'During the "fight or flight" response, the sympathetic nervous system releases norepinephrine onto target organs. Which combination of effects is correct?',
    opts:['Decreased heart rate, pupil constriction, increased digestion',

          'Decreased heart rate, pupil dilation, decreased respiratory rate'],
    ans:1,
    exp:'The sympathetic ("fight or flight") division prepares the body for acute stress: norepinephrine (and adrenal epinephrine) acting on adrenergic receptors increases heart rate and contractility (ОІ1), dilates pupils (mydriasis, for better vision), dilates bronchioles (more airflow), and shunts blood AWAY from the GI tract toward skeletal muscle вЂ” digestion is suppressed, since "rest and digest" functions belong to the parasympathetic division. Parasympathetic activity (acetylcholine) does the opposite: decreases heart rate, constricts pupils, and stimulates digestion/salivation. These two divisions of the autonomic nervous system generally have antagonistic effects on the same target organs.'
  },
  {
    id:'n15', topic:'neuro',
    stem:'Myelin sheaths insulate axons and enable saltatory conduction, dramatically increasing action potential conduction velocity. In the central nervous system, myelin is produced by:',
    opts:['Schwann cells, each of which myelinates one segment of one axon',
          'Oligodendrocytes, each of which can myelinate segments of multiple axons',
          'Astrocytes, which also help form the blood-brain barrier',
          'Microglia, the resident immune cells of the CNS'],
    ans:1,
    exp:'In the CNS, oligodendrocytes form myelin вЂ” a single oligodendrocyte extends processes that wrap segments of multiple axons (even from different neurons). In the PNS, Schwann cells perform the analogous role, but each Schwann cell myelinates only one segment of one axon (1:1). Gaps between myelinated segments (nodes of Ranvier) are rich in voltage-gated NaвЃє channels вЂ” the action potential "jumps" node to node (saltatory conduction), much faster than continuous conduction along unmyelinated axons. Demyelinating diseases (multiple sclerosis вЂ” CNS, oligodendrocytes; Guillain-BarrГ© syndrome вЂ” PNS, Schwann cells) slow or block conduction. Astrocytes support the blood-brain barrier and neuron metabolism; microglia are CNS-resident immune cells вЂ” neither produces myelin.'
  },
  {
    id:'n16', topic:'neuro',
    stem:'Parkinson\'s disease is characterized by tremor, rigidity, and bradykinesia (slowness of movement), resulting from degeneration of dopaminergic neurons in the:',
    opts:['Cerebellum, disrupting fine motor coordination',
          'Substantia nigra, disrupting the basal ganglia\'s control of voluntary movement',
          'Hippocampus, disrupting memory consolidation',
          'Broca\'s area, disrupting speech production'],
    ans:1,
    exp:'Parkinson\'s disease results from progressive loss of dopaminergic neurons in the substantia nigra (part of the basal ganglia), which normally project to the striatum and help facilitate intended movement while suppressing unwanted movement. Reduced dopamine disrupts this balance, producing the classic triad вЂ” resting tremor, rigidity, bradykinesia вЂ” plus postural instability. L-DOPA (a dopamine precursor that crosses the blood-brain barrier, unlike dopamine itself) replenishes striatal dopamine. The cerebellum coordinates fine motor timing and balance (damage causes ataxia, not Parkinsonism); the hippocampus underlies memory consolidation; Broca\'s area governs speech production вЂ” distinct localizations frequently tested against each other on the MCAT.'
  },
  {
    id:'n17', topic:'neuro',
    stem:'A patient suffers a stroke affecting the left hemisphere. She has difficulty producing speech but can still comprehend language. Which cortical area is most likely damaged?',
    opts:['Wernicke\'s area (left posterior temporal lobe)',
          'Broca\'s area (left inferior frontal lobe)',

          'The primary visual cortex (left occipital lobe)'],
    ans:1,
    exp:'Broca\'s area (inferior frontal gyrus, usually left hemisphere) is essential for speech production. Damage causes Broca\'s (expressive) aphasia: speech is halting, effortful, and telegraphic, but comprehension is largely preserved вЂ” exactly the pattern described. Wernicke\'s area (posterior superior temporal gyrus) processes language comprehension; damage causes fluent but nonsensical speech with poor comprehension (Wernicke\'s aphasia). The right primary motor cortex controls the left side of the body (motor symptoms, not language). The primary visual cortex processes visual input (not language). The double dissociation between Broca\'s and Wernicke\'s aphasias is a classic MCAT question: production deficit + intact comprehension в†’ Broca\'s; intact fluency + comprehension deficit в†’ Wernicke\'s. Skill trained: Content knowledge вЂ” language areas and aphasia.'
  },
  // в”Ђв”Ђ Thermodynamics / Gen Chem II вЂ” additional batch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  {
    id:'th11', topic:'thermo',
    stem:'Hess\'s Law allows calculation of О”H for a reaction that cannot be measured directly. The law states that:',
    opts:['О”H is always zero for a catalyzed reaction',
          'О”H for any reaction equals the sum of О”H values for reactions that algebraically add up to the target reaction',
          'О”H is determined by measuring changes in entropy and applying О”G = О”H в€’ TО”S',
          'О”H equals the average of bond energies broken minus bond energies formed'],
    ans:1,
    exp:'Hess\'s Law: since enthalpy (H) is a state function вЂ” its change depends only on initial and final states, not the path вЂ” О”H for any reaction can be obtained by algebraically combining known reactions that sum to the target. Rules: (1) reversing a reaction flips the sign of О”H; (2) multiplying a reaction by a factor multiplies О”H by the same factor. Used when a reaction cannot be measured directly (e.g., C(s) + ВЅOв‚‚ в†’ CO cannot easily be isolated from COв‚‚ formation). Hess\'s Law applies equally to other state functions: О”G and О”S can be combined the same way.'
  },
  {
    id:'th12', topic:'thermo',
    stem:'The Haber process: Nв‚‚(g) + 3Hв‚‚(g) в‡Њ 2NHв‚ѓ(g), О”H = в€’92 kJ/mol. Increasing temperature shifts equilibrium:',
    opts:['To the right вЂ” reactions are always faster and more productive at higher temperatures',
          'To the left вЂ” toward reactants, because the forward reaction is exothermic and heat acts as a product',
          'Has no effect on equilibrium position, only on reaction rate',
          'To the right, because K always increases with temperature'],
    ans:1,
    exp:'Le Chatelier\'s principle applied to temperature: raising T "adds heat." For an exothermic reaction (О”H < 0, heat is a product), adding heat shifts equilibrium LEFT toward reactants вЂ” K decreases. This is why the Haber process uses ~400вЂ“500В°C (a kinetic compromise вЂ” lower T gives higher yield but slower rate; the catalyst compensates). Unlike pressure and concentration changes, temperature changes actually alter K: for exothermic reactions K decreases with T; for endothermic reactions K increases with T. This relationship is expressed by the van\'t Hoff equation.'
  },
  {
    id:'th13', topic:'thermo',
    stem:'For a reaction with О”GВ° = в€’17.1 kJ/mol at 25В°C, the equilibrium constant K is:',
    opts:['Less than 1 (reactants favored at equilibrium)',
          'Equal to 1 (neither side favored)',
          'Greater than 1 (products favored at equilibrium)',
          'Cannot be determined without knowing О”S separately'],
    ans:2,
    exp:'О”GВ° = в€’RT ln K в†’ K = e^(в€’О”GВ°/RT). Since О”GВ° < 0, в€’О”GВ°/RT > 0 and K = e^(positive) > 1 вЂ” products are favored at equilibrium. Key relationships to memorize: О”GВ° < 0 в†” K > 1 (products favored); О”GВ° = 0 в†” K = 1; О”GВ° > 0 в†” K < 1 (reactants favored). For this example: K = e^(17100/(8.314Г—298)) в‰€ e^6.9 в‰€ 1000 вЂ” strongly product-favored. The О”GВ°вЂ“K relationship is one of the highest-yield thermodynamic connections on the MCAT: it links lab-measurable equilibrium ratios to free energy of the reaction.'
  },
  {
    id:'th14', topic:'thermo',
    stem:'On an energy diagram for an exothermic reaction, the activation energy (Ea) is defined as the energy difference between:',
    opts:['The products and the reactants',
          'The transition state and the reactants',
          'The transition state and the products',
          'The reactants and an intermediate energy well'],
    ans:1,
    exp:'Activation energy (Ea) = height of the energy barrier = energy of the transition state minus energy of reactants. It determines reaction rate (Arrhenius equation: k = Ae^(в€’Ea/RT)). О”H for the overall reaction = products minus reactants, which is negative for an exothermic reaction. A catalyst lowers Ea for both forward and reverse reactions equally, increasing rate without changing О”H, О”S, О”G, or K. The transition state is the highest-energy point on the reaction coordinate (an unstable species, not an intermediate); intermediates sit in energy "wells" between peaks and have finite lifetimes.'
  },
  {
    id:'th15', topic:'thermo',
    stem:'An electrolytic cell differs from a galvanic (voltaic) cell in that an electrolytic cell:',
    opts:['Generates spontaneous current (О”G < 0) via chemical reaction, like a battery',
          'Requires external electrical energy to drive a non-spontaneous reaction (О”G > 0, EВ°cell < 0)',
          'Uses a salt bridge to transfer electrons between half-cells',
          'Only operates with the same metal at both electrodes'],
    ans:1,
    exp:'Galvanic (voltaic) cell: spontaneous redox (О”G < 0, EВ°cell > 0) drives current вЂ” a battery or fuel cell. Electrolytic cell: external power forces a non-spontaneous reaction (О”G > 0, EВ°cell < 0) вЂ” electrolysis of water, electroplating, copper refining. In BOTH cell types: oxidation occurs at the anode, reduction at the cathode (LEO GER). The polarity convention differs: galvanic anode is negative (electrons flow out spontaneously); electrolytic anode is connected to the positive terminal of the external power supply. This distinction вЂ” and the О”G relationship (О”GВ° = в€’nFEВ°cell) вЂ” is a high-frequency MCAT trap.'
  },
  {
    id:'th16', topic:'thermo',
    stem:'Doubling [A] doubles the rate; doubling [B] quadruples the rate; doubling [C] has no effect. The overall reaction order and rate law are:',
    opts:['First order overall; rate = k[A]',
          'Third order overall; rate = k[A][B]ВІ',
          'Second order overall; rate = k[A][B]',
          'Fourth order overall; rate = k[A][B]ВІ[C]'],
    ans:1,
    exp:'Rate order in each reactant is determined experimentally from how rate responds to concentration changes. Order in A: 2^x = 2 в†’ x = 1. Order in B: 2^y = 4 в†’ y = 2. Order in C: 2^z = 1 в†’ z = 0 (C not in the rate law). Rate = k[A]В№[B]ВІ вЂ” overall 3rd order. Rate laws CANNOT be deduced from stoichiometric coefficients (except for elementary reactions). The rate constant k depends on temperature via the Arrhenius equation: k = Ae^(в€’Ea/RT). Rate law + half-life calculations are among the most calculation-intensive MCAT kinetics problems.'
  },
  {
    id:'th17', topic:'thermo',
    stem:'A radioactive isotope has a half-life of 10 days. Starting with 80 g of the isotope, how much remains after 30 days?',
    opts:['40 g вЂ” after one half-life',
          '20 g вЂ” after two half-lives',
          '10 g вЂ” after three half-lives',
          '2.67 g вЂ” 80 g divided by 30 days'],
    ans:2,
    exp:'30 days / 10 days per half-life = 3 half-lives. Each half-life halves the remaining amount: 80 g в†’ 40 g в†’ 20 g в†’ 10 g. For first-order processes (all radioactive decay; many drug elimination processes), the half-life formula is tВЅ = 0.693/k, and the amount remaining is N = Nв‚Ђ Г— (ВЅ)^(t/tВЅ). When time is an integer multiple of tВЅ, repeated halving is fastest. For non-integer multiples, use N = Nв‚Ђe^(в€’kt). The key MCAT insight: first-order half-life is CONSTANT вЂ” independent of the initial amount. This contrasts with second-order kinetics, where half-life increases as concentration falls. Content knowledge: chemical kinetics and radioactive decay.'
  },
  // в”Ђв”Ђ Sociology вЂ” additional batch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  {
    id:'sc11', topic:'soc',
    stem:'Erving Goffman\'s dramaturgical theory describes social life as theatrical performance. "Impression management" refers to:',

    ans:1,
    exp:'Goffman\'s dramaturgy: social life is like theater вЂ” we perform roles on a "front stage" (public presentations, managing appearance, props, and behavior to create desired impressions) and behave differently "backstage" (out of audience view). Impression management involves selectively revealing information about ourselves. Relevant to healthcare: patients may present an idealized "compliant patient" identity; physicians manage their professional persona. Goffman also introduced the concepts of stigma (spoiled identity), total institutions (prisons, hospitals, military), and face-saving rituals вЂ” all MCAT-tested concepts.'
  },
  {
    id:'sc12', topic:'soc',
    stem:'A student from a group subject to negative academic stereotypes performs worse on a standardized test when told beforehand that "this test measures academic ability" than when told it is a non-evaluative exercise. This demonstrates:',

    ans:1,
    exp:'Stereotype threat (Steele & Aronson, 1995): when individuals from a stereotyped group are aware that their performance might confirm a negative stereotype, the resulting anxiety and cognitive load (monitoring for stereotype-confirming behavior) reduces performance on the task itself вЂ” ironically potentially confirming the stereotype. It affects any stereotyped group (women in math, elderly on memory tests, White athletes in athletics). Interventions: growth mindset framing, emphasizing test as non-evaluative, values affirmation. Highly relevant to MCAT health equity and social psychology sections.'
  },
  {
    id:'sc13', topic:'soc',
    stem:'A person born into a low-income family achieves professional success and moves into the upper-middle class over their adult life. This change represents:',
    opts:['Intergenerational downward mobility',
