<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint — MCAT Coverage Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #08090C;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  #app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #0D0F14;
    display: flex;
    flex-direction: column;
    position: relative;
    border-left: 1px solid rgba(255,255,255,0.04);
    border-right: 1px solid rgba(255,255,255,0.04);
  }

  /* Progress bar */
  .prog-bar {
    height: 2px;
    background: rgba(255,255,255,0.06);
    position: sticky;
    top: 0;
    z-index: 20;
    flex-shrink: 0;
  }
  .prog-fill {
    height: 100%;
    background: #1D9E75;
    box-shadow: 0 0 8px rgba(29,158,117,0.6);
    transition: width 0.6s ease;
  }

  /* Screen container */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 24px 48px;
    min-height: calc(100vh - 3px);
  }

  /* Typography */
  h1 { font-size: 30px; font-weight: 800; line-height: 1.15; color: #F0F2F8; letter-spacing: -0.03em; }
  h2 { font-size: 22px; font-weight: 700; line-height: 1.25; color: #F0F2F8; letter-spacing: -0.02em; }
  p  { color: #6B7185; line-height: 1.65; }

  .label {
    font-size: 11px;
    font-weight: 700;
    color: #1D9E75;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 15px 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .btn-primary {
    background: #1D9E75;
    color: #fff;
    font-weight: 600;
    letter-spacing: -0.01em;
    box-shadow: 0 0 28px rgba(29,158,117,0.35), 0 2px 8px rgba(0,0,0,0.5);
  }
  .btn-primary:hover  { background: #22B585; box-shadow: 0 0 40px rgba(29,158,117,0.5), 0 4px 14px rgba(0,0,0,0.4); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); box-shadow: 0 0 18px rgba(29,158,117,0.3); }
  .btn-primary:disabled { background: rgba(29,158,117,0.25); color: rgba(255,255,255,0.4); cursor: default; box-shadow: none; }
  .btn-ghost {
    background: transparent;
    color: #555B70;
    border: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18); color: #8A90A8; }

  /* Year selection */
  .year-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #131520;
    border: 1.5px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 15px;
    font-weight: 500;
    color: #D0D3E0;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: inherit;
    transition: all 0.15s;
    text-align: left;
  }
  .year-btn:hover { background: #191D2A; border-color: rgba(255,255,255,0.16); }
  .year-btn.selected { border: 1.5px solid #1D9E75; background: rgba(29,158,117,0.1); color: #4DE3AB; box-shadow: 0 0 16px rgba(29,158,117,0.1); }
  .year-hint { font-size: 12px; color: #444B62; }
  .year-btn.selected .year-hint { color: #22B585; }

  /* Course checkboxes */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #333A52;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 16px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }

  .course-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 13px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    margin-bottom: 7px;
    cursor: pointer;
    font-size: 14px;
    color: #B0B5C8;
    user-select: none;
    transition: background 0.12s;
    background: #131520;
  }
  .course-row:hover { background: #191D2A; border-color: rgba(255,255,255,0.13); }
  .course-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #1D9E75;
    flex-shrink: 0;
  }
  .courses-scroll { overflow-y: auto; flex: 1; margin: 0 -2px; padding: 0 2px; }

  /* Coverage reveal */
  .coverage-num {
    font-size: 80px;
    font-weight: 800;
    color: #1D9E75;
    line-height: 1;
    text-align: center;
    letter-spacing: -0.04em;
    text-shadow: 0 0 40px rgba(29,158,117,0.4);
  }
  .coverage-sub {
    font-size: 13px;
    color: #444B62;
    text-align: center;
    margin-top: 4px;
  }
  .coverage-track {
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    margin: 12px 0 18px;
    overflow: hidden;
  }
  .coverage-fill {
    height: 100%;
    background: #1D9E75;
    border-radius: 3px;
    width: 0%;
    box-shadow: 0 0 8px rgba(29,158,117,0.5);
    transition: width 1.5s cubic-bezier(0.2, 0.8, 0.4, 1);
  }

  /* Map */
  .map-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #777;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .map-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  /* On-track card */
  .info-card {
    background: rgba(29,158,117,0.08);
    border: 1px solid rgba(29,158,117,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .info-card p { color: #4DE3AB; font-size: 13px; line-height: 1.55; }

  /* Logo mark */
  .logo-box {
    width: 48px;
    height: 48px;
    background: rgba(29,158,117,0.12);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  /* Question screen */
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .q-count { font-size: 13px; color: #444B62; }
  .q-tag {
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,0.07);
    color: #6B7185;
    padding: 3px 10px;
    border-radius: 12px;
  }
  .q-stem {
    font-size: 16px;
    color: #E0E3EE;
    line-height: 1.7;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .cars-passage {
    background: #131520;
    border-left: 3px solid #1D9E75;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #7A8098;
    line-height: 1.75;
    font-style: italic;
  }
  .ans-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #131520;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 14px;
    font-weight: 500;
    color: #C0C4D8;
    cursor: pointer;
    margin-bottom: 9px;
    font-family: inherit;
    line-height: 1.45;
    transition: background 0.12s, border-color 0.12s, box-shadow 0.12s, transform 0.1s;
  }
  .ans-btn:hover:not(:disabled) { background: #191D2A; border-color: rgba(255,255,255,0.16); transform: translateY(-1px); }
  .ans-btn:active:not(:disabled) { transform: translateY(0); }
  .ans-btn.correct  { background: rgba(29,158,117,0.12); border-color: #1D9E75; color: #4DE3AB; font-weight: 600; box-shadow: 0 0 16px rgba(29,158,117,0.15); }
  .ans-btn.wrong    { background: rgba(216,90,48,0.1); border-color: #D85A30; color: #F08060; box-shadow: 0 0 16px rgba(216,90,48,0.1); }
  .ans-btn.dim      { opacity: 0.2; transform: none; box-shadow: none; }

  .explanation {
    border-left: 3px solid #1D9E75;
    background: #131520;
    padding: 13px 15px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    line-height: 1.7;
    color: #7A8098;
    margin: 10px 0 16px;
  }
  .explanation.wrong { border-left-color: #D85A30; }

  /* Complete screen */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 0 0 20px;
  }
  .stat-box {
    background: #131520;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; color: #E0E3EE; letter-spacing: -0.02em; }
  .stat-num.teal { color: #1D9E75; text-shadow: 0 0 20px rgba(29,158,117,0.3); }
  .stat-lbl { font-size: 11px; color: #3A4060; margin-top: 3px; font-weight: 500; }

  .today-note {
    font-size: 10px;
    color: #3A4060;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .today-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #1D9E75;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(29,158,117,0.6);
  }

  /* ── Keyframe animations ──────────────────────────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes correct-pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.025); box-shadow: 0 0 0 4px rgba(29,158,117,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  @keyframes wrong-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-7px); }
    40%     { transform: translateX(7px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop-in {
    0%   { transform: scale(0.9); opacity: 0; }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }

  .screen { animation: fade-up 0.22s ease both; }
  .ans-btn.correct  { animation: correct-pulse 0.45s ease both; }
  .ans-btn.wrong    { animation: wrong-shake 0.4s ease both; }
  .explanation      { animation: slide-in 0.3s ease both; }

  /* ── Section color tokens ─────────────────────────────────────────── */
  .tag-bb   { background: rgba(29,158,117,0.15);  color: #4DE3AB; }
  .tag-cp   { background: rgba(245,158,11,0.15);  color: #FCD34D; }
  .tag-ps   { background: rgba(139,92,246,0.15);  color: #C4B5FD; }
  .tag-cars { background: rgba(59,130,246,0.15);  color: #93C5FD; }

  /* ── Landing screen ───────────────────────────────────────────────── */
  .app-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .app-brand-icon {
    width: 36px;
    height: 36px;
    background: rgba(29,158,117,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .app-brand-name {
    font-size: 16px;
    font-weight: 700;
    color: #E0E3EE;
    letter-spacing: -0.02em;
  }
  .landing-example {
    background: #131520;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .landing-example-label {
    font-size: 11px;
    font-weight: 700;
    color: #1D9E75;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .topic-pill {
    display: inline-block;
    background: rgba(29,158,117,0.15);
    color: #4DE3AB;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .lf-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .lf-icon {
    width: 30px;
    height: 30px;
    background: rgba(29,158,117,0.12);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .lf-title {
    font-size: 14px;
    font-weight: 600;
    color: #E0E3EE;
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .lf-body {
    font-size: 13px;
    color: #555B70;
    line-height: 1.5;
  }

  /* ── Brief screen ─────────────────────────────────────────────────── */
  .brief-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #FFF3EC;
    border-radius: 20px;
    padding: 5px 10px;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const COURSES = [
  { id:'bio1',   name:'Biology I',             section:'Biology'         },
  { id:'bio2',   name:'Biology II',            section:'Biology'         },
  { id:'gc1',    name:'General Chemistry I',   section:'Chemistry'       },
  { id:'gc2',    name:'General Chemistry II',  section:'Chemistry'       },
  { id:'oc1',    name:'Organic Chemistry I',   section:'Chemistry'       },
  { id:'oc2',    name:'Organic Chemistry II',  section:'Chemistry'       },
  { id:'biochem',name:'Biochemistry',          section:'Chemistry'       },
  { id:'ph1',    name:'Physics I',             section:'Physics & Math'  },
  { id:'ph2',    name:'Physics II',            section:'Physics & Math'  },
  { id:'stats',  name:'Statistics',            section:'Physics & Math'  },
  { id:'psych',  name:'Psychology',            section:'Social Sciences' },
  { id:'soc',    name:'Sociology',             section:'Social Sciences' },
];

// Typical premed course set by year — used to compute benchmark coverage
const BENCHMARK_COURSES = {
  freshman:  new Set(['bio1', 'gc1']),
  sophomore: new Set(['bio1', 'bio2', 'gc1', 'gc2', 'oc1']),
  junior:    new Set(['bio1', 'bio2', 'gc1', 'gc2', 'oc1', 'oc2', 'ph1', 'biochem', 'psych']),
  senior:    new Set(['bio1', 'bio2', 'gc1', 'gc2', 'oc1', 'oc2', 'biochem', 'ph1', 'ph2', 'psych', 'stats']),
};

// weights sum to 100; bio1 + gc1 + stats = 24
// mcat: bb = Bio & Biochem, cp = Chem & Physics, ps = Psych & Soc, cars = CARS
const TOPICS = [
  { id:'cell-bio', name:'Cell biology',      w:4,  course:'bio1',  disp:'Bio I',       mcat:'bb'   },
  { id:'genetics', name:'Genetics',          w:3,  course:'bio1',  disp:'Bio I',       mcat:'bb'   },
  { id:'mol-bio',  name:'Mol. biology',      w:3,  course:'bio1',  disp:'Bio I',       mcat:'bb'   },
  { id:'biochem',  name:'Biochemistry',      w:8,  course:'biochem',disp:'Biochem',    mcat:'bb'   },
  { id:'physio',   name:'Physiology',        w:6,  course:'bio2',  disp:'Bio II',      mcat:'bb'   },
  { id:'neuro',    name:'Neuroscience',      w:4,  course:'bio2',  disp:'Bio II',      mcat:'bb'   },
  { id:'atomic',   name:'Atomic structure',  w:3,  course:'gc1',   disp:'Gen Chem I',  mcat:'cp'   },
  { id:'bonding',  name:'Chem bonding',      w:3,  course:'gc1',   disp:'Gen Chem I',  mcat:'cp'   },
  { id:'stoich',   name:'Stoichiometry',     w:2,  course:'gc1',   disp:'Gen Chem I',  mcat:'cp'   },
  { id:'acid-base',name:'Acid-base',         w:2,  course:'gc1',   disp:'Gen Chem I',  mcat:'cp'   },
  { id:'thermo',   name:'Thermodynamics',    w:4,  course:'gc2',   disp:'Gen Chem II', mcat:'cp'   },
  { id:'orgo',     name:'Org. chemistry',    w:8,  course:'oc1',   disp:'Orgo I',      mcat:'cp'   },
  { id:'physics',  name:'Physics',           w:7,  course:'ph1',   disp:'Physics I',   mcat:'cp'   },
  { id:'psych',    name:'Psychology',        w:11, course:'psych', disp:'Psych',       mcat:'ps'   },
  { id:'soc',      name:'Sociology',         w:7,  course:'soc',   disp:'Soc',         mcat:'ps'   },
  { id:'research', name:'Research methods',  w:4,  course:'stats', disp:'Statistics',  mcat:'ps'   },
  { id:'cars',     name:'CARS',              w:21, course:null,    disp:'Ongoing',     mcat:'cars' },
];

const MCAT_SECTIONS = [
  { id:'bb',   short:'Bio & Biochem',   long:'Biological & Biochemical Foundations'      },
  { id:'cp',   short:'Chem & Physics',  long:'Chemical & Physical Foundations'           },
  { id:'ps',   short:'Psych & Soc',     long:'Psychological, Social & Behavioral'        },
  { id:'cars', short:'CARS',            long:'Critical Analysis & Reasoning Skills'      },
];

const QUESTIONS = [
  // ── Biology I ───────────────────────────────────────────────────────────────
  {
    id:'b01', topic:'cell-bio',
    stem:'A researcher treats isolated cells with a drug that blocks all G-protein coupled receptor (GPCR) signaling. Which hormonal response would most likely be disrupted?',
    opts:['Insulin stimulation of glucose uptake in skeletal muscle',
          'Epinephrine-induced glycogen breakdown in the liver',
          'Cortisol suppression of immune function',
          'Thyroxine regulation of basal metabolic rate'],
    ans:1,
    exp:'Epinephrine acts through beta-adrenergic receptors — classic GPCRs that activate adenylyl cyclase and raise cAMP. Insulin uses a receptor tyrosine kinase. Cortisol and thyroxine are lipid-soluble hormones that diffuse into cells and bind intracellular receptors — no GPCR involved.'
  },
  {
    id:'b02', topic:'cell-bio',
    stem:'A cell is placed in a hypotonic solution. Which outcome is most expected?',
    opts:['Water moves out of the cell, causing it to shrink',
          'Water moves into the cell by osmosis, causing it to swell',
          'Solutes move into the cell to equalize concentration',
          'No net movement occurs because the membrane is selectively impermeable'],
    ans:1,
    exp:'In a hypotonic solution, solute concentration is lower outside than inside the cell. Water moves down its concentration gradient into the cell (osmosis), causing swelling and potential lysis. Solutes cannot freely cross the semipermeable membrane — only water moves by osmosis.'
  },
  {
    id:'b03', topic:'cell-bio',
    stem:'Most ATP in aerobic cells is produced at which location?',
    opts:['Cytoplasm, during glycolysis',
          'Nucleus, during transcription',
          'Mitochondrial matrix, during the Krebs cycle',
          'Inner mitochondrial membrane, during oxidative phosphorylation'],
    ans:3,
    exp:'~32–34 ATP per glucose are generated at the inner mitochondrial membrane via the electron transport chain and ATP synthase (oxidative phosphorylation). Glycolysis produces a net 2 ATP in the cytoplasm. The Krebs cycle yields NADH and FADH₂ that fuel the ETC — not ATP directly.'
  },
  {
    id:'b04', topic:'cell-bio',
    stem:'An inhibitor competes with substrate at the active site. As inhibitor concentration increases, what is observed kinetically?',
    opts:['Vmax increases, Km decreases',
          'Vmax is unchanged, Km increases',
          'Both Vmax and Km decrease',
          'Vmax decreases, Km is unchanged'],
    ans:1,
    exp:'Competitive inhibitors bind the active site and can be outcompeted by more substrate. Vmax stays the same (the inhibitor can be displaced) but apparent Km increases (lower apparent substrate affinity). This kinetic signature — unchanged Vmax, higher Km — distinguishes competitive from noncompetitive inhibition.'
  },
  {
    id:'b05', topic:'cell-bio',
    stem:'Which second messenger is produced when a Gₛ protein activates adenylyl cyclase?',
    opts:['Inositol triphosphate (IP₃)',
          'Diacylglycerol (DAG)',
          'Cyclic AMP (cAMP)',
          'Calcium ions (Ca²⁺)'],
    ans:2,
    exp:'Gₛ-activated adenylyl cyclase converts ATP → cAMP, which activates protein kinase A (PKA). IP₃ and DAG are produced by a different pathway via phospholipase C. Calcium acts as a second messenger downstream of IP₃, not directly from adenylyl cyclase.'
  },
  {
    id:'b06', topic:'genetics',
    stem:'Two heterozygous parents (Aa × Aa) produce offspring. What fraction will be homozygous dominant (AA)?',
    opts:['1/4','1/2','3/4','1/8'],
    ans:0,
    exp:'A Punnett square for Aa × Aa yields: ¼ AA, ½ Aa, ¼ aa. Only ¼ are homozygous dominant. The phenotypic ratio (3 dominant : 1 recessive) differs from the genotypic ratio (1:2:1). This distinction appears frequently on the MCAT.'
  },
  {
    id:'b07', topic:'genetics',
    stem:'Which statement correctly describes a key difference between mitosis and meiosis?',
    opts:['Mitosis produces genetically unique cells; meiosis produces identical copies',
          'Meiosis results in four haploid cells; mitosis results in two diploid cells',
          'DNA replication occurs before mitosis but not before meiosis',
          'Meiosis occurs in somatic cells; mitosis occurs in reproductive tissue'],
    ans:1,
    exp:'Meiosis produces four genetically unique haploid gametes through two rounds of division. Mitosis produces two genetically identical diploid somatic cells. S-phase (DNA replication) precedes both. Meiosis occurs in gonads; mitosis drives growth and repair in most somatic tissues.'
  },
  {
    id:'b08', topic:'genetics',
    stem:'Which best describes the conditions for Hardy-Weinberg equilibrium?',
    opts:['A population where natural selection is actively occurring',
          'A small, isolated population with high rates of genetic drift',
          'A large, randomly mating population with no mutation, selection, or migration',

const S = {
  screen:         'landing',
  year:           null,
  courses:        new Set(),
  session:        [],
  idx:            0,
  answers:        [],   // [{qId, chosen, correct}]
  answered:       null, // chosen index while on a question, null = not yet answered
  streak:         0,
  lastDate:       null,
  qStats:         {},   // {qId: {right:N, wrong:N}} — per-question accuracy
  totalAnswered:  0,    // lifetime question count
  sessionHistory: [],   // last 7 sessions [{date, correct, total}]
  milestonesShown: {}, // {10: true, 50: true, ...} — so milestone banners only show once
};

// ── STORAGE ───────────────────────────────────────────────────────────────────

function save() {
  localStorage.setItem('wp_courses',  JSON.stringify([...S.courses]));
  localStorage.setItem('wp_year',     S.year || '');
  localStorage.setItem('wp_streak',   String(S.streak));
  localStorage.setItem('wp_lastDate', S.lastDate || '');
  localStorage.setItem('wp_qstats',   JSON.stringify(S.qStats));
  localStorage.setItem('wp_total',    String(S.totalAnswered));
  localStorage.setItem('wp_history',    JSON.stringify(S.sessionHistory.slice(-7)));
  localStorage.setItem('wp_milestones', JSON.stringify(S.milestonesShown));
}

function load() {
  try {
    const c = localStorage.getItem('wp_courses');
    if (c) S.courses = new Set(JSON.parse(c));
    S.year     = localStorage.getItem('wp_year')     || null;
    S.streak   = parseInt(localStorage.getItem('wp_streak')   || '0', 10);
    S.lastDate = localStorage.getItem('wp_lastDate') || null;

    const qs = localStorage.getItem('wp_qstats');
    if (qs) S.qStats = JSON.parse(qs);
    S.totalAnswered = parseInt(localStorage.getItem('wp_total') || '0', 10);
    const hist = localStorage.getItem('wp_history');
    if (hist) S.sessionHistory = JSON.parse(hist);
    const ms = localStorage.getItem('wp_milestones');
    if (ms) S.milestonesShown = JSON.parse(ms);

    // Reset streak if more than 1 day has passed
    if (S.lastDate) {
      const diffDays = (new Date() - new Date(S.lastDate)) / 86400000;
      if (diffDays > 1.5) S.streak = 0;
    }
  } catch(e) { /* first visit, localStorage might not be available */ }
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────

function coverage(courses) {
  return TOPICS.reduce((n, t) => n + (t.course && courses.has(t.course) ? t.w : 0), 0);
}

function buildSession() {
  // course === null means "always available" (CARS is ongoing, not tied to a specific course)
  const covered = new Set(TOPICS.filter(t => t.course === null || (t.course && S.courses.has(t.course))).map(t => t.id));
  const pool    = QUESTIONS.filter(q => covered.has(q.topic));

  // Questions the user has gotten wrong more than right — surface these first
  const needsWork = pool.filter(q => {
    const st = S.qStats[q.id];
    return st && st.wrong > 0 && st.wrong > st.right;
  }).sort(() => Math.random() - 0.5);

  // Everything else (unseen or mastered)
  const fresh = pool.filter(q => {
    const st = S.qStats[q.id];
    return !st || st.wrong === 0 || st.right >= st.wrong;
  }).sort(() => Math.random() - 0.5);

  // Up to 2 "needs work" questions first, then fill to 5 with fresh
  return [...needsWork.slice(0, 2), ...fresh].slice(0, Math.min(5, pool.length));
}

function wrongCount() {
  // How many questions in the covered pool still need work
  const covered = new Set(TOPICS.filter(t => t.course === null || (t.course && S.courses.has(t.course))).map(t => t.id));
  return QUESTIONS.filter(q => {
    if (!covered.has(q.topic)) return false;
    const st = S.qStats[q.id];
    return st && st.wrong > 0 && st.wrong > st.right;
  }).length;
}

function todayTopics() {
  return new Set(S.answers.map(a => {
    const q = QUESTIONS.find(x => x.id === a.qId);
    return q ? q.topic : null;
  }).filter(Boolean));
}

function mapHTML(mini, highlightTopics = new Set()) {
  const mw  = mini ? '54px' : '66px';
  const pad = mini ? '5px 7px' : '7px 8px';
  const fs  = mini ? '9px' : '10px';
  const fs2 = mini ? '8px' : '9px';

  return TOPICS.map(t => {
    const covered = t.course && S.courses.has(t.course);
    const dot = covered && highlightTopics.has(t.id)
      ? `<span style="display:inline-block;width:5px;height:5px;background:#1D9E75;border-radius:50%;vertical-align:middle;margin-left:3px;"></span>` : '';

    let bg, bdr, nc, dc;
    if (covered) { bg='rgba(29,158,117,0.12)'; bdr='rgba(29,158,117,0.35)'; nc='#4DE3AB'; dc='#2DB88A'; }
    else         { bg='#131520'; bdr='rgba(255,255,255,0.07)'; nc='#3A4060'; dc='#2E3550'; }

    return `<div style="background:${bg};border:1px solid ${bdr};border-radius:6px;padding:${pad};flex:1;min-width:${mw};">
      <div style="font-size:${fs};color:${nc};font-weight:500;line-height:1.2;">${t.name}${dot}</div>
      <div style="font-size:${fs2};color:${dc};margin-top:2px;">${covered ? '✓ ' : ''}${t.disp}</div>
    </div>`;
  }).join('');
}

// ── SECTIONED MAP (reveal screen) ─────────────────────────────────────────────

function sectionedMapHTML() {
  return MCAT_SECTIONS.map(sec => {
    const secTopics  = TOPICS.filter(t => t.mcat === sec.id);
    const secTotal   = secTopics.reduce((s, t) => s + t.w, 0);
    const secCovered = secTopics.reduce((s, t) => s + (t.course && S.courses.has(t.course) ? t.w : 0), 0);
    const secPct     = Math.round(secCovered / secTotal * 100);
    const hasAny     = secCovered > 0;

    const tiles = secTopics.map(t => {
      const covered = t.course && S.courses.has(t.course);
      const bg  = covered ? 'rgba(29,158,117,0.12)' : '#131520';
      const bdr = covered ? 'rgba(29,158,117,0.35)' : 'rgba(255,255,255,0.07)';
      const nc  = covered ? '#4DE3AB' : '#3A4060';
      const dc  = covered ? '#2DB88A' : '#2E3550';
      const wc  = covered ? '#1D9E75' : '#2E3550';
      return `<div style="background:${bg};border:1px solid ${bdr};border-radius:7px;padding:8px 9px;flex:1;min-width:72px;">
        <div style="font-size:10px;color:${nc};font-weight:500;line-height:1.2;">${t.name}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
          <div style="font-size:9px;color:${dc};">${covered ? '✓ ' : ''}${t.disp}</div>
          <div style="font-size:9px;font-weight:600;color:${wc};">${t.w}%</div>
        </div>
      </div>`;
    }).join('');

    return `
      <div style="margin-bottom:22px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:600;color:#555B70;text-transform:uppercase;letter-spacing:0.05em;">${sec.short}</div>
          <div style="font-size:11px;color:${hasAny ? '#1D9E75' : '#2E3550'};">${secCovered > 0 ? secCovered + '/' : ''}${secTotal}%</div>
        </div>
        <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:10px;overflow:hidden;">
          <div class="sec-bar-fill" data-w="${secPct}" style="height:100%;width:0%;background:#1D9E75;border-radius:2px;transition:width 1.2s ease;"></div>

// ── SPARKLINE ─────────────────────────────────────────────────────────────────

function sparklineHTML(history) {
  if (!history.length) return '';
  return `
    <div style="display:flex;gap:4px;align-items:flex-end;height:28px;margin:2px 0 6px;">
      ${history.map(s => {
        const ratio = s.total > 0 ? s.correct / s.total : 0;
        const h     = Math.round(ratio * 22) + 6; // 6–28px
        const col   = ratio === 1 ? '#1D9E75' : ratio >= 0.6 ? '#5BC4A0' : '#9FE1CB';
        return `<div title="${s.correct}/${s.total}" style="width:10px;height:${h}px;background:${col};border-radius:2px;flex-shrink:0;"></div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:#3A4060;margin-bottom:16px;">last ${history.length} session${history.length !== 1 ? 's' : ''}</div>`;
}

function getWelcomeHeadline() {
  const streak  = S.streak;
  const history = S.sessionHistory;
  if (streak === 0 && history.length > 0) return 'The edge is still there. Keep building.';
  if (streak <= 1 && history.length <= 1) return 'Day one. Most classmates haven\'t started yet.';
  if (streak === 2)  return "Day 2. You're already ahead.";
  if (streak === 3)  return 'Day 3. The gap is growing.';
  if (streak === 4)  return 'Day 4. This is what getting ahead looks like.';
  if (streak === 5)  return 'Day 5. Most year-3 classmates wish they\'d started here.';
  if (streak === 6)  return 'Day 6. Six days of compound interest.';
  if (streak === 7)  return "One week. You've built something real.";
  if (streak === 14) return 'Two weeks in. The gap between you and your future classmates is widening.';
  if (streak === 30) return "Day 30. You're building an edge most classmates never get.";
  if (streak > 30)   return `Day ${streak}. Keep compounding.`;
  return `Day ${streak}. Still ahead.`;
}

function getTrendInsight(history) {
  if (history.length < 2) return '';
  const last  = history[history.length - 1];
  const prev  = history[history.length - 2];
  const lastR = last.total  > 0 ? last.correct  / last.total  : 0;
  const prevR = prev.total  > 0 ? prev.correct  / prev.total  : 0;
  const lastP = Math.round(lastR * 100);

  if (history.length >= 3) {
    const avg = history.slice(-3).reduce((s, h) => s + (h.total > 0 ? h.correct / h.total : 0), 0) / 3;
    const avgP = Math.round(avg * 100);
    if (lastR > prevR + 0.15) return `Accuracy trending up — ${lastP}% last session.`;
    if (lastR < prevR - 0.15) return `Tougher session last time. That's exactly what builds retention.`;
    return `Consistent at ${avgP}% over your last 3 sessions.`;
  }
  if (lastR === 1)  return 'Perfect last session. Let\'s see if it holds.';
  if (lastR >= 0.8) return `Strong last session — ${lastP}% accuracy.`;
  if (lastR >= 0.6) return `${lastP}% last session. The hard ones build the most.`;
  return 'Tough last session. Today\'s a new one.';
}

function getTopicInsight() {
  if (!S.answers || !S.answers.length) return '';
  const sessionTopics = [...new Set(S.answers.map(a => {
    const q = QUESTIONS.find(q => q.id === a.qId);
    return q ? q.topic : null;
  }).filter(Boolean))];
  const withCrunch = sessionTopics
    .map(tid => ({ tid, topic: TOPICS.find(t => t.id === tid), desc: TOPIC_CRUNCH[tid] }))
    .filter(x => x.topic && x.desc)
    .sort((a, b) => b.topic.w - a.topic.w);
  if (!withCrunch.length) return '';
  const { topic, desc } = withCrunch[0];
  return `
    <div style="background:#131520;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:#1D9E75;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">You just practiced</div>
      <div style="font-size:15px;font-weight:600;color:#F0F2F8;margin-bottom:5px;">${topic.name}</div>
      <p style="font-size:13px;color:#6B7185;line-height:1.5;">${desc}</p>
    </div>`;
}

function getMilestone() {
  const hit = MILESTONES.filter(m => S.totalAnswered >= m.at && !S.milestonesShown[m.at]);
  if (!hit.length) return '';
  const m = hit[hit.length - 1]; // highest unseen milestone
  S.milestonesShown[m.at] = true;
  save();
  return `<div style="background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.3);border-radius:10px;padding:13px 16px;margin-bottom:16px;">
    <div style="font-size:10px;font-weight:700;color:#1D9E75;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Milestone</div>
    <p style="font-size:14px;color:#4DE3AB;line-height:1.5;">${m.text}</p>
  </div>`;
}

function sectionTag(mcat) {
  const map = { bb:'tag-bb', cp:'tag-cp', ps:'tag-ps', cars:'tag-cars' };
  return map[mcat] || 'tag-bb';
}

function getMasteredTopic() {
  const covered = new Set(TOPICS.filter(t => t.course && S.courses.has(t.course)).map(t => t.id));
  const byTopic = {};
  QUESTIONS.forEach(q => {
    const st = S.qStats[q.id];
    if (!st || !covered.has(q.topic)) return;
    if (!byTopic[q.topic]) byTopic[q.topic] = { right: 0, wrong: 0 };
    byTopic[q.topic].right += st.right;
    byTopic[q.topic].wrong += st.wrong;
  });
  const mastered = Object.entries(byTopic)
    .filter(([id, st]) => st.right >= 3 && st.right >= st.wrong * 3)
    .sort((a, b) => b[1].right - a[1].right);
  if (!mastered.length) return '';
  const [topicId, st] = mastered[0];
  const topic = TOPICS.find(t => t.id === topicId);
  if (!topic) return '';
  return `<div style="background:#131520;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:13px 16px;margin-bottom:16px;">
    <p style="font-size:14px;color:#6B7185;line-height:1.5;">You're owning <strong style="color:#4DE3AB;">${topic.name}</strong> — right ${st.right} time${st.right !== 1 ? 's' : ''}, no unresolved misses.</p>
  </div>`;
}

function screenReveal() {
  const cov  = coverage(S.courses);
  const nCov = TOPICS.filter(t => t.course && S.courses.has(t.course)).length;

  // Headline scales with how much they have
  let headline, subhead;
  // Honest benchmarks based on actual course weights:
  // ~20% = end of freshman year (Bio I + Gen Chem I)
  // ~42% = end of sophomore year (+ Bio II, Gen Chem II, Orgo I)
  // ~68% = end of junior year (+ Physics I, Biochem, Psych)
  // ~79% = max (all courses)
  if (cov === 0) {
    headline = 'Your MCAT map.';
    subhead  = 'Select your completed courses to see your coverage.';
  } else if (cov < 15) {
    headline = `${nCov} content area${nCov !== 1 ? 's' : ''} unlocked.`;
    subhead  = `${cov}% covered — the map is just starting to fill in. Most classmates aren't thinking about this yet.`;
  } else if (cov <= 22) {
    headline = `${nCov} content areas unlocked.`;
    subhead  = `${cov}% covered. That's about where most classmates finish freshman year. You have the whole map ahead.`;
  } else if (cov <= 44) {
    headline = `${nCov} content areas unlocked.`;
    subhead  = `${cov}% covered — sophomore territory. Most classmates land around here by end of year 2.`;
  } else if (cov <= 68) {
    headline = `${nCov} content areas unlocked.`;
    subhead  = `${cov}% covered. That's junior-year ground. Most classmates are still working through these courses right now.`;
  } else {
    headline = `${nCov} content areas unlocked.`;
    subhead  = `${cov}% covered. Senior-year MCAT territory — you've built most of the content foundation.`;

  const nextCourse = COURSES
    .filter(c => !S.courses.has(c.id))
    .map(c => ({ ...c, gain: TOPICS.filter(t => t.course === c.id).reduce((s, t) => s + t.w, 0) }))

    .sort((a, b) => b.gain - a.gain)[0];

  return `

function getRetentionHTML(sessionAnswers) {
  const sessionTopics = [...new Set(sessionAnswers.map(a => {
    const q = QUESTIONS.find(q => q.id === a.qId);
    return q ? q.topic : null;
  }).filter(Boolean))];

  const rows = sessionTopics.map(tid => {
    const topic = TOPICS.find(t => t.id === tid);
    const topicQs = QUESTIONS.filter(q => q.topic === tid);
    const stats = topicQs.reduce((acc, q) => {
      const s = S.qStats[q.id];
      if (s) { acc.right += s.right; acc.wrong += s.wrong; }
      return acc;
    }, { right: 0, wrong: 0 });
    const total = stats.right + stats.wrong;
    if (!topic || total < 2) return null;
    const pct = Math.round(stats.right / total * 100);
    return { topic, pct, total };
  }).filter(Boolean).sort((a, b) => b.total - a.total);

  if (!rows.length) return '';

  return `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:600;color:#2E3550;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;">Your retention</div>
      ${rows.map(({ topic, pct, total }) => {
        const color = pct >= 70 ? '#1D9E75' : pct >= 50 ? '#F59E0B' : '#555B70';
        return `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="font-size:13px;color:#C0C4D8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${topic.name}</div>
            <div style="font-size:11px;color:#3A4060;flex-shrink:0;">${total}×</div>
            <div style="font-size:13px;font-weight:600;color:${color};width:34px;text-align:right;flex-shrink:0;">${pct}%</div>
            <div style="width:52px;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;flex-shrink:0;">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function screenComplete() {
  const correct = S.answers.filter(a => a.correct).length;
  const total   = S.answers.length;
  const cov     = coverage(S.courses);
  const tt      = todayTopics();
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let scoreHeadline, scoreNote;
  if (pct === 100) {
    scoreHeadline = 'Perfect session.';
    scoreNote     = 'The MCAT is just this, repeated. You\'re building the right habits.';
  } else if (pct >= 80) {
    scoreHeadline = 'Strong session.';
    scoreNote     = `${correct} out of ${total} — the one${correct < total - 1 ? 's' : ''} you missed is exactly what practice is for.`;
  } else if (pct >= 60) {
    scoreHeadline = 'Good session.';
    scoreNote     = 'Solid work. The questions you got wrong today are the ones you\'ll own next week.';
  } else {
    scoreHeadline = 'Tough session.';
    scoreNote     = 'That\'s the point. Hard questions now mean easy points on test day.';
  }

  // Count questions that were previously wrong and got right this session
  const fixedCount = S.answers.filter(a => {
    if (!a.correct) return false;
    const prev = S.qStats[a.qId];
    // Was wrong before this session started — check if it had more wrongs than rights
    // (we already updated qStats during the session, so subtract this session's right)
    if (!prev) return false;
    const prevRight = prev.right - 1; // remove this session's right answer
    const prevWrong = prev.wrong;
    return prevWrong > 0 && prevWrong > prevRight;
  }).length;

  const fixedNote = fixedCount > 0
    ? `<div style="background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;">
        <p style="font-size:13px;color:#4DE3AB;line-height:1.5;">✓ You fixed <strong>${fixedCount} question${fixedCount !== 1 ? 's' : ''}</strong> that had you stumped before. That's what practice is.</p>
       </div>`
    : '';

  const topicInsight = getTopicInsight();
  const retention    = getRetentionHTML(S.answers);

  return `
    <div class="screen">
      <h2>${scoreHeadline}</h2>
      <p style="margin:6px 0 16px;font-size:15px;">${scoreNote}</p>

      ${fixedNote}
      ${topicInsight}

      <div class="today-note">
        <span class="today-dot"></span>practiced today
      </div>
      <div class="map-grid" id="map-mini"></div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${correct}/${total}</div>
          <div class="stat-lbl">today</div>
        </div>
        <div class="stat-box">
          <div class="stat-num teal">${cov}%</div>
          <div class="stat-lbl">covered</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${S.streak}</div>
          <div class="stat-lbl">day streak</div>
        </div>
      </div>

      ${retention}

      <button class="btn btn-primary" id="reminder-btn" onclick="setReminder(this)">Set a daily reminder</button>
      <button class="btn btn-ghost" onclick="go('brief')">Done for today</button>
      <button class="btn btn-ghost" onclick="go('reveal')">See my full map</button>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function go(screen) {
  S.screen = screen;
  render();
}

function selectYear(year) {
  S.year = year;
  save();
  render(); // show selection briefly
  setTimeout(() => go('courses'), 300);
}

function toggleCourse(id, checked) {
  checked ? S.courses.add(id) : S.courses.delete(id);
  save();
}

function startSession() {
  S.session  = buildSession();
  S.idx      = 0;
  S.answers  = [];
  S.answered = null;
  if (!S.session.length) {
    alert('No questions available yet. Please select at least one course first.');
    go('courses');
    return;
  }
  go('question');
}

function answer(i) {
  const q       = S.session[S.idx];
  const correct = i === q.ans;
  S.answered    = i;
  S.answers.push({ qId: q.id, chosen: i, correct });

  // Track per-question accuracy
  if (!S.qStats[q.id]) S.qStats[q.id] = { right: 0, wrong: 0 };
  if (correct) S.qStats[q.id].right++;
  else         S.qStats[q.id].wrong++;

  render();
}

function next() {
  S.idx++;
  S.answered = null;
  if (S.idx >= S.session.length) {
    const correct = S.answers.filter(a => a.correct).length;
    const total   = S.answers.length;

    // Save session to history (keep last 7)
    S.sessionHistory.push({ date: new Date().toDateString(), correct, total });
    if (S.sessionHistory.length > 7) S.sessionHistory = S.sessionHistory.slice(-7);
    S.totalAnswered += total;

    // Update streak
    const today = new Date().toDateString();
    if (S.lastDate !== today) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      S.streak = (S.lastDate === yesterday.toDateString()) ? S.streak + 1 : 1;
      S.lastDate = today;
    }
    save();
    go('complete');
  } else {
    render();
  }
}

function setReminder(btn) {
  btn.textContent = '✓ Reminder set — see you tomorrow';
  btn.disabled = true;
  btn.style.background = '#0F6E56';
}

// ── RENDER ────────────────────────────────────────────────────────────────────

const PROG = { landing:0, brief:10, year:15, courses:30, reveal:50, question:70, complete:100 };

function render() {
  const el = document.getElementById('app');
  const pct = PROG[S.screen] || 0;

  let html = `<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;
  switch (S.screen) {
    case 'landing':  html += screenLanding();  break;
    case 'brief':    html += screenBrief();    break;
    case 'year':     html += screenYear();     break;
    case 'courses':  html += screenCourses();  break;
    case 'reveal':   html += screenReveal();   break;
    case 'question': html += screenQuestion(); break;
    case 'complete': html += screenComplete(); break;
  }
  el.innerHTML = html;

  // Post-render injections
  if (S.screen === 'reveal') {
    const m = document.getElementById('sectioned-map');
    if (m) {
      m.innerHTML = sectionedMapHTML();
      // Animate section bars after a short paint delay
      setTimeout(() => {
        m.querySelectorAll('.sec-bar-fill').forEach(el => {
          el.style.width = el.dataset.w + '%';
        });
      }, 120);
    }
  }
  if (S.screen === 'complete') {
    const m = document.getElementById('map-mini');
    if (m) m.innerHTML = mapHTML(true, todayTopics());
  }
  // Animate coverage ring on brief screen
  if (S.screen === 'brief') {
    const ring = document.querySelector('[data-target]');
    if (ring) requestAnimationFrame(() => setTimeout(() => {
      ring.style.strokeDashoffset = ring.dataset.target;
    }, 80));
  }
}

function animatePct(target) {
  const numEl = document.getElementById('cov-num');
  const barEl = document.getElementById('cov-bar');
  if (!numEl || !barEl) return;
  let v = 0;
  setTimeout(() => {
    barEl.style.width = target + '%';
    const tick = () => { if (v < target) { numEl.textContent = (++v) + '%'; setTimeout(tick, 40); } };
    tick();
  }, 250);
}

// ── INIT ──────────────────────────────────────────────────────────────────────

window.go           = go;
window.selectYear   = selectYear;
window.toggleCourse = toggleCourse;
window.startSession = startSession;
window.answer       = answer;
window.next         = next;
window.setReminder  = setReminder;

load();
// Route: returning user with session history → brief; returning without history → reveal; new user → landing
if (S.courses.size > 0) {
  S.screen = S.sessionHistory.length > 0 ? 'brief' : 'reveal';
}
render();
</script>
</body>
