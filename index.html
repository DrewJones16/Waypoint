          'Intergenerational upward mobility',
          'Horizontal mobility'],
    ans:1,
    exp:'Intragenerational mobility = change in social position within one\'s OWN lifetime. Intergenerational mobility = change across GENERATIONS (comparing parents to children/grandchildren). This person starts low and moves up within their own career вЂ” intragenerational upward mobility. If we compared this person\'s status to their parents\', that would be intergenerational. Horizontal mobility = moving to a similar-status position (e.g., changing careers within the same class). Structural mobility is driven by macro-level economic change affecting an entire cohort simultaneously. All four types are directly tested on the MCAT.'
  },
  {
    id:'sc14', topic:'soc',
    stem:'G.H. Mead\'s concept of the "generalized other" refers to:',
    opts:['A significant individual (parent, teacher) whose specific judgments directly shape behavior',
          'The internalized composite perspective of society as a whole, which guides self-regulation in social situations',

    ans:1,
    exp:'Mead\'s symbolic interactionism: the self develops through social interaction. The "I" is the spontaneous, impulsive part of self; the "Me" is the socialized, internalized self (how society sees me). The "generalized other" = the abstract standpoint of the community or society, internalized so we can regulate behavior without needing a specific person present. Cooley\'s "looking-glass self" is related: we see ourselves as reflected in others\' specific reactions вЂ” key distinction from Mead\'s abstract generalized other. Both explain how social expectations become self-regulation.'
  },
  {
    id:'sc15', topic:'soc',
    stem:'A physician unconsciously orders fewer pain tests for female patients than for male patients with identical presentations, without awareness of this differential. This best illustrates:',
    opts:['Explicit prejudice вЂ” deliberate, conscious discrimination based on gender',
          'Implicit bias вЂ” automatic, unconscious associations that influence behavior despite conscious egalitarian values',
          'Institutional sexism вЂ” hospital policies that restrict women\'s access to testing',
          'Role conflict вЂ” the physician\'s professional and personal gender attitudes clash'],
    ans:1,
    exp:'Implicit (unconscious) bias involves automatic attitudes and stereotypes operating below conscious awareness, shaping decisions even when the person explicitly endorses equal treatment. Measured by the Implicit Association Test (IAT). In medicine, documented implicit biases against racial/ethnic minorities, women, elderly, and individuals with obesity affect diagnosis, pain management, referral, and communication. Distinguished from explicit bias (conscious, deliberate) and structural/institutional discrimination (policy-level). Implicit bias training is a health equity intervention, though evidence on its effectiveness in changing actual behavior is mixed and debated.'
  },
  {
    id:'sc16', topic:'soc',
    stem:'The functionalist theory of stratification (Davis & Moore) argues that social inequality is beneficial because:',
    opts:['Inequality generates class conflict that ultimately drives society toward greater equality',
          'Unequal rewards motivate talented individuals to fill demanding, socially important roles',
          'Stratification reflects genetically determined differences in ability and drive',
          'Elites use ideology and force to maintain inequality in their own interest'],
    ans:1,
    exp:'Functionalist stratification theory (Davis & Moore, 1945): unequal pay and prestige for demanding, functionally important positions attracts and retains the most talented people in critical roles, benefiting society overall вЂ” inequality is a necessary motivational mechanism. Conflict theory (Marx, Weber) rejects this: inequality primarily serves ruling-class interests, maintained through economic power, ideology, and coercion. Symbolic interactionists focus on how class distinctions are enacted and experienced in daily interaction. Knowing all three perspectives\' central claims and major theorists is essential for MCAT P/S passages on stratification.'
  },
  {
    id:'sc17', topic:'soc',
    stem:'Robert Merton\'s strain theory (anomie theory of deviance) predicts that crime and deviance are most likely when:',
    opts:['Social norms are overly rigid, suppressing individual expression and autonomy',
          'Individuals internalize culturally emphasized success goals but lack access to legitimate means to achieve them',
          'Rapid industrialization causes the collective conscience to break down, producing normlessness',
          'Weak social bonds вЂ” reduced attachment, commitment, involvement, and belief вЂ” leave individuals without informal social controls'],
    ans:1,
    exp:'Merton\'s strain theory: American culture universally promotes success goals (wealth, status) but distributes legitimate means (education, stable employment) unequally. This disjunction produces "strain" and five adaptations вЂ” Conformity (accept both goals and means), Innovation (accept goals, reject means в†’ most crime), Ritualism (reject goals, follow means mechanically), Retreatism (reject both в†’ withdrawal, addiction), Rebellion (replace both with new goals and means). "Innovation" explains why property crime rates are highest among groups systematically blocked from legitimate opportunity structures. Distinguish Merton from: (1) Durkheim\'s original anomie вЂ” normlessness from rapid social change disrupting collective norms; (2) Hirschi\'s social bond theory вЂ” deviance from weak attachment/commitment/involvement/belief (option D); (3) Labeling theory вЂ” deviance as a social reaction that creates deviant identity. All four frameworks are MCAT-testable; matching the theorist to their mechanism is the core skill.'
  },
  // в”Ђв”Ђ Cell Biology вЂ” additional batch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  {
    id:'b40', topic:'cell-bio',
    stem:'In the intrinsic (mitochondrial) pathway of apoptosis, cytochrome c is released from the mitochondria into the cytoplasm. Its immediate downstream function is to:',

// в”Ђв”Ђ STORAGE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function save() {
  localStorage.setItem('wp_courses',       JSON.stringify([...S.courses]));
  localStorage.setItem('wp_course_status', JSON.stringify(S.courseStatus));
  localStorage.setItem('wp_year',     S.year || '');
  localStorage.setItem('wp_streak',   String(S.streak));
  localStorage.setItem('wp_lastDate', S.lastDate || '');
  localStorage.setItem('wp_qstats',   JSON.stringify(S.qStats));
  localStorage.setItem('wp_total',    String(S.totalAnswered));
  localStorage.setItem('wp_history',    JSON.stringify(S.sessionHistory.slice(-7)));
  localStorage.setItem('wp_milestones', JSON.stringify(S.milestonesShown));
  localStorage.setItem('wp_cov_milestones', JSON.stringify(S.covMilestonesShown));
  localStorage.setItem('wp_topic_last_seen', JSON.stringify(S.topicLastSeen));
  localStorage.setItem('wp_nudge_dismissed', JSON.stringify(S.nudgeDismissed));
}

function load() {
  try {
    const c = localStorage.getItem('wp_courses');
    if (c) S.courses = new Set(JSON.parse(c));
    const cs = localStorage.getItem('wp_course_status');
    if (cs) {
      S.courseStatus = JSON.parse(cs);
    } else if (S.courses.size > 0) {
      // Migrate: treat all existing courses as 'completed'
      S.courses.forEach(id => { S.courseStatus[id] = 'completed'; });
    }
    S.year     = localStorage.getItem('wp_year')     || null;
    S.streak   = parseInt(localStorage.getItem('wp_streak')   || '0', 10);
    S.lastDate = localStorage.getItem('wp_lastDate') || null;

    const qs = localStorage.getItem('wp_qstats');
    if (qs) S.qStats = JSON.parse(qs);
    S.totalAnswered = parseInt(localStorage.getItem('wp_total') || '0', 10);
    const hist = localStorage.getItem('wp_history');
    if (hist) S.sessionHistory = JSON.parse(hist);
    const ms = localStorage.getItem('wp_milestones');
    if (ms) S.milestonesShown = JSON.parse(ms);
    const cms = localStorage.getItem('wp_cov_milestones');
    if (cms) S.covMilestonesShown = JSON.parse(cms);
    const tls = localStorage.getItem('wp_topic_last_seen');
    if (tls) S.topicLastSeen = JSON.parse(tls);
    const nd = localStorage.getItem('wp_nudge_dismissed');
    if (nd) S.nudgeDismissed = JSON.parse(nd);

    // Reset streak if more than 1 day has passed
    if (S.lastDate) {
      const diffDays = (new Date() - new Date(S.lastDate)) / 86400000;
      if (diffDays > 1.5) S.streak = 0;
    }
  } catch(e) {
    // Corrupted or unparseable localStorage вЂ” wipe all Waypoint keys and start fresh.
    // Silent recovery: new users see the landing screen, not an error.
    console.warn('[Waypoint] load() failed вЂ” resetting localStorage:', e);
    ['wp_courses','wp_course_status','wp_year','wp_streak','wp_lastDate','wp_qstats',
     'wp_total','wp_history','wp_milestones','wp_cov_milestones',
     'wp_topic_last_seen','wp_nudge_dismissed'].forEach(k => localStorage.removeItem(k));
  }
}

// в”Ђв”Ђ LOGIC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// A course you're still TAKING counts partial credit until you mark it done вЂ”
// so the % reflects what you've genuinely covered, not what you're mid-way through.
const IN_PROGRESS_CREDIT = 0.5;
function courseCredit(courseId) {
  return S.courseStatus[courseId] === 'in-progress' ? IN_PROGRESS_CREDIT : 1;
}
function coverage(courses, statusAware = false) {
  return Math.round(TOPICS.reduce((n, t) => {
    if (!t.course || !courses.has(t.course)) return n;
    return n + t.w * (statusAware ? courseCredit(t.course) : 1);
  }, 0));
}

// Coverage-percentage celebration moments вЂ” fire once each as the route fills in
const COVERAGE_MILESTONES = [
  { at: 15, title: 'First waypoint reached',     text: '15% of the MCAT is on your route. Most classmates haven\'t opened a single MCAT resource yet.' },
  { at: 22, title: 'Freshman benchmark cleared', text: '22% covered вЂ” that\'s where most classmates land by the end of freshman year. You\'re here, and you\'re just getting started.' },
  { at: 44, title: 'Sophomore ground covered',   text: '44% covered. Less than half the route left to map.' },
  { at: 68, title: 'Junior-year territory',      text: '68% covered. Most classmates are still grinding through these courses right now.' },
  { at: 79, title: 'Full route unlocked',        text: 'Every course on your route is covered. From here, it\'s practice and retention.' },
];

function milestoneCopy() {
  const cov = coverage(S.courses, true);
  const hit = COVERAGE_MILESTONES.filter(m => cov >= m.at && !S.covMilestonesShown[m.at]);
  if (!hit.length) return '';
  const m = hit[hit.length - 1]; // highest unseen milestone
  S.covMilestonesShown[m.at] = true;
  save();
  return `<div class="cov-milestone-card">
    <div style="font-size:26px;margin-bottom:10px;line-height:1;">рџЋ‰</div>
    <div style="font-size:11px;font-weight:800;color:#4DE3AB;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px;">${m.title}</div>
    <p style="font-size:14px;color:#C8F0E0;line-height:1.55;margin-bottom:12px;">${m.text}</p>
    <button class="btn btn-share" style="margin-top:0;font-size:13px;padding:10px 16px;" onclick="shareCoverageCard('coverage', this)">рџ“¤ Share this</button>
  </div>`;
}

function buildSession() {
  // course === null means "always available" (CARS is ongoing, not tied to a specific course)
  const covered = new Set(TOPICS.filter(t => t.course === null || (t.course && S.courses.has(t.course))).map(t => t.id));
  const pool    = QUESTIONS.filter(q => covered.has(q.topic));

  // Questions the user has gotten wrong more than right вЂ” surface these first
  const needsWork = pool.filter(q => {
    const st = S.qStats[q.id];
    return st && st.wrong > 0 && st.wrong > st.right;
  }).sort(() => Math.random() - 0.5);

  // Everything else (unseen or mastered)
  const fresh = pool.filter(q => {
    const st = S.qStats[q.id];
    return !st || st.wrong === 0 || st.right >= st.wrong;
  }).sort(() => Math.random() - 0.5);

  // Up to 2 "needs work" questions first, then fill to 5 with fresh
  return [...needsWork.slice(0, 2), ...fresh].slice(0, Math.min(5, pool.length));
}

function wrongCount() {
  // How many questions in the covered pool still need work
  const covered = new Set(TOPICS.filter(t => t.course === null || (t.course && S.courses.has(t.course))).map(t => t.id));
  return QUESTIONS.filter(q => {
    if (!covered.has(q.topic)) return false;
    const st = S.qStats[q.id];
    return st && st.wrong > 0 && st.wrong > st.right;
  }).length;
}

function todayTopics() {
  return new Set(S.answers.map(a => {
    const q = QUESTIONS.find(x => x.id === a.qId);
    return q ? q.topic : null;
  }).filter(Boolean));
}

// Record that the user engaged with these topics today (used for retention nudges)
function markTopicsSeen(topicIds) {
  const today = isoDate();
  topicIds.forEach(tid => { S.topicLastSeen[tid] = today; });
}

function isoDate(d = new Date()) {
  return d.toISOString().slice(0, 10);
}

// Find the best candidate topic for a "you covered this a while ago" nudge
function getRetentionNudge() {
  const today = new Date();
  let best = null;
  for (const [tid, dateStr] of Object.entries(S.topicLastSeen)) {
    if (S.nudgeDismissed[tid] === isoDate()) continue;
    const topic = TOPICS.find(t => t.id === tid);
    if (!topic) continue;
    const days = Math.floor((today - new Date(dateStr)) / 86400000);
    if (days < 21) continue; // too recent to nudge

    // Skip topics the user is already practicing well and recently
    const topicQs = QUESTIONS.filter(q => q.topic === tid);
    const stats = topicQs.reduce((acc, q) => {
      const s = S.qStats[q.id];
      if (s) { acc.right += s.right; acc.wrong += s.wrong; }
      return acc;
    }, { right: 0, wrong: 0 });
    const total = stats.right + stats.wrong;
    const pct = total > 0 ? stats.right / total : 0;
    if (total >= 4 && pct >= 0.85 && days < 42) continue; // still solid, not urgent yet

    if (!best || days > best.days) best = { topic, days };
  }
  return best;
}

function getDirectiveTopic() {
  // Prefer a retention nudge (covered topic not seen in 21+ days)
  const nudge = getRetentionNudge();
  if (nudge) return { topic: nudge.topic, days: nudge.days, reason: 'retention' };
  // Otherwise suggest the highest-weight covered topic not dismissed today
  const today = isoDate();
  const candidates = TOPICS
    .filter(t => t.course && S.courses.has(t.course) && S.nudgeDismissed[t.id] !== today)
    .sort((a, b) => b.w - a.w);
  if (candidates.length === 0) return null;
  return { topic: candidates[0], days: null, reason: 'drill' };
}

function weeksAgo(days) {
  const w = Math.round(days / 7);
  return w <= 0 ? 'recently' : w === 1 ? '1 week ago' : `${w} weeks ago`;
}

function dismissNudge(topicId) {
  S.nudgeDismissed[topicId] = isoDate();
  save();
  render();
}

  const fs  = mini ? '9px' : '10px';

  return TOPICS.map(t => {

      ? `<span style="display:inline-block;width:5px;height:5px;background:#1D9E75;border-radius:50%;vertical-align:middle;margin-left:3px;"></span>` : '';

      <div style="font-size:${fs2};color:${dc};margin-top:2px;overflow-wrap:break-word;word-break:break-word;">${covered ? 'вњ“ ' : ''}${t.disp}</div>
    </div>`;
  }).join('');
}

const TILE_NAMES = {

function sectionedMapHTML() {

    const secTopics  = TOPICS.filter(t => t.mcat === sec.id);
    const secTotal   = secTopics.reduce((s, t) => s + t.w, 0);

      const bg  = covered ? 'rgba(29,158,117,0.12)' : '#131520';

      const nc  = covered ? '#4DE3AB' : '#3A4060';
      const dc  = covered ? '#2DB88A' : '#2E3550';

      const statusIcon = inProgress

      return `<div style="background:${bg};border:1px solid ${bdr};border-radius:7px;padding:8px 9px;flex:1;min-width:72px;max-width:100%;overflow:hidden;">

          <div style="font-size:9px;color:${dc};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${statusIcon}${t.disp}</div>

        </div>

    }).join('');

    return `

// Curriculum order вЂ” roughly the order a premed encounters these topics
const PATH_ORDER = [
  'cars','cell-bio','genetics','mol-bio','atomic','bonding','stoich','acid-base',
  'physio','neuro','thermo','orgo','physics','psych','soc','research','biochem'
];

function pathNodes() {
  const SPACING = 58;
  return PATH_ORDER.map((tid, i) => {
    const t    = TOPICS.find(x => x.id === tid);
    const done = t.course === null || S.courses.has(t.course);
    const x = 26 + i * SPACING;
    const y = 64 + Math.sin(i * 0.95) * 26;
    return { tid, t, done, x, y };
  });
}

function journeyPathSvg() {
  const nodes = pathNodes();
  const w    = 26 + (nodes.length - 1) * 58 + 26;
  const h    = 132;
  const here = nodes.find(n => !n.done);

  const segments = nodes.slice(0, -1).map((n, i) => {
    const next = nodes[i + 1];
    const traveled = next.done;
    return `<line x1="${n.x}" y1="${n.y}" x2="${next.x}" y2="${next.y}"
      stroke="${traveled ? '#1D9E75' : 'rgba(255,255,255,0.12)'}" stroke-width="2"
      ${traveled ? '' : 'stroke-dasharray="3 5"'} stroke-linecap="round"/>`;
  }).join('');

  const dots = nodes.map(n => {
    const isHere = here && here.tid === n.tid;
    const fill    = n.done ? '#1D9E75' : '#181B26';
    const stroke  = n.done ? '#1D9E75' : 'rgba(255,255,255,0.2)';
    const labelY  = n.y > 64 ? n.y + 22 : n.y - 15;
    const ring    = isHere
      ? `<circle cx="${n.x}" cy="${n.y}" r="7" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.5">
           <animate attributeName="r" values="7;14;7" dur="2.2s" repeatCount="indefinite"/>
           <animate attributeName="opacity" values="0.5;0;0.5" dur="2.2s" repeatCount="indefinite"/>
         </circle>` : '';
    const check   = n.done
      ? `<path d="M${n.x-3} ${n.y} l2.2 2.6 l4.6 -5.6" stroke="#08090C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>` : '';
    return `${ring}
      <circle cx="${n.x}" cy="${n.y}" r="7" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
      ${check}
      <text x="${n.x}" y="${labelY}" class="journey-label${n.done ? ' done' : ''}">${n.t.disp}</text>`;
  }).join('');

  return `<div class="journey-wrap"><svg class="journey-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    ${segments}
    ${dots}
  </svg></div>`;
}

function getWelcomeHeadline() {
  // Self-referential only вЂ” this line never makes a comparative claim (that lives in
  // benchStance, which actually knows the student's coverage vs. the benchmark).
  const streak  = S.streak;
  const history = S.sessionHistory;
  if (streak === 0 && history.length > 0) return 'Pick up where you left off.';
  if (streak <= 1 && history.length <= 1) return 'Day one. Your route starts here.';
  if (streak === 2)  return 'Day 2. The habit is forming.';
  if (streak === 3)  return 'Day 3. Three sessions in.';
  if (streak === 4)  return 'Day 4. This is what consistent looks like.';
  if (streak === 5)  return 'Day 5. Five days of compounding.';
  if (streak === 6)  return 'Day 6. Momentum is real now.';
  if (streak === 7)  return "One week straight. That's real.";
  if (streak === 14) return 'Two weeks in. This is a routine now.';
  if (streak === 30) return 'Day 30. A month of steady progress.';
  if (streak > 30)   return `Day ${streak}. Still going.`;
  return `Day ${streak}. Keep it rolling.`;
}

// One source of truth for "how am I doing vs. the typical student at my year."
// Every surface (Home ring, Home sentence, Route card) reads THIS вЂ” so they can
// never contradict each other, and none of them ever says "behind".
function benchStance(cov, bench, plural) {
  const gap = cov - bench;
  if (gap > 5)   return { tier:'ahead',    gap, ringLabel:`+${gap} ahead`, ringColor:'#1D9E75',
                          sentence:`Most ${plural} are around ${bench}% at this stage вЂ” you're ${gap} points ahead.` };
  if (gap >= -5) return { tier:'ontrack',  gap, ringLabel:'on pace', ringColor:'#8A90A8',
                          sentence:`Right on pace вЂ” most ${plural} are around ${bench}% at this stage.` };
  return           { tier:'building', gap, ringLabel:'keep going', ringColor:'#8A90A8',
                          sentence:`You're early on your route вЂ” adding another course is the fastest way to fill it in.` };
}

function getTrendInsight(history) {
  if (history.length < 2) return '';
  const last  = history[history.length - 1];
  const prev  = history[history.length - 2];
  const lastR = last.total  > 0 ? last.correct  / last.total  : 0;
  const prevR = prev.total  > 0 ? prev.correct  / prev.total  : 0;
  const lastP = Math.round(lastR * 100);

  if (history.length >= 3) {
    const avg = history.slice(-3).reduce((s, h) => s + (h.total > 0 ? h.correct / h.total : 0), 0) / 3;
    const avgP = Math.round(avg * 100);
    if (lastR > prevR + 0.15) return `Accuracy trending up вЂ” ${lastP}% last session.`;
    if (lastR < prevR - 0.15) return `Tougher session last time. That's exactly what builds retention.`;
    return `Consistent at ${avgP}% over your last 3 sessions.`;
  }
  if (lastR === 1)  return 'Perfect last session. Let\'s see if it holds.';
  if (lastR >= 0.8) return `Strong last session вЂ” ${lastP}% accuracy.`;
  if (lastR >= 0.6) return `${lastP}% last session. The hard ones build the most.`;
  return 'Tough last session. Today\'s a new one.';
}

function getMasteredTopic() {

// в”Ђв”Ђ SCREEN RENDERERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// в”Ђв”Ђ RETENTION / "STAYING SHARP" в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// The honest depth signal that sits beside coverage (breadth). Coverage says what
// your classes have EXPOSED you to; this says what you can actually still DO, using
// real practice accuracy + time-decay (the testing/spacing effect). Deliberately
// only judges topics you've actually practiced вЂ” no scary "of everything covered"
// denominator вЂ” so it stays truthful without ever reading "you're behind."
function topicRetention(tid) {
  const topic = TOPICS.find(t => t.id === tid);
  if (!topic || !topic.course || !S.courses.has(topic.course)) return null;
  let right = 0, wrong = 0, recentR = 0, recentSeen = 0;
  QUESTIONS.forEach(q => {
    if (q.topic !== tid) return;
    const s = S.qStats[q.id];
    if (!s) return;
    right += s.right; wrong += s.wrong;
    if (s.last !== undefined) { recentSeen++; if (s.last) recentR++; } // most-recent outcome per question
  });
  const total = right + wrong;
  // Need a real sample before any verdict вЂ” a 2/3 start shouldn't earn a mastery call.
  const MIN = 4;
  if (total < MIN) return { tid, topic, status: 'untested', total, pct: null, days: null };
  const lifetime = right / total;
  // Recency: fraction of practiced questions whose MOST RECENT answer was correct.
  // Blended with lifetime so a rough first week can be redeemed by genuine improvement
  // (the exact gain the product exists to produce) instead of dragging forever.
  const recent = recentSeen ? recentR / recentSeen : lifetime;
  const eff = 0.5 * lifetime + 0.5 * recent;
  const seen = S.topicLastSeen[tid];
  const days = seen ? Math.floor((Date.now() - new Date(seen)) / 86400000) : null;
  // Expanding-interval spacing: strongly-owned topics decay slower.
  const strong = eff >= 0.9 && total >= 6;
  const fadeAt = strong ? 21 : 10;
  let status;
  if (eff < 0.7)                            status = 'shaky';   // not reliable yet
  else if (eff < 0.8)                       status = 'fading';  // borderline вЂ” worth a refresh
  else if (days !== null && days >= fadeAt) status = 'fading';  // time-decayed
  else                                      status = 'sharp';   // >=80% and recent
  return { tid, topic, status, total, pct: Math.round(eff * 100), days };
}

function retentionSummary(excludeId = null) {
  const states = TOPICS
    .filter(t => t.course && S.courses.has(t.course))
    .map(t => topicRetention(t.id))
    .filter(Boolean);
  const practiced = states.filter(s => s.status !== 'untested');
  const sharp  = practiced.filter(s => s.status === 'sharp');
  const fading = practiced.filter(s => s.status === 'fading');
  const shaky  = practiced.filter(s => s.status === 'shaky');
  const untested = states.filter(s => s.status === 'untested');
  // The single best thing to refresh: weakest accuracy first, then most time-decayed.
  // excludeId lets the caller skip a topic that's already being actioned elsewhere
  // (the "Do this now" directive) so we never show two CTAs for the same topic.
  const pick = arr => arr.filter(s => s.tid !== excludeId);
  const action = pick(shaky).sort((a, b) => a.pct - b.pct)[0]
              || pick(fading).sort((a, b) => (b.days || 0) - (a.days || 0))[0]
              || null;
  return { practiced, sharp, fading, shaky, untested, action };
}

// Refresh a slipping topic straight from the retention card вЂ” tracked so we can
// measure whether the honest signal actually drives spaced practice.
function masteryRefresh(tid) {
  if (window.plausible) plausible('mastery_refresh', { props: { topic: tid } });
  startQuickLog(tid, null);
}

function stayingSharpHTML() {
  // Exclude whatever the "Do this now" directive is already surfacing so the two
  // surfaces never show a duplicate CTA for the same topic (status here, action there).
  const directive = getDirectiveTopic();
  const directiveId = directive ? directive.topic.id : null;
  const { practiced, sharp, fading, shaky, untested, action } = retentionSummary(directiveId);
  if (practiced.length < 2) return ''; // not enough practice to say anything honest yet
  const slipping = fading.length + shaky.length;

  let body;
  if (slipping === 0) {
    // Everything practiced is holding вЂ” but be honest about what's NOT yet tested,
    // and make that the next action rather than implying blanket readiness.
    const sN = sharp.length;
    const held = `<strong style="color:#4DE3AB;">${sN} topic${sN !== 1 ? 's' : ''}</strong> you've practiced ${sN !== 1 ? 'are' : 'is'} holding strong`;
    if (untested.length > 0) {
      const pickU = untested.filter(s => s.tid !== directiveId).sort((a, b) => b.topic.w - a.topic.w)[0];
      const tail = pickU
        ? `<button style="background:none;border:none;font-size:13px;color:#2DB88A;font-weight:600;cursor:pointer;text-align:left;padding:2px 0;-webkit-tap-highlight-color:transparent;" onclick="masteryRefresh('${pickU.tid}')">Test ${pickU.topic.name} вЂ” see where you stand в†’</button>`
        : `<p style="font-size:12px;color:#555B70;line-height:1.5;margin:0;">Your next one to test is queued up top in Do this now.</p>`;
      body = `<p style="font-size:13px;color:#8A90A8;line-height:1.55;margin:0 0 10px;">The ${held}. <strong style="color:#8A90A8;">${untested.length}</strong> covered topic${untested.length !== 1 ? 's' : ''} haven't been tested yet.</p>${tail}`;
    } else {
      body = `<p style="font-size:13px;color:#6B7185;line-height:1.55;margin:0;">Every topic you've covered is practiced and holding strong. That's genuinely walking-in-ready вЂ” keep it warm.</p>`;
    }
  } else {
    const chips = [...shaky, ...fading].slice(0, 3).map(s => {
      const color = s.status === 'shaky' ? '#F08060' : '#F5B36A';
      return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#8A90A8;background:rgba(255,255,255,0.04);border-radius:8px;padding:4px 9px;"><span style="width:6px;height:6px;border-radius:50%;background:${color};"></span>${s.topic.name}</span>`;

// в”Ђв”Ђ TWIST OF THE DAY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Surfaces Waypoint's single most differentiated asset вЂ” the professor-vs-MCAT
// "Twist" вЂ” on the Home screen, rotating once per day. A real reason to return
// that delivers genuine insight, not a manipulative streak. Twists otherwise only
// appear after answering a question deep inside a session.
function twistTextFor(q) {
  return q ? (q.twist || TWISTS[q.id] || '') : '';
}

// Twists follow the shape "Your professor tests X. The MCAT ..." вЂ” split into the
// two sides of the contrast the whole product is built on.
function splitTwist(text) {
  const strip = s => { s = s.replace(/^Your professor\s+/i, '').trim(); return s.charAt(0).toUpperCase() + s.slice(1); };
  // Tolerant boundary: a period, an optional closing quote (straight or curly), then
  // "The MCAT". Handles quoted terms like Mead's "generalized other." where the period
  // sits inside the quote вЂ” which an exact indexOf('. The MCAT') silently missed.
  const m = text.match(/\.\s*(["'\u201C\u201D\u2018\u2019]?)\s*The MCAT\s+/);
  if (!m) return { cls: strip(text), exam: '' };
  const cls = strip((text.slice(0, m.index + 1) + (m[1] || '')).trim());
  let exam = text.slice(m.index + m[0].length).trim();
  exam = exam.charAt(0).toUpperCase() + exam.slice(1);
  return { cls, exam };
}

// Deterministic pick: stable within a calendar day, rotates day to day. Prefers
// topics the student has already covered; falls back to a teaser if none yet.
function getDailyTwist() {
  const covered = new Set(TOPICS.filter(t => t.course === null || (t.course && S.courses.has(t.course))).map(t => t.id));
  let pool = QUESTIONS.filter(q => covered.has(q.topic) && twistTextFor(q));
  const teaser = pool.length === 0;
  if (teaser) pool = QUESTIONS.filter(q => twistTextFor(q));
  if (!pool.length) return null;
  pool = pool.slice().sort((a, b) => (a.id < b.id ? -1 : a.id > b.id ? 1 : 0));
  const seed = isoDate().replace(/-/g, '');
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  const q = pool[h % pool.length];
  return { q, topic: TOPICS.find(t => t.id === q.topic), text: twistTextFor(q), teaser };
}

function dailyTwistHTML() {
  const d = getDailyTwist();
  if (!d) return '';
  const { q, topic, text, teaser } = d;
  // One impression per session when the card actually renders вЂ” pairs with
  // twist_of_day_drill to give a view->drill conversion rate in Plausible.
  // S._twistViewFired is transient (not persisted), so it resets each app open.
  if (!S._twistViewFired && window.plausible) {
    S._twistViewFired = true;
    plausible('twist_of_day_view', { props: { topic: topic ? topic.id : 'na' } });
  }
  const parts = splitTwist(text);
  const tag = topic ? `<span class="q-tag ${sectionTag(topic.mcat)}">${sectionIcon(topic.mcat)}${topic.disp}</span>` : '';

       </div>`
    : '';
  return `

const SHOWCASE_TWISTS = ['b02', 'b06', 'b38', 'b44'];
function getShowcaseTwist() {

  const q = pool[h % pool.length];
  return { q, topic: TOPICS.find(t => t.id === q.topic), text: twistTextFor(q) };

function getRetentionHTML(sessionAnswers) {
  const sessionTopics = [...new Set(sessionAnswers.map(a => {
    const q = QUESTIONS.find(q => q.id === a.qId);
    return q ? q.topic : null;
  }).filter(Boolean))];

  const rows = sessionTopics.map(tid => {
    const topic = TOPICS.find(t => t.id === tid);
    const topicQs = QUESTIONS.filter(q => q.topic === tid);
    const stats = topicQs.reduce((acc, q) => {
      const s = S.qStats[q.id];
      if (s) { acc.right += s.right; acc.wrong += s.wrong; }
      return acc;
    }, { right: 0, wrong: 0 });
    const total = stats.right + stats.wrong;
    if (!topic || total < 2) return null;
    const pct = Math.round(stats.right / total * 100);
    return { topic, pct, total };
  }).filter(Boolean).sort((a, b) => b.total - a.total);

  if (!rows.length) return '';

  return `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:600;color:#2E3550;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;">Your retention</div>
      ${rows.map(({ topic, pct, total }) => {
        const color = pct >= 70 ? '#1D9E75' : pct >= 50 ? '#F59E0B' : '#555B70';
        return `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="font-size:13px;color:#C0C4D8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${topic.name}</div>
            <div style="font-size:11px;color:#3A4060;flex-shrink:0;">${total}Г—</div>
            <div style="font-size:13px;font-weight:600;color:${color};width:34px;text-align:right;flex-shrink:0;">${pct}%</div>
            <div style="width:52px;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;flex-shrink:0;">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function screenComplete() {
  const correct = S.answers.filter(a => a.correct).length;
  const total   = S.answers.length;
  const cov     = coverage(S.courses, true);
  const tt      = todayTopics();
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let scoreHeadline, scoreNote;
  if (pct === 100) {
    scoreHeadline = 'Perfect session.';
    scoreNote     = 'The MCAT is just this, repeated. You\'re building the right habits.';
  } else if (pct >= 80) {
    scoreHeadline = 'Strong session.';
    scoreNote     = `${correct} out of ${total} вЂ” the one${correct < total - 1 ? 's' : ''} you missed is exactly what practice is for.`;
  } else if (pct >= 60) {
    scoreHeadline = 'Good session.';
    scoreNote     = 'Solid work. The questions you got wrong today are the ones you\'ll own next week.';
  } else {
    scoreHeadline = 'Tough session.';
    scoreNote     = 'That\'s the point. Hard questions now mean easy points on test day.';
  }

  // Count questions that were previously wrong and got right this session
  const wrong = total - correct;
  const spacedRepNote = wrong > 0
    ? `<p style="font-size:13px;color:#555B70;margin:-8px 0 16px;line-height:1.5;">Questions you missed will come back. That's how it works.</p>`
    : '';

  const fixedCount = S.answers.filter(a => {
    if (!a.correct) return false;
    const prev = S.qStats[a.qId];
    // Was wrong before this session started вЂ” check if it had more wrongs than rights
    // (we already updated qStats during the session, so subtract this session's right)
    if (!prev) return false;
    const prevRight = prev.right - 1; // remove this session's right answer
    const prevWrong = prev.wrong;
    return prevWrong > 0 && prevWrong > prevRight;
  }).length;

  const fixedNote = fixedCount > 0
    ? `<div style="background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;">
        <p style="font-size:13px;color:#4DE3AB;line-height:1.5;">вњ“ You fixed <strong>${fixedCount} question${fixedCount !== 1 ? 's' : ''}</strong> that had you stumped before. That's what practice is.</p>
       </div>`
    : '';

  const topicInsight = getTopicInsight();
  const retention    = getRetentionHTML(S.answers);

  const scoreBanner = pct === 100
    ? `<div style="text-align:center;padding:12px 0 24px;">
        <div style="font-size:30px;font-weight:800;color:#F0F2F8;line-height:1.15;margin-bottom:10px;letter-spacing:-0.5px;">${scoreHeadline}</div>
        <p style="font-size:15px;color:#4DE3AB;line-height:1.55;margin:0;">${scoreNote}</p>
       </div>`
    : `<h2>${scoreHeadline}</h2>
       <p style="margin:6px 0 16px;font-size:15px;">${scoreNote}</p>
       ${spacedRepNote}`;

  return `
    <div class="screen">
      ${scoreBanner}

      ${fixedNote}
      ${topicInsight}

      <div class="today-note">
        <span class="today-dot"></span>practiced today
      </div>
      <div class="map-grid" id="map-mini"></div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${correct}/${total}</div>
          <div class="stat-lbl">today</div>
        </div>
        <div class="stat-box">
          <div class="stat-num teal">${cov}%</div>
          <div class="stat-lbl">covered</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${S.streak}</div>
          <div class="stat-lbl">day streak</div>
        </div>
      </div>

      ${retention}

      <button class="btn btn-primary" id="reminder-btn" onclick="setReminder(this)">Set a daily reminder</button>
      ${S.streak >= 7 ? `<button class="btn btn-share" onclick="shareCoverageCard('streak', this)">рџ”Ґ Share my streak</button>` : ''}
      <button class="btn btn-share" onclick="shareCoverageCard('coverage', this)">рџ“¤ Share my progress</button>
    </div>`;
}

function setCourseState(id, newState) {
  if (S.courseStatus[id] === newState) {

// "Syllabus Sync" quick-log вЂ” 3 questions on a topic (optionally filtered to a subtopic)
function startQuickLog(topicId, subtopicId, leadQId) {
  S.quickLogTopic = null; // clear topic-picker state
  const allPool = QUESTIONS.filter(q => q.topic === topicId);
  let pool = allPool;
  let subtopicFallback = false;

  if (subtopicId) {
    const filtered = allPool.filter(q => (q.subtopic || SUBTOPIC_TAGS[q.id]) === subtopicId);
    if (filtered.length >= 3) {
      pool = filtered;
    } else {
      // Not enough questions for this subtopic вЂ” fall back to the whole topic
      pool = allPool;
      subtopicFallback = true;
    }
  }

  pool = pool.sort(() => Math.random() - 0.5);
  // If a specific question was teased (e.g. the daily Twist), lead with it so the
  // drill delivers exactly what the card promised, then continue into the topic.
  if (leadQId) {
    const lead = allPool.find(q => q.id === leadQId);
    if (lead) pool = [lead, ...pool.filter(q => q.id !== leadQId)];
  }
  S.session  = pool.slice(0, Math.min(3, pool.length));
  S.idx      = 0;
  S.answers  = [];
  S.answered = null;
  S.quickLog = { topicId, subtopicId: subtopicId || null, subtopicFallback };
  if (!S.session.length) {
    go('brief');
    return;
  }
  if (window.plausible) plausible('quicklog_start', { props: { subtopic: subtopicId || 'all' } });
  go('question');
}

function answer(i) {
  const q       = S.session[S.idx];
  const correct = i === q.ans;
  S.answered    = i;
  S.answers.push({ qId: q.id, chosen: i, correct });

  // Track per-question accuracy
  if (!S.qStats[q.id]) S.qStats[q.id] = { right: 0, wrong: 0 };
  if (correct) S.qStats[q.id].right++;
  else {
    S.qStats[q.id].wrong++;
    if (window.plausible) plausible('question_wrong');
  }
  S.qStats[q.id].last = correct ? 1 : 0; // most-recent outcome вЂ” powers recency weighting

  render();
}

function next() {
  S.idx++;
  S.answered = null;
  if (S.idx >= S.session.length) {

    // Quick-log sessions skip the full completion screen and streak/history bookkeeping
    if (S.quickLog) {
      S.totalAnswered += S.answers.length;
      markTopicsSeen([S.quickLog.topicId]);
      save();
      go('quicklogdone');
      return;
    }

    const correct = S.answers.filter(a => a.correct).length;
    const total   = S.answers.length;

    // Save session to history (keep last 7)
    S.sessionHistory.push({ date: new Date().toDateString(), correct, total });
    if (S.sessionHistory.length > 7) S.sessionHistory = S.sessionHistory.slice(-7);
    S.totalAnswered += total;
    markTopicsSeen(todayTopics());

    // Update streak
    const today = new Date().toDateString();
    if (S.lastDate !== today) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      S.streak = (S.lastDate === yesterday.toDateString()) ? S.streak + 1 : 1;
      S.lastDate = today;
    }
    save();
    if (window.plausible) plausible('session_complete');
    go('complete');
  } else {
    render();
  }
}

function exitSession() {
  if (S.answers.length > 0 && !S.quickLog) {
    const ok = confirm("Leave this session? It won't count toward today's streak unless you finish.");
    if (!ok) return;
  }
  S.session      = [];
  S.idx          = 0;
  S.answered     = null;
  S.quickLog     = null;
  S.quickLogTopic = null;
  go('brief');
}

// в”Ђв”Ђ SHAREABLE COVERAGE CARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

async function shareCoverageCard(variant = 'coverage', btn) {
  if (window.plausible) plausible('share_card');
  const cov   = coverage(S.courses, true);
  const myTopics    = TOPICS.filter(t => t.course && S.courses.has(t.course));
  const totalTopics = TOPICS.filter(t => t.course).length;
  const streak = S.streak;
  const isStreak = variant === 'streak' && streak >= 7;

  // Sharing should feel instant вЂ” show a loading state on the button right away
  // rather than leaving it looking like a dead click while the card renders.
  let btnLabel;
  if (btn) {
    btnLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'PreparingвЂ¦';
  }
  const restoreBtn = () => { if (btn) { btn.disabled = false; btn.textContent = btnLabel; } };

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  try {
    await Promise.all([
      document.fonts.load('700 230px "Space Grotesk"'),
      document.fonts.load('700 200px "Space Grotesk"'),
      document.fonts.load('700 34px "Space Grotesk"'),
      document.fonts.load('700 80px "Space Grotesk"'),
      document.fonts.load('600 38px "Inter"'),
      document.fonts.load('500 30px "Inter"'),
    ]);
  } catch (e) { /* fonts may not be ready вЂ” fall back to default */ }

  // Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0B0D14');
  bg.addColorStop(1, '#10151C');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const glow = ctx.createRadialGradient(W * 0.82, H * 0.12, 0, W * 0.82, H * 0.12, W * 0.75);
  glow.addColorStop(0, 'rgba(29,158,117,0.28)');
  glow.addColorStop(1, 'rgba(29,158,117,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Branding
  ctx.fillStyle = '#1D9E75';
  ctx.font = '700 36px "Space Grotesk", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Waypoint', 70, 110);

  ctx.fillStyle = '#555B70';
  ctx.font = '500 28px "Inter", sans-serif';
  ctx.fillText(isStreak ? 'My study streak' : 'My MCAT prep route', 70, 152);

  // Big number вЂ” coverage % or streak, depending on variant
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F0F2F8';
  if (isStreak) {
    ctx.font = '700 200px "Space Grotesk", sans-serif';
    ctx.fillText(`рџ”Ґ ${streak}`, W / 2, 540);
    ctx.fillStyle = '#1D9E75';
    ctx.font = '600 40px "Inter", sans-serif';
    ctx.fillText(streak === 1 ? 'day streak' : 'day streak', W / 2, 605);
  } else {
    ctx.font = '700 240px "Space Grotesk", sans-serif';
    ctx.fillText(`${cov}%`, W / 2, 540);
    ctx.fillStyle = '#1D9E75';
    ctx.font = '600 40px "Inter", sans-serif';
    ctx.fillText('of the MCAT covered', W / 2, 605);
  }

  // Stat cards
  const cardY = 700, cardW = 445, cardH = 230, cardR = 22, gap = 50;
  const cardX1 = (W - cardW * 2 - gap) / 2;
  const cardX2 = cardX1 + cardW + gap;

  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, cardX1, cardY, cardW, cardH, cardR); ctx.fill();
  roundRect(ctx, cardX2, cardY, cardW, cardH, cardR); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  roundRect(ctx, cardX1, cardY, cardW, cardH, cardR); ctx.stroke();
  roundRect(ctx, cardX2, cardY, cardW, cardH, cardR); ctx.stroke();

  if (isStreak) {
    // Coverage % card
    ctx.fillStyle = '#F0F2F8';
    ctx.font = '700 90px "Space Grotesk", sans-serif';
    ctx.fillText(`${cov}%`, cardX1 + cardW / 2, cardY + 120);
    ctx.fillStyle = '#8A90A8';
    ctx.font = '500 30px "Inter", sans-serif';
    ctx.fillText('MCAT covered', cardX1 + cardW / 2, cardY + 175);

    // Topics unlocked card
    ctx.fillStyle = '#F0F2F8';
    ctx.font = '700 90px "Space Grotesk", sans-serif';
    ctx.fillText(`${myTopics.length}/${totalTopics}`, cardX2 + cardW / 2, cardY + 120);
    ctx.fillStyle = '#8A90A8';
    ctx.font = '500 30px "Inter", sans-serif';
    ctx.fillText('topics unlocked', cardX2 + cardW / 2, cardY + 175);
  } else {
    // Streak card
    ctx.fillStyle = '#F0F2F8';
    ctx.font = '700 90px "Space Grotesk", sans-serif';
    ctx.fillText(streak > 0 ? `рџ”Ґ ${streak}` : 'вЂ”', cardX1 + cardW / 2, cardY + 120);
    ctx.fillStyle = '#8A90A8';
    ctx.font = '500 30px "Inter", sans-serif';
    ctx.fillText(streak === 1 ? 'day streak' : 'day streak', cardX1 + cardW / 2, cardY + 175);

    // Topics unlocked card
    ctx.fillStyle = '#F0F2F8';
    ctx.font = '700 90px "Space Grotesk", sans-serif';
    ctx.fillText(`${myTopics.length}/${totalTopics}`, cardX2 + cardW / 2, cardY + 120);
    ctx.fillStyle = '#8A90A8';
    ctx.font = '500 30px "Inter", sans-serif';
    ctx.fillText('topics unlocked', cardX2 + cardW / 2, cardY + 175);
  }

  // Tagline
  ctx.fillStyle = '#6B7185';
  ctx.font = '500 32px "Inter", sans-serif';
  const taglineText = isStreak
    ? 'Consistency compounds вЂ” every day on track is a day closer to being ready.'
    : 'Building the habit one topic at a time вЂ” before most premeds even open a prep book.';
  const lines = wrapCanvasText(ctx, taglineText, W - 180);
  lines.forEach((line, i) => ctx.fillText(line, W / 2, 1060 + i * 44));

  // Footer
  ctx.fillStyle = '#444B62';
  ctx.font = '500 26px "Inter", sans-serif';
  ctx.fillText('Track your own MCAT coverage в†’ waypointmcat.com', W / 2, H - 60);

  canvas.toBlob(async (blob) => {
    if (!blob) { restoreBtn(); return; }
    const filename = isStreak ? 'waypoint-streak.png' : 'waypoint-progress.png';
    const file = new File([blob], filename, { type: 'image/png' });
    const shareText = isStreak
      ? `I'm on a ${streak}-day Waypoint streak вЂ” tracking my MCAT coverage.`
      : `I've covered ${cov}% of the MCAT вЂ” tracked with Waypoint.`;
    const shareUrl = 'https://drewjones16.github.io/Waypoint';

    // 1) Best case: hand the image straight to the OS share sheet (iOS/Android, some desktop browsers)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'My Waypoint progress', text: shareText });
        restoreBtn();
        return;
      } catch (e) {
        if (e.name === 'AbortError') { restoreBtn(); return; } // user backed out of the sheet вЂ” done, no fallback
      }
    }

    // 2) Most desktop browsers support the share sheet for text+link even without file support
    if (navigator.share) {
      try {
        await navigator.share({ title: 'My Waypoint progress', text: shareText, url: shareUrl });
        restoreBtn();
        return;
      } catch (e) {
        if (e.name === 'AbortError') { restoreBtn(); return; }
      }
    }

    // 3) Last resort (Web Share API unsupported): save the image and let them know where it went
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Image saved вЂ” attach it to your post!');
    restoreBtn();
  }, 'image/png');
}

// в”Ђв”Ђ SHAREABLE TWIST CARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Turns Waypoint's most-loved asset into a word-of-mouth loop: an image of the
// professor-vs-MCAT contrast, sized for stories/feeds. Reuses roundRect,
// wrapCanvasText, showToast and the same share/download fallback as the coverage card.
async function shareTwistCard(btn) {
  if (window.plausible) plausible('twist_share');
  const d = getDailyTwist();
  if (!d) { showToast('No twist to share yet вЂ” add a course first.'); return; }
  const parts   = splitTwist(d.text);
  const clsText  = parts.cls || d.text;
  const examText = parts.exam || d.text;

  let btnLabel;
  if (btn) { btnLabel = btn.textContent; btn.disabled = true; btn.textContent = 'PreparingвЂ¦'; }
  const restoreBtn = () => { if (btn) { btn.disabled = false; btn.textContent = btnLabel; } };

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  try {
    await Promise.all([
      document.fonts.load('700 44px "Space Grotesk"'),
      document.fonts.load('600 30px "Inter"'),
      document.fonts.load('400 40px "Inter"'),
      document.fonts.load('700 30px "Inter"'),
    ]);
  } catch (e) { /* fall back to default fonts */ }

  // Background + purple glow (twist accent)
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0B0D14');
  bg.addColorStop(1, '#100E1C');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W * 0.82, H * 0.12, 0, W * 0.82, H * 0.12, W * 0.75);
  glow.addColorStop(0, 'rgba(139,92,246,0.26)');
  glow.addColorStop(1, 'rgba(139,92,246,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // Branding
  ctx.textAlign = 'left';
  ctx.fillStyle = '#1D9E75';
  ctx.font = '700 40px "Space Grotesk", sans-serif';
  ctx.fillText('Waypoint', 72, 108);
  ctx.fillStyle = '#A78BFA';
  ctx.font = '600 30px "Inter", sans-serif';
  ctx.fillText('The MCAT Twist', 72, 152);
  if (d.topic) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#6B7185';
    ctx.font = '600 28px "Inter", sans-serif';
    ctx.fillText(d.topic.name.toUpperCase(), W - 72, 120);
  }

  // Panel geometry + adaptive font sizing so long twists always fit
  const margin = 72, panelW = W - margin * 2, innerW = panelW - 68;
  let fs = 40, lh = 56, clsLines = [], examLines = [];
  const labelBlock = 60, padTop = 44, padBottom = 34, gap = 44;
  for (const size of [42, 38, 34, 30, 26]) {
    ctx.font = `400 ${size}px "Inter", sans-serif`;
    clsLines  = wrapCanvasText(ctx, clsText, innerW);
    examLines = wrapCanvasText(ctx, examText, innerW);
    const h = size * 1.4;
    const p1 = padTop + labelBlock + clsLines.length * h + padBottom;
    const p2 = padTop + labelBlock + examLines.length * h + padBottom;
    if (p1 + gap + p2 <= 900) { fs = size; lh = Math.round(size * 1.4); break; }
    fs = size; lh = Math.round(size * 1.4);
  }

  const drawPanel = (y, label, labelColor, lines, textColor, fillColor, strokeColor) => {
    const h = padTop + labelBlock + lines.length * lh + padBottom;
    ctx.fillStyle = fillColor;
    roundRect(ctx, margin, y, panelW, h, 24); ctx.fill();
    ctx.strokeStyle = strokeColor; ctx.lineWidth = 2;
    roundRect(ctx, margin, y, panelW, h, 24); ctx.stroke();
    ctx.textAlign = 'left';
    ctx.fillStyle = labelColor;
    ctx.font = '700 26px "Inter", sans-serif';
    ctx.fillText(label, margin + 34, y + padTop + 10);
    ctx.fillStyle = textColor;
    ctx.font = `400 ${fs}px "Inter", sans-serif`;
    lines.forEach((line, i) => ctx.fillText(line, margin + 34, y + padTop + labelBlock + i * lh));
    return y + h;
  };

  let y = 250;
  y = drawPanel(y, 'IN CLASS', '#8A90A8', clsLines, '#C0C4D8', 'rgba(255,255,255,0.03)', 'rgba(255,255,255,0.09)');
  y = drawPanel(y + gap, 'ON THE MCAT', '#A78BFA', examLines, '#DCD3FF', 'rgba(139,92,246,0.10)', 'rgba(139,92,246,0.4)');

  // Tagline
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8A90A8';
  ctx.font = '600 34px "Inter", sans-serif';
  ctx.fillText('The gap no one tells premeds about.', W / 2, Math.min(y + 90, H - 150));

  // Footer
  ctx.fillStyle = '#555B70';
  ctx.font = '500 26px "Inter", sans-serif';
  ctx.fillText('See the twist on every topic в†’ waypointmcat.com', W / 2, H - 64);

  canvas.toBlob(async (blob) => {
    if (!blob) { restoreBtn(); return; }
    const file = new File([blob], 'waypoint-twist.png', { type: 'image/png' });
    const shareText = 'The MCAT tests your classes differently than your professor does. Waypoint maps the gap.';
    const shareUrl = 'https://waypointmcat.com';
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: 'The MCAT Twist', text: shareText }); restoreBtn(); return; }
      catch (e) { if (e.name === 'AbortError') { restoreBtn(); return; } }
    }
    if (navigator.share) {
      try { await navigator.share({ title: 'The MCAT Twist', text: shareText, url: shareUrl }); restoreBtn(); return; }
      catch (e) { if (e.name === 'AbortError') { restoreBtn(); return; } }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'waypoint-twist.png';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast('Image saved вЂ” attach it to your post!');
    restoreBtn();
  }, 'image/png');
}

// в”Ђв”Ђ REPORT A QUESTION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Opens a Typeform prefilled with the question id + reason (hidden fields qid,
// reason), and fires a Plausible event so report volume is visible in analytics.
const REPORT_FORM_URL = 'https://form.typeform.com/to/ouYxpVal';
function reportQuestion(qId, reason, btn) {
  if (window.plausible) plausible('question_report', { props: { id: qId, reason } });
  const url = `${REPORT_FORM_URL}?qid=${encodeURIComponent(qId)}&reason=${encodeURIComponent(reason)}`;
  window.open(url, '_blank', 'noopener');
  const d = btn && btn.closest('details'); if (d) d.open = false;
  showToast('Thanks вЂ” opening the report form.');
}

// Lightweight toast notification вЂ” no dependencies, fades in/out on its own.
function showToast(msg) {
  const existing = document.getElementById('wp-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'wp-toast';
  t.className = 'wp-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2600);
}

function wrapCanvasText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// в”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

const PROG = { landing:0, brief:10, year:15, courses:30, reveal:50, question:70, complete:100, quicklog:10, 'quicklog-subtopic':10, quicklogdone:100, settings:10 };

// в”Ђв”Ђ Desktop dashboard rail sync в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// The rail is a static sibling of #app (survives re-render); refresh its live
// values here on every render(). Every lookup is null-guarded, so on mobile вЂ”
// where the rail is never displayed вЂ” this is a complete no-op.
function syncDesktopShell() {
  const shell = document.querySelector('.dt-shell');
  if (!shell) return;

  const NAV = {
    brief:    ['brief', 'complete'],
    reveal:   ['reveal'],
    quicklog: ['quicklog', 'quicklog-subtopic', 'quicklogdone'],
    settings: ['settings'],
  };
  shell.querySelectorAll('.dt-nav-item').forEach(b => {
    const m = NAV[b.dataset.nav];
    b.classList.toggle('active', !!m && m.includes(S.screen));
  });

  shell.classList.toggle('dt-empty', S.courses.size === 0);

  const cov = coverage(S.courses, true);
  const covNum = document.getElementById('dt-cov-num');
  if (covNum) covNum.textContent = cov;
  const ring = document.getElementById('dt-ring-fill');
  if (ring) ring.style.strokeDashoffset = (213.6 * (1 - cov / 100)).toFixed(1);

  const note = document.getElementById('dt-ring-note');
  if (note) {
    note.innerHTML = cov > 0
      ? `<strong>${cov}%</strong> of the exam so far. Your courses map to 79%; CARS (21%) is a reading skill you build all along.`
      : 'Set up your route to see coverage climb.';
  }

  const secTot = { bb: 0, cp: 0, ps: 0 }, secCov = { bb: 0, cp: 0, ps: 0 };
  TOPICS.forEach(t => {
    if (secTot[t.mcat] === undefined) return; // CARS excluded вЂ” not course-based
    secTot[t.mcat] += t.w;
    if (t.course && S.courses.has(t.course)) secCov[t.mcat] += t.w * courseCredit(t.course);
  });
  ['bb', 'cp', 'ps'].forEach(k => {
    const pct = secTot[k] > 0 ? Math.round(secCov[k] / secTot[k] * 100) : 0;
    const p = shell.querySelector(`[data-secpct="${k}"]`);
    const f = shell.querySelector(`[data-secfill="${k}"]`);
    if (p) p.textContent = pct + '%';
    if (f) f.style.width = pct + '%';
  });

  const st = document.getElementById('dt-streak');
  if (st) st.textContent = S.streak || 0;
  const an = document.getElementById('dt-answered');
  if (an) an.textContent = S.totalAnswered || 0;
}

function render() {
  try {
  const el = document.getElementById('app');
  const pct = PROG[S.screen] || 0;

  let html = `<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;
  switch (S.screen) {
    case 'landing':  html += screenLanding();  break;
    case 'brief':    html += screenBrief();    break;
    case 'year':     html += screenYear();     break;
    case 'courses':  html += screenCourses();  break;
    case 'reveal':   html += screenReveal();   break;
    case 'question': html += screenQuestion(); break;
    case 'complete': html += screenComplete(); break;
    case 'settings': html += screenSettings(); break;
    case 'quicklog':          html += screenQuickLog();         break;
    case 'quicklog-subtopic': html += screenQuickLogSubtopic(); break;
    case 'quicklogdone':      html += screenQuickLogDone();     break;
  }

  const showTabBar = TAB_BAR_SCREENS.includes(S.screen);
  if (showTabBar) {
    html += tabBarHTML();
    el.classList.add('has-tabbar');
  } else {
    el.classList.remove('has-tabbar');
  }

  el.innerHTML = html;

  // Post-render injections
  if (S.screen === 'reveal') {
    const m = document.getElementById('sectioned-map');
    if (m) {
      m.innerHTML = sectionedMapHTML();
      // Animate section bars after a short paint delay
      setTimeout(() => {
        m.querySelectorAll('.sec-bar-fill').forEach(el => {
          el.style.width = el.dataset.w + '%';
        });
      }, 120);
    }
  }
  if (S.screen === 'complete') {
    const m = document.getElementById('map-mini');
    if (m) m.innerHTML = mapHTML(true, todayTopics());
  }
  // Animate coverage ring on brief screen
  if (S.screen === 'brief') {
    const ring = document.querySelector('[data-target]');
    if (ring) requestAnimationFrame(() => setTimeout(() => {
      ring.style.strokeDashoffset = ring.dataset.target;
    }, 80));
  }

  syncDesktopShell();
  } catch(e) {
    console.error('[Waypoint] render() failed:', e);
    screenError();
  }
}

function animatePct(target) {
  const numEl = document.getElementById('cov-num');
  const barEl = document.getElementById('cov-bar');
  if (!numEl || !barEl) return;
  let v = 0;
  setTimeout(() => {
    barEl.style.width = target + '%';
    const tick = () => { if (v < target) { numEl.textContent = (++v) + '%'; setTimeout(tick, 40); } };
    tick();
  }, 250);
}

// в”Ђв”Ђ INIT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

window.go           = go;
window.selectYear   = selectYear;
window.finishCourses = finishCourses;
window.setCourseState = setCourseState;
window.toggleCat      = toggleCat;
window.startSession = startSession;
window.answer       = answer;
window.next         = next;
window.setReminder  = setReminder;
window.shareCoverageCard = shareCoverageCard;
window.shareTwistCard = shareTwistCard;
window.reportQuestion = reportQuestion;

// в”Ђв”Ђ GLOBAL ERROR BOUNDARY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Last-resort handlers so an uncaught error never leaves the user on a blank screen.
window.onerror = function(msg, src, line, col, err) {
  console.error('[Waypoint] Uncaught error:', err || msg);
  screenError();
  return true; // suppress default browser error UI
};
window.onunhandledrejection = function(event) {
  console.error('[Waypoint] Unhandled promise rejection:', event.reason);
  screenError();
};

load();
// Route: returning user with session history в†’ brief; returning without history в†’ reveal; new user в†’ landing
if (S.courses.size > 0) {
  S.screen = S.sessionHistory.length > 0 ? 'brief' : 'reveal';
  if (window.plausible) plausible('app_open');
}
render();
</script>
