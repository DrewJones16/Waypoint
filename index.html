<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#08090C;color:#E0E3EE;font-family:'Inter',-apple-system,sans-serif;display:flex;justify-content:center;min-height:100vh}
.disp{font-family:'Space Grotesk',-apple-system,sans-serif}
#app{background:#0D0F14;width:100%;max-width:480px;min-height:100vh;position:relative;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes correctPulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.5)}70%{box-shadow:0 0 0 10px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}
@keyframes celebrateGlow{0%{box-shadow:0 0 0 0 rgba(240,184,72,.45)}70%{box-shadow:0 0 0 18px rgba(240,184,72,0)}100%{box-shadow:0 0 0 0 rgba(240,184,72,0)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0D0F14}::-webkit-scrollbar-thumb{background:#2A2F40;border-radius:2px}
button{user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.card{background:#131520;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px;overflow-wrap:break-word}
.card+.card{margin-top:12px}
.btn{background:#1D9E75;color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;letter-spacing:.01em;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.05);color:#9BA3BB;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;transition:background .15s;margin-top:10px}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:6px}
.tag svg{flex-shrink:0}
.tag-bb{background:rgba(29,158,117,.15);color:#4DE3AB}
.tag-cp{background:rgba(194,140,42,.15);color:#F0B848}
.tag-ps{background:rgba(148,103,230,.15);color:#C29AF0}
.tag-cars{background:rgba(66,133,244,.15);color:#80AEFF}
.opt{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:14px;line-height:1.5;color:#C0C6D8;transition:border-color .15s,background .15s;text-align:left;width:100%;font-family:inherit}
.opt:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.opt.correct{border-color:#1D9E75;background:rgba(29,158,117,.1);color:#E0E3EE;animation:correctPulse .6s ease}
.opt.wrong{border-color:#E05555;background:rgba(224,85,85,.1);color:#E0E3EE;animation:wrongShake .4s ease;cursor:default;pointer-events:none}
.opt.dim{opacity:.4;cursor:default;pointer-events:none}
.opt.correct-dim{border-color:#1D9E75;background:rgba(29,158,117,.08);opacity:.65;cursor:default;pointer-events:none}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .2s}
.dot.done{background:#1D9E75}.dot.wrong-dot{background:#E05555}.dot.active{background:rgba(255,255,255,.4)}
.course-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:background .1s}
.course-row:hover{background:rgba(255,255,255,.04)}
.course-row input[type=checkbox]{width:18px;height:18px;accent-color:#1D9E75;cursor:pointer;flex-shrink:0}
.course-row label{font-size:14px;color:#C0C6D8;cursor:pointer;flex:1}
.course-row.checked label{color:#E0E3EE}
.passage{background:rgba(255,255,255,.03);border-left:3px solid rgba(255,255,255,.12);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;line-height:1.75;color:#9BA3BB;margin-bottom:16px}
.sa-btn{font-size:11px;font-weight:600;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 0;transition:opacity .15s}
.sa-btn:hover{opacity:.7}
</style>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const COURSES = [
  {id:'bio1',   name:'Biology I',        cat:'Biology'},

// Weights from AAMC official section overviews (students-residents.aamc.org)
// Bio/Biochem: 59 qs | Chem/Phys: 59 qs | Psych/Soc: 59 qs | CARS: 53 qs (total 230)
// Biochem = 25% of BOTH Bio/Biochem and Chem/Phys sections → ~12% of total
// Non-CARS weights sum to 77; CARS = 23; total = 100
const TOPICS = [
  {id:'cell-bio', name:'Cell Biology',     w:3,  course:'bio1',   mcat:'Bio/Biochem'},
  {id:'genetics', name:'Genetics',          w:3,  course:'bio1',   mcat:'Bio/Biochem'},
  {id:'mol-bio',  name:'Molecular Biology', w:4,  course:'biochem',mcat:'Bio/Biochem'},
  {id:'biochem',  name:'Biochemistry',      w:12, course:'biochem',mcat:'Bio/Biochem + C/P'},
  {id:'physio',   name:'Physiology',        w:5,  course:'bio2',   mcat:'Bio/Biochem'},
  {id:'neuro',    name:'Neuroscience',      w:4,  course:'bio2',   mcat:'Bio/Biochem'},
  {id:'thermo',   name:'Gen Chem',          w:5,  course:'gc1',    mcat:'Chem/Phys'},
  {id:'acid-base',name:'Acid-Base Chem',    w:4,  course:'gc2',    mcat:'Chem/Phys'},
  {id:'orgo',     name:'Organic Chemistry', w:5,  course:'oc1',    mcat:'Chem/Phys'},
  {id:'physics',  name:'Physics',           w:6,  course:'ph1',    mcat:'Chem/Phys'},
  {id:'psych',    name:'Psychology',        w:17, course:'psych',  mcat:'Psych/Soc'},
  {id:'soc',      name:'Sociology',         w:7,  course:'soc',    mcat:'Psych/Soc'},
  {id:'research', name:'Research Methods',  w:2,  course:'stats',  mcat:'All sections'},
  {id:'cars',     name:'CARS',              w:23, course:null,     mcat:'CARS'},
];

const BENCHMARK_COURSES = {
  freshman:  new Set(['bio1','gc1']),
  sophomore: new Set(['bio1','bio2','gc1','gc2','oc1']),
  junior:    new Set(['bio1','bio2','gc1','gc2','oc1','oc2','ph1','biochem','psych']),
  senior:    new Set(['bio1','bio2','gc1','gc2','oc1','biochem','ph1','psych','stats','soc']),
};

const TOPIC_SKILL = {
  'cell-bio': "Mechanism reasoning — the MCAT asks why a process happens, not what it's called.",
  'genetics': 'Pattern application — taking an abstract rule and mapping it to a novel scenario.',
  'mol-bio':  'Process sequencing — following molecular events step by step to a downstream outcome.',
  'biochem':  'Quantitative reasoning — extracting meaning from enzyme data, not just calculating it.',
  'physio':   'Systems thinking — trace the effect of one change through an entire biological system.',
  'neuro':    'Pathway tracing — from stimulus to response, through every synapse and structure.',
  'orgo':     'Mechanism prediction — given a structure and conditions, predict what happens and why.',
  'thermo':   'Conceptual math — what does a ΔG value actually mean for whether a reaction proceeds?',
  'acid-base':'Equilibrium reasoning — which direction does the system shift, and what drives it?',
  'physics':  'Principle application — taking a physical law and applying it to something unfamiliar.',
  'psych':    'Theory recognition — which framework best explains this behavior or outcome?',
  'soc':      "Critical analysis — how does social structure shape this individual's situation?",
  'research': 'Data interpretation — what does this result actually prove, and what does it leave open?',
  'cars':     "Argument mapping — what is the author's core claim, and what does it rest on?",
};

const TOPIC_CRUNCH = {
  'cell-bio': 'The foundation of every MCAT topic. Year-3 classmates review this for weeks.',
  'genetics': 'Year-3 classmates Google Mendelian ratios the week before the exam.',
  'mol-bio':  'Replication, transcription, translation — year-3 students review this right before test day.',
  'biochem':  "The most-failed subject in year 2. You're building this foundation years early.",
  'physio':   'Half of USMLE Step 1 is physiology. Year-3 classmates spend weeks here.',
  'neuro':    'Notoriously hard to self-study. Most classmates cram it the month before the exam.',
  'orgo':     'Year-3 classmates re-learn mechanisms for weeks. You already have this.',
  'thermo':   "A classic year-3 crunch topic. You're handling it years ahead of schedule.",
  'acid-base':'One of the highest-tested MCAT topics — most classmates forget it after Gen Chem.',
  'physics':  'Most premeds ignore physics until 6 weeks out. Not you.',
  'psych':    'The section most students leave until last. You are practicing it now.',
  'soc':      'Year-3 classmates typically see Sociology for the first time in MCAT prep.',
  'research': 'Research design appears throughout the MCAT — and consistently surprises people.',
};

const PASSAGES = {
  p1: "The idea of moral progress is deeply contested. Some philosophers argue that moral knowledge, like scientific knowledge, can accumulate and improve over time — that societies can genuinely learn that slavery is wrong, not merely prefer to abolish it. Critics contend that moral progress is simply the imposition of one era's preferences on another, with no objective standard to distinguish improvement from change. A third view holds that moral progress is real but limited: we may become more consistent in applying our existing principles without ever transcending those principles to arrive at deeper moral truths. Each position has profound implications for how we evaluate historical moral failures and how confident we should be in our current moral consensus.",
  p2: "Social media platforms have fundamentally altered how young people construct and present identity. Unlike previous generations who developed identity primarily through face-to-face interactions, contemporary adolescents curate digital personas, selecting which aspects of themselves to amplify and which to obscure. Sociologists debate whether this curation represents authentic self-exploration or a performance driven by external validation metrics — likes, followers, and shares. Some researchers argue that online identity work provides a relatively safe space for trying out identities before committing to them. Others contend that the quantification of social approval has pathologized normal identity development, creating feedback loops that optimize for social desirability rather than genuine self-understanding.",
  p3: "Behavioral economists have demonstrated that small changes in how choices are presented — known as 'nudges' — can significantly influence decisions without restricting options or altering economic incentives. Proponents argue that nudges, such as setting retirement savings as the default option, simply correct for predictable cognitive biases and help people make choices that better serve their own long-term interests. Critics counter that even when nudges leave a formal choice in place, they exploit a person's psychological vulnerabilities, embedding the choice architect's preferences into seemingly neutral defaults rather than respecting individual autonomy. Defenders of nudging respond that some form of choice architecture is unavoidable — there is no neutral way to present options — so the relevant question is not whether to influence behavior but whether the influence serves the chooser's own articulated goals. Skeptics remain wary of placing such power in the hands of institutions, however well-intentioned, given the difficulty of verifying whose interests a given default truly serves.",
};

const QUESTIONS = [
// Cell Biology
{id:'cb1',topic:'cell-bio',stem:'Which mechanism moves glucose into a red blood cell?',opts:['Simple diffusion','Active transport requiring ATP','Facilitated diffusion via GLUT1','Osmosis down a water gradient'],ans:2,exp:'GLUT1 transports glucose down its concentration gradient without ATP — facilitated diffusion. Simple diffusion is too slow for a polar molecule; active transport would go against the gradient.'},
{id:'cb2',topic:'cell-bio',stem:'A cell exposed to radiation fails to progress from G2 to M phase. Which protein primarily enforces this checkpoint?',opts:['Cyclin B','CDK1','p53','Rb protein'],ans:2,exp:'p53 induces p21, which inhibits CDK1/cyclin B, halting the cycle at G2/M. p53 is the "guardian of the genome" — mutations in TP53 appear in ~50% of human cancers.'},
{id:'cb3',topic:'cell-bio',stem:'A drug inhibits Na+/K+-ATPase. The most immediate consequence is:',opts:['Increased ATP production','Cell swelling due to Na+ accumulation','Decreased Na+ entry via leak channels','Membrane hyperpolarization'],ans:1,exp:'Without the pump, Na+ accumulates inside the cell. Water follows by osmosis → cell swells. This is the mechanism of digitalis toxicity in cardiac cells.'},
{id:'cb4',topic:'cell-bio',stem:'Activation of a Gs-coupled receptor produces which second messenger?',opts:['IP3','DAG','cAMP','Ca2+ release from ER'],ans:2,exp:'Gs activates adenylyl cyclase → cAMP → PKA activation. Gq receptors produce IP3 and DAG via phospholipase C. Knowing which G protein links to which effector is high-yield MCAT content.'},
{id:'cb5',topic:'cell-bio',stem:'During which phase of mitosis do sister chromatids separate and move to opposite poles?',opts:['Metaphase','Prophase','Anaphase','Telophase'],ans:2,exp:'Anaphase: cohesin is cleaved by separase, sister chromatids separate, and motor proteins move them along spindle fibers toward opposite poles.'},
{id:'cb6',topic:'cell-bio',stem:'A macrophage engulfing a bacterium is an example of:',opts:['Pinocytosis','Receptor-mediated endocytosis','Phagocytosis','Exocytosis'],ans:2,exp:'Phagocytosis = cell eating large particles (bacteria, debris). Pinocytosis = fluid uptake. Receptor-mediated endocytosis uses clathrin-coated pits (e.g., LDL uptake). Macrophages are professional phagocytes.'},
// Genetics
{id:'g1',topic:'genetics',stem:'Two phenotypically normal parents have a child with cystic fibrosis (autosomal recessive). Probability the next child is affected:',opts:['0%','25%','50%','75%'],ans:1,exp:'Both parents must be carriers (Aa). Punnett square for Aa × Aa: 1/4 AA, 2/4 Aa, 1/4 aa. Each pregnancy is independent — 25% chance of being affected.'},
{id:'g2',topic:'genetics',stem:'A color-blind man (X-linked recessive) and a carrier woman have daughters. What fraction of daughters will be color-blind?',opts:['0%','25%','50%','100%'],ans:2,exp:'Father gives X^b to ALL daughters. Carrier mother (X^B X^b) passes X^b to half her children. So 50% of daughters inherit X^b X^b — color-blind.'},
{id:'g3',topic:'genetics',stem:'In a Hardy-Weinberg population, recessive allele frequency q = 0.3. What is the heterozygote frequency?',opts:['0.09','0.42','0.49','0.21'],ans:1,exp:'p = 1 − 0.3 = 0.7. Heterozygotes = 2pq = 2(0.7)(0.3) = 0.42. Homozygous dominant = p2 = 0.49; homozygous recessive = q2 = 0.09.'},
{id:'g4',topic:'genetics',stem:'In snapdragons with incomplete dominance (RR = red, WW = white, RW = pink), crossing two pink plants yields what proportion of pink offspring?',opts:['1/4','1/2','3/4','All pink'],ans:1,exp:'RW × RW gives 1/4 RR (red), 1/2 RW (pink), 1/4 WW (white). Pink = 50%.'},
{id:'g5',topic:'genetics',stem:'Two genes are 20 cM apart on the same chromosome. Recombination frequency:',opts:['20%','10%','2%','50%'],ans:0,exp:'1 cM = 1% recombination frequency. Genes 20 cM apart are separated by crossing over 20% of the time. Above ~50 cM, genes assort independently regardless of being on the same chromosome.'},
{id:'g6',topic:'genetics',stem:'A mutation changes a codon from UAC (Tyr) to UAG (stop). This is a:',opts:['Silent mutation','Missense mutation','Nonsense mutation','Frameshift mutation'],ans:2,exp:'Nonsense mutations introduce a premature stop codon, truncating the protein. Missense = different amino acid; silent = same amino acid; frameshift = insertion/deletion shifts the entire reading frame.'},
// Molecular Biology
{id:'mb1',topic:'mol-bio',stem:'Which enzyme synthesizes the RNA primer during DNA replication?',opts:['DNA polymerase I','DNA polymerase III','Primase','Helicase'],ans:2,exp:'Primase (an RNA polymerase) synthesizes the short RNA primer providing the 3-OH group that DNA polymerase requires. DNA pol III then extends the primer; DNA pol I later replaces the RNA with DNA.'},
{id:'mb2',topic:'mol-bio',stem:'RNA polymerase binds which DNA element to initiate transcription?',opts:['Origin of replication','Promoter','Terminator','Silencer'],ans:1,exp:'The promoter (TATA box in eukaryotes; -10/-35 elements in prokaryotes) recruits RNA polymerase and defines the start site of transcription.'},
{id:'mb3',topic:'mol-bio',stem:'Which RNA molecule carries specific amino acids to the ribosome during translation?',opts:['mRNA','rRNA','tRNA','snRNA'],ans:2,exp:'tRNA has a 3-CCA end that attaches to a specific amino acid (via aminoacyl-tRNA synthetase) and an anticodon that base-pairs with the mRNA codon at the ribosome A-site.'},
{id:'mb4',topic:'mol-bio',stem:'The lac operon is most highly expressed under which conditions?',opts:['High glucose, high lactose','Low glucose, high lactose','High glucose, low lactose','Low glucose, low lactose'],ans:1,exp:'Two conditions needed: (1) low glucose → cAMP rises → CAP-cAMP activates transcription; (2) lactose present → allolactose inactivates the repressor. Both must be met for maximal expression.'},
{id:'mb5',topic:'mol-bio',stem:'During PCR, heating to ~95C serves to:',opts:['Allow primers to anneal to template','Separate double-stranded DNA into single strands','Extend primers using Taq polymerase','Activate the restriction enzyme'],ans:1,exp:'Denaturation at 95C breaks hydrogen bonds between base pairs, unwinding the double helix. The resulting single strands serve as templates for primer annealing in the next step.'},
{id:'mb6',topic:'mol-bio',stem:'EcoRI recognizes 5-GAATTC-3 and cuts between G and A. The resulting ends are:',opts:['Blunt ends','5 overhangs (sticky ends)','3 overhangs','Nicks only'],ans:1,exp:'EcoRI leaves 5-AATT single-stranded overhangs (sticky ends). These can anneal with complementary ends on other fragments, enabling ligation — fundamental to cloning.'},
// Biochemistry
{id:'bc1',topic:'biochem',stem:'At what substrate concentration does an enzyme operate at exactly Vmax/2?',opts:['[S] = 2Km','[S] = Km','[S] = Km/2','[S] = Vmax'],ans:1,exp:'By definition, Km = [S] at half-maximal velocity. Lower Km = higher affinity — the enzyme reaches Vmax/2 at lower substrate concentration. Km is one of the most tested enzyme kinetics values on the MCAT.'},
{id:'bc2',topic:'biochem',stem:'Adding a competitive inhibitor to an enzyme reaction would:',opts:['Decrease Vmax, increase Km','Increase Vmax, decrease Km','Decrease Km only','Increase apparent Km while Vmax stays unchanged'],ans:3,exp:'Competitive inhibitors occupy the active site, requiring more substrate to displace them (apparent Km increases). At saturating [S], all inhibitor is outcompeted, so Vmax is unchanged. This is the defining feature of competitive inhibition.'},
{id:'bc3',topic:'biochem',stem:'Which enzyme catalyzes the committed rate-limiting step of glycolysis?',opts:['Hexokinase','Phosphofructokinase-1 (PFK-1)','Pyruvate kinase','Glucose-6-phosphatase'],ans:1,exp:'PFK-1 converts fructose-6-phosphate to fructose-1,6-bisphosphate. This irreversible step is the major regulatory checkpoint; ATP inhibits it, AMP activates it — a perfect energy sensor.'},
{id:'bc4',topic:'biochem',stem:'How many GTP are produced by substrate-level phosphorylation per turn of the TCA cycle?',opts:['0','1','2','3'],ans:1,exp:'One GTP per turn: succinyl-CoA synthetase (succinyl-CoA to succinate). The cycle also yields 3 NADH + 1 FADH2, which drive oxidative phosphorylation for ~10 more ATP equivalents.'},
{id:'bc5',topic:'biochem',stem:'Which electron transport chain complex does NOT pump protons across the inner mitochondrial membrane?',opts:['Complex I','Complex III','Complex IV','Complex II'],ans:3,exp:'Complex II (succinate dehydrogenase) accepts electrons from FADH2 but does not pump protons. Complexes I, III, and IV all pump H+ into the intermembrane space to drive ATP synthase.'},
{id:'bc6',topic:'biochem',stem:'Gluconeogenesis occurs primarily in which organ?',opts:['Brain','Skeletal muscle','Liver','Adipose tissue'],ans:2,exp:'The liver is the main gluconeogenic organ. During fasting it converts lactate (Cori cycle), alanine, and glycerol to glucose to maintain blood levels for glucose-dependent tissues (brain, RBCs).'},
{id:'bc7',topic:'biochem',stem:'Beta-oxidation of a 16-carbon saturated fatty acid produces how many acetyl-CoA?',opts:['6','7','8','9'],ans:2,exp:'A 16C fatty acid undergoes 7 cycles of beta-oxidation, producing 8 acetyl-CoA. Each cycle also yields 1 NADH + 1 FADH2. Net ATP from one palmitate = ~129 ATP.'},
{id:'bc8',topic:'biochem',stem:"A protein's quaternary structure refers to:",opts:['The amino acid sequence','Alpha-helices and beta-sheets','The 3D fold of a single polypeptide','Assembly of multiple polypeptide subunits'],ans:3,exp:'Quaternary structure = arrangement of multiple polypeptide chains. Hemoglobin (2 alpha + 2 beta subunits) is the classic MCAT example. Loss of quaternary structure is relevant to cooperativity and allosteric regulation.'},
{id:'bc9',topic:'biochem',stem:'Which vitamin is a cofactor for pyruvate dehydrogenase (oxidative decarboxylation)?',opts:['Vitamin C','Thiamine (B1, as TPP)','Riboflavin (B2, as FAD)','Niacin (B3, as NAD+)'],ans:1,exp:'Thiamine pyrophosphate (TPP) is essential for pyruvate dehydrogenase and alpha-ketoglutarate dehydrogenase. Thiamine deficiency (beriberi, Wernicke encephalopathy) impairs aerobic carbohydrate metabolism.'},
{id:'bc10',topic:'biochem',stem:'At physiological pH (~7.4), which amino acid side chain carries a positive charge?',opts:['Aspartate (side-chain pKa 3.7)','Lysine (side-chain pKa 10.5)','Leucine (nonpolar)','Glycine (nonpolar)'],ans:1,exp:"Lysine's -NH3+ is protonated when pH < pKa (7.4 < 10.5), carrying +1 charge. Aspartate is deprotonated (-COO-) at pH 7.4 since 7.4 >> 3.7. Remember: below pKa = protonated form."},
{id:'bc11',topic:'biochem',stem:'The key allosteric activator of acetyl-CoA carboxylase (committed step of fatty acid synthesis) is:',opts:['AMP','Palmitoyl-CoA','Citrate','Malonyl-CoA'],ans:2,exp:'Citrate, exported from mitochondria when acetyl-CoA is abundant, activates ACC — signaling excess energy for fat storage. Palmitoyl-CoA feedback-inhibits ACC. Malonyl-CoA is the product.'},
{id:'bc12',topic:'biochem',stem:'Insulin causes GLUT4 translocation to the plasma membrane via which signaling pathway?',opts:['cAMP/PKA','PI3K/Akt','MAPK/ERK','JAK/STAT'],ans:1,exp:'Insulin receptor (tyrosine kinase) → IRS-1 → PI3K → PIP3 → Akt (PKB) → GLUT4 vesicle fusion with plasma membrane. This is the primary mechanism for glucose uptake in muscle and adipose tissue.'},
// Physiology
{id:'ph1',topic:'physio',stem:'During depolarization of a neuron, which ion is primarily responsible?',opts:['K+ influx','Na+ influx','Cl- influx','Ca2+ influx'],ans:1,exp:'Voltage-gated Na+ channels open at threshold, allowing rapid Na+ influx (down concentration and electrical gradients). This depolarizes the membrane from -70 mV toward +30 mV in under 1 ms.'},
{id:'ph2',topic:'physio',stem:'A patient has heart rate 70 bpm and stroke volume 70 mL. Cardiac output:',opts:['700 mL/min','1,400 mL/min','4,900 mL/min','140 mL/min'],ans:2,exp:'CO = HR x SV = 70 x 70 = 4,900 mL/min (approximately 5 L/min). Normal resting CO is 4-8 L/min. During exercise it can increase to 20-25 L/min.'},
{id:'ph3',topic:'physio',stem:'A sudden drop in blood pressure activates the baroreceptor reflex, which causes:',opts:['Decreased heart rate','Increased parasympathetic tone','Increased heart rate and vasoconstriction','Vasodilation only'],ans:2,exp:'Baroreceptors detect hypotension → decreased afferent firing → brainstem increases sympathetic output → tachycardia + vasoconstriction → BP restored. This is one of the fastest homeostatic reflexes.'},
{id:'ph4',topic:'physio',stem:'Which substance has a renal clearance GREATER than the GFR?',opts:['Glucose','Inulin','PAH (para-aminohippuric acid)','Urea'],ans:2,exp:'PAH is filtered AND actively secreted by proximal tubule cells, so its clearance exceeds GFR. Inulin clearance exactly equals GFR (only filtered). Glucose clearance approaches 0 at normal blood levels.'},
{id:'ph5',topic:'physio',stem:'A patient has PaCO2 = 55 mmHg and blood pH = 7.28. This is:',opts:['Respiratory alkalosis','Metabolic acidosis','Respiratory acidosis','Metabolic alkalosis'],ans:2,exp:'High CO2 drives: CO2 + H2O → H2CO3 → H+ + HCO3-. Elevated CO2 + low pH = respiratory acidosis. The respiratory cause distinguishes it from metabolic acidosis (low HCO3- primary).'},
{id:'ph6',topic:'physio',stem:'Secretin, released by the duodenum in response to acid, primarily acts on which organ?',opts:['Stomach (more acid secretion)','Liver (more bile)','Pancreas (bicarbonate secretion)','Gallbladder (contraction)'],ans:2,exp:'Secretin signals the pancreas to release HCO3--rich juice, neutralizing acidic chyme in the duodenum. CCK triggers gallbladder contraction and pancreatic enzyme release. Secretin is a classic MCAT hormone.'},
{id:'ph7',topic:'physio',stem:'In the HPT axis, high T3/T4 levels would:',opts:['Stimulate more TSH release','Inhibit TRH and TSH release','Stimulate TRH release only','Have no effect on the pituitary'],ans:1,exp:'Classic negative feedback: high T3/T4 inhibit both TRH (hypothalamus) and TSH (anterior pituitary), preventing further stimulation. This maintains thyroid hormone homeostasis within a narrow range.'},
// Neuroscience
{id:'n1',topic:'neuro',stem:'Which neurotransmitter is released at the neuromuscular junction?',opts:['Dopamine','Serotonin','Acetylcholine','GABA'],ans:2,exp:'Acetylcholine (ACh) binds nicotinic receptors on skeletal muscle. ACh is also the preganglionic neurotransmitter throughout the ANS and the postganglionic transmitter in the parasympathetic division.'},
{id:'n2',topic:'neuro',stem:'An IPSP most often results from which ionic mechanism?',opts:['Na+ influx','K+ efflux or Cl- influx','Ca2+ influx','Closure of K+ channels'],ans:1,exp:'IPSPs hyperpolarize the membrane (move away from threshold). GABA-A opens Cl- channels (Cl- enters → more negative inside); GABA-B opens K+ channels (K+ exits → more negative).'},
{id:'n3',topic:'neuro',stem:'Stimulation of beta-1 adrenergic receptors in the heart causes:',opts:['Decreased heart rate','Decreased contractility','Increased heart rate and contractility','Vasodilation'],ans:2,exp:'Beta-1 receptors mediate sympathetic cardiac effects: positive chronotropy (HR) and positive inotropy (contractility) via cAMP/PKA → phosphorylation of L-type Ca2+ channels and phospholamban.'},
{id:'n4',topic:'neuro',stem:'The hippocampus is primarily associated with:',opts:['Motor coordination','Emotion and fear responses','Formation of new declarative memories','Regulation of autonomic functions'],ans:2,exp:'The hippocampus converts short-term to long-term declarative (explicit) memory. Bilateral hippocampal damage (as in H.M.) causes anterograde amnesia. Cerebellum = coordination; amygdala = fear; hypothalamus = autonomic.'},
{id:'n5',topic:'neuro',stem:'In the dorsal column pathway, where do sensory axons first cross the midline?',opts:['Spinal cord','Medulla','Pons','Thalamus'],ans:1,exp:'Dorsal column axons ascend ipsilaterally to the medulla, synapse in nucleus gracilis/cuneatus, then decussate to form the medial lemniscus, ascending contralaterally to the thalamus and cortex.'},
{id:'n6',topic:'neuro',stem:'A drug blocking voltage-gated Na+ channels (like lidocaine) most directly impairs:',opts:['Resting potential maintenance','Depolarization phase','Repolarization phase','Hyperpolarization undershoot'],ans:1,exp:'Depolarization requires rapid Na+ influx through voltage-gated Na+ channels. Local anesthetics block these channels, preventing action potential initiation and propagation.'},
// Organic Chemistry
{id:'oc1',topic:'orgo',stem:'Which substrate reacts fastest in an SN2 reaction?',opts:['(CH3)3CBr — tertiary','(CH3)2CHBr — secondary','CH3Br — methyl','Neopentyl bromide — primary but hindered'],ans:2,exp:'SN2 rate: methyl > primary > secondary >> tertiary. Methyl halides have minimal steric hindrance at the backside, allowing nucleophilic attack. Tertiary carbons are essentially inert toward SN2.'},
{id:'oc2',topic:'orgo',stem:'A tertiary alkyl halide in polar protic solvent with weak, bulky base most likely undergoes:',opts:['SN2','E2','SN1','Radical substitution'],ans:2,exp:'Tertiary carbocations are stable → SN1 preferred. Polar protic solvents stabilize the ion pair. Bulky base + tertiary carbon disfavor SN2. (E1 also occurs but SN1 dominates without strong base.)'},
{id:'oc3',topic:'orgo',stem:'Rank from most to least reactive toward nucleophilic addition: amide, ester, aldehyde, carboxylic acid',opts:['Aldehyde > acid > ester > amide','Amide > ester > acid > aldehyde','Acid > aldehyde > amide > ester','Ester > aldehyde > amide > acid'],ans:0,exp:'Reactivity decreases with increasing resonance donation to the carbonyl: aldehyde (no lone pair donor) > carboxylic acid > ester > amide (strongest lone-pair resonance). Less electrophilic carbon = less reactive.'},
{id:'oc4',topic:'orgo',stem:'Two molecules that are non-superimposable mirror images are called:',opts:['Constitutional isomers','Diastereomers','Enantiomers','Conformational isomers'],ans:2,exp:'Enantiomers are non-superimposable mirror images (opposite configuration at all stereocenters). They have identical physical properties except optical rotation direction. Diastereomers differ at some but not all stereocenters.'},
{id:'oc5',topic:'orgo',stem:'Rank aniline (ArNH2), methylamine (CH3NH2), and ammonia (NH3) from least to most basic:',opts:['Aniline < NH3 < methylamine','Methylamine < NH3 < aniline','NH3 < aniline < methylamine','Methylamine < aniline < NH3'],ans:0,exp:"Aniline's lone pair delocalizes into the aromatic ring, making it least basic (pKa ~4.6). Alkyl groups are electron-donating: methylamine > NH3. Order: aniline < NH3 < methylamine."},
{id:'oc6',topic:'orgo',stem:'An IR spectrum shows broad ~3300 cm-1 AND sharp ~1715 cm-1 absorptions. Most likely functional group:',opts:['Alcohol only','Alkene','Carboxylic acid','Primary amine'],ans:2,exp:'Broad 3200-3600 cm-1 = O-H stretch; sharp ~1710-1720 cm-1 = C=O (carbonyl). Together = carboxylic acid. An aldehyde also has C=O at ~1720 but no broad O-H.'},
{id:'oc7',topic:'orgo',stem:'In electrophilic aromatic substitution, which substituent directs to ortho/para AND activates the ring?',opts:['-NO2','-COOH','-OH','-Cl'],ans:2,exp:'-OH donates electrons via resonance to ortho and para positions, activating them toward electrophiles. Halogens are also ortho/para directors but deactivate the ring inductively.'},
// Gen Chem / Thermo
{id:'gc1',topic:'thermo',stem:'A reaction has deltaH = +40 kJ/mol and deltaS = +200 J/(mol·K). Above what temperature is it spontaneous?',opts:['Below 200 K','Above 200 K','At any temperature','Never spontaneous'],ans:1,exp:'deltaG = deltaH - T*deltaS < 0 for spontaneity. With +deltaH and +deltaS: deltaG < 0 when T > deltaH/deltaS = 40,000 J / 200 J/K = 200 K. High-temperature favors entropy-driven reactions.'},
{id:'gc2',topic:'thermo',stem:'N2(g) + 3H2(g) ↔ 2NH3(g), exothermic. Increasing temperature will:',opts:['Shift right; increase [NH3]','Shift left; decrease [NH3]','Increase Keq','Have no effect on equilibrium'],ans:1,exp:"Le Chatelier's principle: adding heat to an exothermic reaction shifts equilibrium toward the endothermic (reverse) direction, decreasing [NH3] and Keq. This is why industrial ammonia synthesis operates at carefully controlled temperatures."},
{id:'gc3',topic:'thermo',stem:'Doubling [A] doubles the rate; doubling [B] has no effect. The rate law is:',opts:['Rate = k[A][B]','Rate = k[A]2','Rate = k[A]','Rate = k[B]'],ans:2,exp:'First-order in A (rate proportional to [A]1), zero-order in B (no effect). Rate = k[A]. Zero-order in B means B is not involved in the rate-determining step of the mechanism.'},
{id:'gc4',topic:'thermo',stem:'Which property depends on the NUMBER of dissolved particles, not their chemical identity?',opts:['Electrical conductivity','Colligative properties (deltaFP, deltaBP, osmotic pressure)','Molar mass of solute','Solubility'],ans:1,exp:'Colligative properties depend only on solute particle concentration, not identity. deltaFP = Kf x m x i, where i = van\'t Hoff factor (number of particles per formula unit). NaCl dissociates to give i = 2.'},
{id:'gc5',topic:'thermo',stem:'Which compound has the highest boiling point due to intermolecular forces?',opts:['CH4','NH3','N2','CCl4'],ans:1,exp:'NH3 forms hydrogen bonds (N-H···N), the strongest of the intermolecular forces listed. CH4 and N2 only have London dispersion; CCl4 has dipole-induced dipole interactions. Stronger IMFs → higher boiling point.'},
{id:'gc6',topic:'thermo',stem:'In a galvanic (voltaic) cell, oxidation occurs at the:',opts:['Cathode','Anode','Salt bridge','External circuit only'],ans:1,exp:'"An Ox, Red Cat": Anode = Oxidation, Cathode = Reduction. In a galvanic cell, the anode is the negative electrode (spontaneous oxidation). In electrolytic cells, the anode is positive (forced oxidation).'},
// Acid-Base
{id:'ab1',topic:'acid-base',stem:'What is the pH of a 0.01 M HCl solution?',opts:['1','2','3','7'],ans:1,exp:'HCl fully dissociates. [H+] = 0.01 M = 10-2 M. pH = -log(10-2) = 2. This straightforward calculation often appears as a warm-up to acid-base problems on the MCAT.'},
{id:'ab2',topic:'acid-base',stem:'Blood pH is 7.4; bicarbonate buffer pKa is 6.1. Which form predominates in blood?',opts:['H2CO3','CO2 (dissolved)','HCO3-','Equal amounts'],ans:2,exp:'When pH > pKa, the deprotonated (base) form dominates. 7.4 >> 6.1 → HCO3- overwhelmingly predominates (~20:1 ratio). This is why normal blood [HCO3-] is ~24 mEq/L vs. [H2CO3] ~1.2 mEq/L.'},
{id:'ab3',topic:'acid-base',stem:'Buffer: 0.1 M acetic acid (pKa = 4.76) + 0.2 M sodium acetate. What is the pH?',opts:['4.46','5.06','4.76','3.76'],ans:1,exp:'Henderson-Hasselbalch: pH = pKa + log([A-]/[HA]) = 4.76 + log(0.2/0.1) = 4.76 + log(2) = 4.76 + 0.30 = 5.06.'},
{id:'ab4',topic:'acid-base',stem:'At the half-equivalence point of a weak acid titrated with strong base, pH equals:',opts:['7.0','pKa of the weak acid','2 x pKa','pKb of conjugate base'],ans:1,exp:'At half-equivalence: [HA] = [A-]. Henderson-Hasselbalch gives pH = pKa + log(1) = pKa. This is why the half-equivalence point on a titration curve directly identifies the pKa of the weak acid.'},
{id:'ab5',topic:'acid-base',stem:'Rank from weakest to strongest acid: H2O, HF, H2CO3, HCl',opts:['HCl < HF < H2CO3 < H2O','H2O < H2CO3 < HF < HCl','HF < H2CO3 < HCl < H2O','HCl < H2O < HF < H2CO3'],ans:1,exp:'H2O (pKa ~16) << H2CO3 (pKa 6.4) << HF (pKa 3.2) << HCl (strong acid, pKa ~-7). Stronger acid = lower pKa = greater dissociation.'},
{id:'ab6',topic:'acid-base',stem:'A patient with DKA has pH 7.22, HCO3- = 10 mEq/L (low), PaCO2 = 28 mmHg (low). This represents:',opts:['Respiratory acidosis with metabolic compensation','Metabolic acidosis with respiratory compensation','Primary respiratory alkalosis','Mixed metabolic and respiratory alkalosis'],ans:1,exp:'Low pH + low HCO3- = metabolic acidosis (primary). The low PaCO2 reflects the respiratory compensation: hyperventilation (Kussmaul breathing) blows off CO2 to partially correct the pH.'},
// Physics
{id:'ps1',topic:'physics',stem:'A 2 kg block is pushed with 10 N on a frictionless surface. Acceleration:',opts:['5 m/s2','20 m/s2','0.2 m/s2','2 m/s2'],ans:0,exp:"Newton's second law: F = ma → a = F/m = 10/2 = 5 m/s2. On a frictionless surface, the net force equals the applied force."},
{id:'ps2',topic:'physics',stem:'A 4 kg ball falls from rest at h = 5 m. Speed just before impact (g = 10 m/s2):',opts:['5 m/s','10 m/s','50 m/s','20 m/s'],ans:1,exp:'Conservation of energy: mgh = (1/2)mv2 → v = sqrt(2gh) = sqrt(2 x 10 x 5) = sqrt(100) = 10 m/s. Mass cancels out — all objects fall at the same rate.'},
{id:'ps3',topic:'physics',stem:'A 4 ohm and 6 ohm resistor are in parallel. Equivalent resistance:',opts:['10 ohm','2.4 ohm','5 ohm','1.5 ohm'],ans:1,exp:'1/Req = 1/4 + 1/6 = 3/12 + 2/12 = 5/12. Req = 12/5 = 2.4 ohm. Parallel resistance is always less than the smallest resistor.'},
{id:'ps4',topic:'physics',stem:'If the distance between two point charges doubles, the electrostatic force:',opts:['Doubles','Halves','Quadruples','Decreases by a factor of 4'],ans:3,exp:"Coulomb's law: F = kq1q2/r2. Doubling r → r2 quadruples → F decreases by 4. This inverse-square relationship is shared by gravity, electric fields, and light intensity."},
{id:'ps5',topic:'physics',stem:'The buoyant force on an object equals:',opts:["The object's weight","The weight of fluid displaced","The object's volume times g","Pressure at bottom times surface area"],ans:1,exp:"Archimedes' principle: buoyant force = weight of fluid displaced = rho_fluid x V_submerged x g. Objects float when buoyant force equals or exceeds their weight."},
{id:'ps6',topic:'physics',stem:'Sound speed = 340 m/s; frequency = 170 Hz. Wavelength:',opts:['1 m','2 m','0.5 m','17 m'],ans:1,exp:'v = f*lambda → lambda = v/f = 340/170 = 2 m. Frequency and wavelength are inversely proportional at constant wave speed.'},
{id:'ps7',topic:'physics',stem:'A converging lens (f = 10 cm) has an object 20 cm away. Image location:',opts:['10 cm, same side as object','20 cm, opposite side','5 cm, opposite side','At infinity'],ans:1,exp:'1/f = 1/do + 1/di → 1/10 = 1/20 + 1/di → 1/di = 1/20 → di = 20 cm. Real, inverted image on the opposite side. When do = 2f, the image forms at 2f on the other side.'},
// Psychology
{id:'py1',topic:'psych',stem:"Pavlov's dogs salivate at a bell after bell+food pairings. The bell is the:",opts:['Unconditioned stimulus (US)','Unconditioned response (UR)','Conditioned stimulus (CS)','Conditioned response (CR)'],ans:2,exp:"Before conditioning, the bell is a neutral stimulus. After repeated pairings with food (US), it becomes the conditioned stimulus (CS) that elicits salivation on its own."},
{id:'py2',topic:'psych',stem:'A rat receives food every time it presses a lever. This is:',opts:['Negative reinforcement','Positive punishment','Positive reinforcement','Extinction'],ans:2,exp:'Positive reinforcement = adding a desirable stimulus (food) after a behavior to increase its frequency. Negative reinforcement = removing an aversive stimulus. Both increase behavior.'},
{id:'py3',topic:'psych',stem:'A concert pianist performs without consciously recalling learning the piece. This relies on:',opts:['Episodic memory','Semantic memory','Working memory','Procedural memory'],ans:3,exp:"Procedural (implicit) memory stores learned motor skills and habits, independent of the hippocampus. Episodic = personal events; semantic = facts/concepts; working = short-term active manipulation."},
{id:'py4',topic:'psych',stem:"A child knows liquid quantity doesn't change when poured into a different container. According to Piaget, the child has mastered:",opts:['Object permanence','Conservation','Formal operations','Egocentrism'],ans:1,exp:'Conservation — invariance of quantity despite appearance changes — emerges in the concrete operational stage (~7-11 years). Object permanence emerges in sensorimotor stage (~8-12 months).'},
{id:'py5',topic:'psych',stem:'An athlete performs better on a practiced skill in front of an audience. This is:',opts:['Social loafing','Groupthink','Social facilitation','Diffusion of responsibility'],ans:2,exp:'Social facilitation = improved performance on well-learned/simple tasks in presence of others. Novel or complex tasks may show impairment (social inhibition) due to arousal overwhelming working memory.'},
{id:'py6',topic:'psych',stem:"A person angry at their boss comes home and yells at their dog. This is:",opts:['Projection','Displacement','Rationalization','Sublimation'],ans:1,exp:"Displacement = redirecting an emotional response from the original threatening target to a safer substitute. Projection = attributing one's own unacceptable feelings to others."},
{id:'py7',topic:'psych',stem:'According to Freud, which part of the psyche operates on the "reality principle"?',opts:['Id','Superego','Ego','Preconscious'],ans:2,exp:"The ego mediates between the id's demands (pleasure principle — immediate gratification) and the superego's moral standards, using the reality principle to find realistic solutions."},
{id:'py8',topic:'psych',stem:'Signal detection theory holds that whether a person detects a stimulus depends primarily on:',opts:['Stimulus intensity alone',"The observer's criterion, motivation, and sensitivity (d')","The absolute sensory threshold","Stimulus frequency"],ans:1,exp:"SDT separates sensitivity (d') from response bias (criterion/beta). Motivation, expectations, and payoffs all shift the criterion — this is why the same sensory input can be perceived differently in different contexts."},
{id:'py9',topic:'psych',stem:'Which axis mediates the sustained hormonal stress response, releasing cortisol?',opts:['Sympathetic-adrenal-medullary (SAM) axis','Hypothalamic-pituitary-adrenal (HPA) axis','Parasympathetic nervous system','Renin-angiotensin-aldosterone system'],ans:1,exp:'HPA axis: stress → CRH (hypothalamus) → ACTH (pituitary) → cortisol (adrenal cortex). SAM axis mediates rapid fight-or-flight via epinephrine/norepinephrine. HPA is slower but sustained.'},
{id:'py10',topic:'psych',stem:"Attributing a stranger's rude behavior to their personality while ignoring situational factors is the:",opts:['Self-serving bias','Fundamental attribution error','Actor-observer bias','Halo effect'],ans:1,exp:'Fundamental attribution error (FAE) = overweighting dispositional (personality) factors for others while underweighting situational factors. The actor-observer bias is the asymmetry: we attribute others to disposition, our own behavior to situation.'},
// Sociology
{id:'so1',topic:'soc',stem:"Davis and Moore's structural-functionalist theory argues that social stratification:",opts:['Perpetuates inequality for the benefit of elites','Motivates talented people to fill important difficult roles','Results solely from historical oppression','Is an inevitable product of capitalism'],ans:1,exp:'Davis-Moore: stratification is functional — unequal rewards attached to important roles attract talented individuals. Conflict theorists (Marx, Weber) critique this as legitimizing existing inequality rather than explaining it.'},
{id:'so2',topic:'soc',stem:"The lifelong process of internalizing a society's norms, values, and roles is:",opts:['Assimilation','Socialization','Acculturation','Role conflict'],ans:1,exp:'Socialization = learning cultural expectations. Primary socialization occurs in childhood (family, peers). Secondary socialization continues through institutions, work, media. It shapes identity throughout life.'},
{id:'so3',topic:'soc',stem:"Howard Becker's labeling theory argues that deviance is:",opts:['Biologically determined','A product of societal reactions and labels applied to individuals','Caused solely by poverty','Inevitable in urbanized societies'],ans:1,exp:"Labeling theory: deviance isn't inherent in an act — it's created when society labels an act or person as deviant. The label can become a self-fulfilling prophecy (secondary deviance — Lemert)."},
{id:'so4',topic:'soc',stem:'Higher hypertension rates in low-SES populations are best explained by:',opts:['Genetic differences between SES groups','Personal choice and health literacy','Chronic stress, reduced healthcare access, and environmental exposures','Differences in exercise motivation'],ans:2,exp:'Social determinants of health — chronic psychosocial stress, food insecurity, unsafe neighborhoods, limited healthcare access — create health disparities that individual-level explanations cannot fully account for.'},
{id:'so5',topic:'soc',stem:'The Civil Rights Movement worked within democratic institutions to change laws. It is best classified as a:',opts:['Reform movement','Revolutionary movement','Reactionary movement','Alternative movement'],ans:0,exp:'Reform movements seek targeted change within existing social structures. Revolutionary movements seek complete structural transformation. The CRM pursued legal reform through courts, legislation, and nonviolent protest (lunch counter sit-ins, marches).'},
{id:'so6',topic:'soc',stem:'A doctor who becomes seriously ill struggles with conflicting expectations from "doctor" and "patient" roles. This is:',opts:['Role strain','Role conflict','Anomie','Status inconsistency'],ans:1,exp:'Role conflict = incompatible expectations from two or more different roles held simultaneously. Role strain = tension within a single role. Anomie (Durkheim) = normlessness from breakdown of social norms.'},
// Research Methods
{id:'rm1',topic:'research',stem:'Which study design can best establish a causal relationship?',opts:['Cross-sectional survey','Case-control study','Randomized controlled experiment (RCT)','Cohort study'],ans:2,exp:'Only an RCT can establish causation by randomly assigning participants to conditions, controlling for confounders. Observational designs show correlation but cannot rule out third variables.'},
{id:'rm2',topic:'research',stem:'In a study of exercise and mental health, sleep quality is not controlled. Sleep quality is a:',opts:['Dependent variable','Independent variable','Confounding variable','Operationalized construct'],ans:2,exp:'A confounding variable correlates with both the IV (exercise) and DV (mental health) and can distort the apparent relationship. Good research design controls for known confounders.'},
{id:'rm3',topic:'research',stem:'A p-value of 0.03 means:',opts:['There is a 3% chance the null hypothesis is true','There is a 3% chance of obtaining results this extreme if H0 is true','The effect size is large','The study has 97% statistical power'],ans:1,exp:'p-value = P(data this extreme | H0 true). It measures how surprising the data is assuming no effect. p < alpha (usually 0.05) → reject H0. It does NOT measure the probability the null is actually true.'},
{id:'rm4',topic:'research',stem:'A researcher concludes there IS an effect when in fact there is none. This is a:',opts:['Type II error (false negative)','Type I error (false positive)','Correct decision','Power failure'],ans:1,exp:'Type I error (alpha error) = false positive = rejecting a true null hypothesis. Type II error (beta error) = false negative = failing to reject a false null. The acceptable Type I rate = alpha (usually 0.05).'},
{id:'rm5',topic:'research',stem:'Ice cream sales strongly correlate with drowning rates. Most likely explanation:',opts:['Ice cream causes drowning','Drowning causes ice cream sales','A third variable (hot weather) drives both','The correlation is a random artifact'],ans:2,exp:'Classic confound: hot weather → more swimming (drowning risk) AND more ice cream sales. Spurious correlations from confounders are a major MCAT research methods concept.'},
// CARS — Passage 1 (Moral Progress)
{id:'ca1',topic:'cars',passage:'p1',stem:"The author's primary purpose in this passage is to:",opts:['Argue that moral progress is real and measurable','Present competing philosophical views on whether moral progress exists','Demonstrate that critics of moral progress are mistaken','Show how moral philosophy applies to specific historical cases'],ans:1,exp:'The passage introduces three competing positions without resolving the debate — this is an overview of a philosophical controversy, not an argument for one side.'},
{id:'ca2',topic:'cars',passage:'p1',stem:'The phrase "not merely prefer to abolish it" implies the author is presenting the view that:',opts:['Abolishing slavery was merely a cultural preference','Moral knowledge can be objective, not just preferential','All moral views are culturally relative','The author personally doubts moral progress'],ans:1,exp:"The phrasing signals that this position claims more than preference — it claims genuine moral knowledge (learning that something is wrong, not just coming to dislike it). The author is characterizing this view, not endorsing it."},
{id:'ca3',topic:'cars',passage:'p1',stem:'The "third view" in the passage most closely resembles which philosophical position?',opts:['Moral relativism — all claims are culturally specific','Moral realism — objective moral truths can be discovered','Moral coherentism — progress = more consistent application of existing principles','Emotivism — moral statements express only feelings'],ans:2,exp:'The third view: progress is real but limited to applying existing principles more consistently, without accessing deeper truths. This is coherentism — morality progresses by internal coherence, not discovering external moral facts.'},
{id:'ca4',topic:'cars',passage:'p1',stem:'A historian argues that modern condemnation of colonialism reflects presentism, not genuine moral insight. This aligns with which view?',opts:['Moral knowledge accumulates like scientific knowledge','Progress is limited to more consistent application of principles','Moral progress is one era imposing its preferences on another','Historical moral failures can be objectively evaluated'],ans:2,exp:"The historian's argument maps exactly onto the 'critics' view in the passage: no objective standard distinguishes the present era's values from the 19th century's — it's just preference imposition."},
// CARS — Passage 2 (Social Media Identity)
{id:'ca5',topic:'cars',passage:'p2',stem:'Which statement best summarizes the central argument?',opts:['Social media unambiguously harms adolescent identity development','Social media has altered identity formation and scholars disagree about whether this is beneficial','Online identity curation is authentic because adolescents have agency','Traditional face-to-face interaction is superior to online identity work'],ans:1,exp:'The passage presents two scholarly positions without resolving them. The summary must capture both: the landscape has changed AND there is genuine scholarly disagreement about the implications.'},
{id:'ca6',topic:'cars',passage:'p2',stem:'As used in the passage, "pathologized" most nearly means:',opts:['Made more visible and transparent','Treated as diseased or disordered what was previously considered normal development','Accelerated beyond developmental norms','Quantified for research purposes'],ans:1,exp:'"Pathologized normal identity development" means treating a normal developmental process as if it were a mental health disorder. Context: quantified social approval (likes) is being framed as making something healthy into something sick.'},
{id:'ca7',topic:'cars',passage:'p2',stem:'A researcher studying how Instagram likes affect self-concept would most likely align with:',opts:['The view that online spaces provide safe identity exploration','The view that quantified approval creates harmful feedback loops','The view that digital and face-to-face identity formation are equivalent','The view that adolescent identity development has not fundamentally changed'],ans:1,exp:'Studying how quantified metrics (likes) affect self-concept aligns with the critique that "quantification of social approval has pathologized normal identity development" by creating harmful feedback loops.'},
{id:'ca8',topic:'cars',passage:'p2',stem:'Which finding would most strengthen the argument that social media harms identity development?',opts:['Heavy social media users report higher self-esteem','Social media use correlates with reduced identity exploration and increased foreclosure','Adolescents maintain consistent personas online and offline','Social media users form stronger peer friendships'],ans:1,exp:"Reduced identity exploration (less trying out different roles) directly supports the claim that social media's feedback loops optimize for social desirability rather than genuine self-understanding."},
// Cell Biology — additional
{id:'cb7',topic:'cell-bio',stem:'Which organelle degrades damaged organelles and macromolecules via autophagy?',opts:['Golgi apparatus','Lysosome','Peroxisome','Smooth ER'],ans:1,exp:'Lysosomes contain acid hydrolases that break down damaged organelles (autophagy), engulfed pathogens, and macromolecules. Peroxisomes break down fatty acids and detoxify peroxide; the Golgi modifies and packages proteins.'},
{id:'cb8',topic:'cell-bio',stem:'Which type of cell junction allows ions and small molecules to pass directly between the cytoplasm of adjacent cells?',opts:['Tight junction','Desmosome','Gap junction','Hemidesmosome'],ans:2,exp:'Gap junctions are formed by connexon channels that directly connect adjacent cytoplasms, allowing ion and small-molecule flow — essential for electrical coupling in cardiac and smooth muscle. Tight junctions seal the space between cells; desmosomes provide mechanical adhesion.'},
// Genetics — additional
{id:'g7',topic:'genetics',stem:'A test cross of a dihybrid (AaBb) produces mostly parental-type offspring with a small fraction of recombinants. This pattern indicates the genes are:',opts:['On different chromosomes and assort independently','Linked on the same chromosome, with occasional crossing over','Both recessive','Subject to complete dominance only'],ans:1,exp:'Independent assortment predicts a 1:1:1:1 ratio of offspring types. A predominance of parental types with rare recombinants indicates the genes are physically linked, with recombinants arising from crossing over during meiosis I.'},
{id:'g8',topic:'genetics',stem:"A disease is passed from an affected mother to all of her children, but an affected father never passes it to any of his children. This inheritance pattern is most consistent with a mutation in:",opts:['An autosomal dominant gene','An X-linked recessive gene','Mitochondrial DNA','A Y-linked gene'],ans:2,exp:'Mitochondria are inherited almost exclusively from the mother (maternal/cytoplasmic inheritance), so mitochondrial DNA mutations are passed to all offspring of an affected mother but never from an affected father.'},
// Molecular Biology — additional
{id:'mb7',topic:'mol-bio',stem:"Which modification is added co-transcriptionally to the 5' end of a eukaryotic pre-mRNA?",opts:['A poly-A tail',"A 7-methylguanosine cap",'A Shine-Dalgarno sequence','An intron'],ans:1,exp:"The 5' cap (7-methylguanosine) is added during transcription, protects the mRNA from degradation, and is recognized by the ribosome during translation initiation. The poly-A tail is added to the 3' end; Shine-Dalgarno sequences are prokaryotic."},
{id:'mb8',topic:'mol-bio',stem:'A steroid hormone, once bound to its intracellular receptor, typically exerts its effect by:',opts:['Phosphorylating membrane-bound receptors','Binding DNA directly as part of a transcription factor complex','Activating a G-protein second messenger cascade','Opening a ligand-gated ion channel'],ans:1,exp:'Lipophilic steroid hormones cross the plasma membrane and bind intracellular receptors. The hormone-receptor complex translocates to the nucleus and binds hormone response elements on DNA, acting directly as a transcription factor.'},
// Physiology — additional
{id:'ph8',topic:'physio',stem:'According to the Frank-Starling mechanism, an increase in venous return (preload) leads to:',opts:['Decreased stroke volume','Increased stroke volume due to greater ventricular stretch','No change in stroke volume','Decreased heart rate'],ans:1,exp:'Greater ventricular filling stretches cardiac muscle fibers, increasing the force of the subsequent contraction (length-tension relationship) and thus increasing stroke volume — without requiring any change in contractility.'},
{id:'ph9',topic:'physio',stem:'A drop in blood pressure triggers renin release from the juxtaglomerular cells. The net effect of the resulting RAAS cascade is to:',opts:['Decrease blood volume and pressure further','Increase Na+ reabsorption and cause vasoconstriction, raising blood pressure','Increase urine output','Decrease aldosterone secretion'],ans:1,exp:'Renin converts angiotensinogen to angiotensin I; ACE converts this to angiotensin II, a potent vasoconstrictor that also stimulates aldosterone release. Aldosterone increases renal Na+ (and water) reabsorption — together raising blood pressure.'},
// Neuroscience — additional

// ── UTILITIES ─────────────────────────────────────────────────────────────────

function coverage(courses){
  return TOPICS.filter(t=>t.course&&courses.has(t.course)).reduce((s,t)=>s+t.w,0);
}

function availableQs(){
  return QUESTIONS.filter(q=>{
    const t=TOPICS.find(t=>t.id===q.topic);
    return t&&(t.course===null||S.courses.has(t.course));
  });
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function currentStreak(){
  if(!S.lastSessionDate) return 0;
  const today=todayStr2();
  const yesterday=new Date(Date.now()-86400000).toLocaleDateString('en-CA');
  if(S.lastSessionDate===today||S.lastSessionDate===yesterday) return S.streak||0;
  return 0;
}
function todayStr2(){
  return new Date().toLocaleDateString('en-CA');
}

// Curriculum-order sequence of topics for the "journey path" visualization.
// CARS is placed first since it requires no prerequisite course.
const PATH_ORDER=['cars','cell-bio','genetics','thermo','physio','neuro','acid-base','orgo','mol-bio','biochem','physics','psych','research','soc'];

function pathNodes(){
  return PATH_ORDER.map((tid,i)=>{
    const t=TOPICS.find(x=>x.id===tid);
    const isCars=t.course===null;
    const done=isCars||S.courses.has(t.course);
    const x=32+i*58;
    const y=58+Math.sin(i*1.05)*28;
    return {tid,t,done,isCars,x,y};
  });
}

function journeyPathSvg(nodes){
  const w=32+(nodes.length-1)*58+32;
  const h=120;
  let segs='';
  for(let i=0;i<nodes.length-1;i++){
    const a=nodes[i],b=nodes[i+1];
    const active=a.done&&b.done;
    segs+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${active?'#1D9E75':'rgba(255,255,255,.08)'}" stroke-width="3" stroke-dasharray="${active?'none':'4 5'}"/>`;
  }
  const circles=nodes.map(p=>{
    const r=p.isCars?14:12;
    const fill=p.done?(p.isCars?'#F0B848':'#1D9E75'):'#191C28';
    const stroke=p.done?'none':'rgba(255,255,255,.15)';
    const mark=p.done
      ? '<path d="M-4 0l3 3 5-6" stroke="#0A0B10" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
      : '<circle r="2.5" fill="rgba(255,255,255,.2)"/>';
    return `<g transform="translate(${p.x},${p.y})"><circle r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>${mark}</g>`;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">${segs}${circles}</svg>`;
}

function tag(topic){
  const t=TOPICS.find(x=>x.id===topic);
  if(!t) return '';
  if(t.mcat.includes('CARS')) return `<span class="tag tag-cars">${ICONS.cars}CARS</span>`;
  if(t.mcat.includes('Psych')) return `<span class="tag tag-ps">${ICONS.ps}Psych/Soc</span>`;
  if(t.mcat.includes('Bio/Biochem')) return `<span class="tag tag-bb">${ICONS.bb}Bio/Biochem</span>`;
  if(t.mcat.includes('Chem/Phys')||t.mcat.includes('C/P')) return `<span class="tag tag-cp">${ICONS.cp}Chem/Phys</span>`;
  if(t.mcat.includes('All')) return `<span class="tag tag-cp">${ICONS.all}All Sections</span>`;
  return `<span class="tag tag-bb">${ICONS.bb}Bio/Biochem</span>`;
}

SCREENS.brief=()=>{

  const pool=availableQs().length;

  const gap=cov-bench;
  const r=36, circ=2*Math.PI*r;
  const offset=Math.round(circ*(1-cov/100));
  const benchOffset=Math.round(circ*(1-bench/100));
  const sessions=S.totalSessions||0;
  const streak=currentStreak();

  // Welcome copy
  let welcome,sub;
  if(sessions===0){

    sub=cov>0?`${cov}% of the MCAT is already ground you've covered. That's real distance.`:'Add courses to see your coverage.';

    sub=`${cov}% covered · ${pool} questions in your pool.`;
  } else if(sessions<5){
    welcome='Building the habit.';
    sub=`${cov}% covered · ${pool} questions available.`;
  } else {

    sub=`${cov}% covered · Session ${sessions} done.`;

  // Benchmark copy
  let benchLine='';
  if(gap>0) benchLine=`<div style="font-size:11px;color:#1D9E75;margin-top:4px;font-weight:700">+${gap}% vs. ${S.year} avg</div>`;

  // Journey path

SCREENS.question=()=>{
  const qId=S.session[S.qi];
  const q=QUESTIONS.find(x=>x.id===qId);
  if(!q) return SCREENS.complete();
  const answered=S.answers.find(a=>a.qId===qId);
  const topicData=TOPICS.find(t=>t.id===q.topic);
  const passage=q.passage?PASSAGES[q.passage]:null;

  const dots=S.session.map((id,i)=>{
    const a=S.answers.find(a=>a.qId===id);
    let cls='dot';
    if(a) cls='dot '+(a.correct?'done':'wrong-dot');
    else if(i===S.qi) cls='dot active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const opts=q.opts.map((opt,i)=>{
    let cls='opt';
    if(answered){
      if(i===q.ans) cls='opt correct-dim';
      else if(i===answered.chosen&&!answered.correct) cls='opt wrong';
      else cls='opt dim';
    }
    return `<button class="${cls}" onclick="${answered?'':'answer('+i+')'}">${opt}</button>`;
  }).join('');

  const expCorrectLabel=answered&&!answered.correct?`Correct answer: ${q.opts[q.ans]}`:'';

  const reveal=answered?`
  <div style="margin-top:16px;animation:fadeUp .3s ease">
    <div style="background:${answered.correct?'rgba(29,158,117,0.08)':'rgba(224,85,85,0.08)'};border:1px solid ${answered.correct?'rgba(29,158,117,0.2)':'rgba(224,85,85,0.2)'};border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:${answered.correct?'#1D9E75':'#E05555'};text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">${answered.correct?'Correct':'Incorrect'} ${expCorrectLabel?'— '+expCorrectLabel:''}</div>
      <p style="font-size:13px;color:#9BA3BB;line-height:1.65;margin:0">${q.exp}</p>
    </div>
    ${TOPIC_SKILL[q.topic]?`
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:#444B62;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Skill trained</div>
      <p style="font-size:13px;color:#6B7185;line-height:1.55;margin:0">${TOPIC_SKILL[q.topic]}</p>
    </div>`:''}
    <button class="btn" onclick="nextQuestion()">${S.qi<S.session.length-1?'Next question →':'See results →'}</button>
  </div>`:'';

  return `
<div style="padding:24px 24px 32px;animation:fadeIn .25s ease">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <button onclick="go('brief')" style="background:none;border:none;color:#6B7185;font-size:13px;font-weight:600;cursor:pointer;padding:0;font-family:inherit">← Exit</button>
    <div style="display:flex;align-items:center;gap:6px">${dots}</div>
    <div style="font-size:12px;color:#555B70">${S.qi+1} / ${S.session.length}</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
    ${tag(q.topic)}
    <span style="font-size:12px;color:#555B70">${topicData?topicData.name:q.topic}</span>
  </div>
  ${passage?`<div class="passage">${passage}</div>`:''}
  <p style="font-size:15px;color:#E0E3EE;line-height:1.6;margin-bottom:20px;font-weight:500">${q.stem}</p>
  <div>${opts}</div>
  ${reveal}
</div>`;
};
